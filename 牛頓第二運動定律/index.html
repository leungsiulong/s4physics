<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牛頓第二運動定律視覺實驗室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --surface: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-blue: #2563eb;
            --accent-indigo: #4f46e5;
        }
        .dark {
            --card-bg: #1e293b;
            --card-border: #334155;
            --surface: #0f172a;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-blue: #60a5fa;
            --accent-indigo: #818cf8;
        }
        * { font-family: 'Noto Sans TC', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        .flashcard-container { perspective: 1200px; }
        .flashcard-inner {
            position: relative; width: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flashcard-inner.flipped { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
        }
        .flashcard-back { transform: rotateY(180deg); }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-60px); } to { opacity: 1; transform: translateX(0); } }
        .slide-in-right { animation: slideInRight 0.4s ease-out; }
        .slide-in-left { animation: slideInLeft 0.4s ease-out; }
        .progress-dot { transition: all 0.3s ease; }
        .progress-dot.active { transform: scale(1.4); }
        @keyframes pulseSoft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse-soft { animation: pulseSoft 2s ease-in-out infinite; }
        .dark .katex { color: #f1f5f9; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8" style="background: var(--surface); color: var(--text-primary);">
    <div id="root"></div>
    <script>
        var html = htm.bind(React.createElement);
        var useState = React.useState;
        var useEffect = React.useEffect;
        var useRef = React.useRef;
        var useCallback = React.useCallback;

        /* ======= Dark mode ======= */
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(event) {
            if (event.matches) { document.documentElement.classList.add('dark'); }
            else { document.documentElement.classList.remove('dark'); }
        });

        /* ======= KaTeX Renderer ======= */
        function LatexFormula(props) {
            var containerRef = useRef(null);
            useEffect(function() {
                if (window.katex && containerRef.current) {
                    window.katex.render(props.tex, containerRef.current, { displayMode: props.display !== false, throwOnError: false });
                }
            }, [props.tex, props.display]);
            return html`<span ref=${containerRef} className="my-1 inline-block"></span>`;
        }

        /* ======= SVG Free Body Diagrams ======= */
        function FBDBasic() {
            return html`<svg viewBox="0 0 260 220" className="w-full max-w-[260px] mx-auto">
                <defs>
                    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#ef4444"/></marker>
                    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#22c55e"/></marker>
                    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#f97316"/></marker>
                    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#a855f7"/></marker>
                </defs>
                <rect x="90" y="90" width="80" height="50" rx="6" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
                <text x="130" y="120" text-anchor="middle" fill="white" font-weight="bold" font-size="14">m</text>
                <line x1="130" y1="140" x2="130" y2="200" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>
                <text x="145" y="195" fill="#ef4444" font-weight="bold" font-size="13">W = mg</text>
                <line x1="130" y1="90" x2="130" y2="30" stroke="#22c55e" stroke-width="3" marker-end="url(#arrowGreen)"/>
                <text x="145" y="38" fill="#22c55e" font-weight="bold" font-size="13">N</text>
                <line x1="170" y1="115" x2="240" y2="115" stroke="#f97316" stroke-width="3" marker-end="url(#arrowOrange)"/>
                <text x="225" y="108" fill="#f97316" font-weight="bold" font-size="13">F</text>
                <line x1="90" y1="115" x2="20" y2="115" stroke="#a855f7" stroke-width="3" marker-end="url(#arrowPurple)"/>
                <text x="15" y="108" fill="#a855f7" font-weight="bold" font-size="13">f</text>
            </svg>`;
        }

        function FBDNetForce() {
            return html`<svg viewBox="0 0 280 160" className="w-full max-w-[280px] mx-auto">
                <defs>
                    <marker id="arrowO2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#f97316"/></marker>
                    <marker id="arrowP2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#a855f7"/></marker>
                </defs>
                <rect x="95" y="55" width="70" height="50" rx="6" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
                <text x="130" y="85" text-anchor="middle" fill="white" font-weight="bold" font-size="13">m</text>
                <line x1="165" y1="80" x2="260" y2="80" stroke="#f97316" stroke-width="4" marker-end="url(#arrowO2)"/>
                <text x="220" y="72" fill="#f97316" font-weight="bold" font-size="12">F = 10N</text>

                <text x="35" y="72" fill="#a855f7" font-weight="bold" font-size="11">f = 3N</text>
                <rect x="70" y="120" width="140" height="30" rx="8" fill="#059669" opacity="0.15"/>
                <text x="140" y="140" text-anchor="middle" fill="#059669" font-weight="bold" font-size="13">${"淨力 = 10 - 3 = 7N →"}</text>
                <line x1="30" y1="105" x2="270" y2="105" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>

        }

        function FBDMassAccel() {
            return html`<svg viewBox="0 0 300 150" className="w-full max-w-[300px] mx-auto">
                <defs>
                    <marker id="arrowO3" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#f97316"/></marker>
                    <marker id="arrowG3" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#059669"/></marker>
                </defs>
                <rect x="20" y="65" width="40" height="35" rx="5" fill="#60a5fa" stroke="#2563eb" stroke-width="2"/>

                <text x="100" y="128" fill="#059669" font-size="10" font-weight="bold">a = 大</text>
                <rect x="165" y="50" width="65" height="55" rx="5" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>
                <text x="197" y="83" text-anchor="middle" fill="white" font-weight="bold" font-size="11">5kg</text>
                <line x1="230" y1="77" x2="280" y2="77" stroke="#f97316" stroke-width="3" marker-end="url(#arrowO3)"/>
                <text x="255" y="70" fill="#f97316" font-size="10" font-weight="bold">F</text>
                <line x1="230" y1="112" x2="260" y2="112" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowG3)" stroke-dasharray="4,2"/>

                <text x="145" y="82" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="16">${"→"}</text>
                <text x="150" y="46" text-anchor="middle" fill="#64748b" font-weight="bold" font-size="10">${"相同力 F"}</text>
            </svg>`;
        }

        function FBDForceAccel() {
            return html`<svg viewBox="0 0 300 150" className="w-full max-w-[300px] mx-auto">
                <defs>
                    <marker id="arrowO4" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#f97316"/></marker>
                    <marker id="arrowR4" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#ef4444"/></marker>
                    <marker id="arrowG4" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#059669"/></marker>
                </defs>
                <rect x="25" y="55" width="50" height="42" rx="5" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
                <text x="50" y="80" text-anchor="middle" fill="white" font-weight="bold" font-size="11">m</text>
                <line x1="75" y1="76" x2="108" y2="76" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrowO4)"/>
                <text x="92" y="68" fill="#f97316" font-size="10" font-weight="bold">${"小 F"}</text>
                <line x1="75" y1="108" x2="100" y2="108" stroke="#059669" stroke-width="2" marker-end="url(#arrowG4)" stroke-dasharray="4,2"/>
                <text x="88" y="123" fill="#059669" font-size="10" font-weight="bold">${"小 a"}</text>
                <rect x="170" y="55" width="50" height="42" rx="5" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
                <text x="195" y="80" text-anchor="middle" fill="white" font-weight="bold" font-size="11">m</text>
                <line x1="220" y1="76" x2="282" y2="76" stroke="#ef4444" stroke-width="4" marker-end="url(#arrowR4)"/>
                <text x="252" y="68" fill="#ef4444" font-size="10" font-weight="bold">${"大 F"}</text>
                <line x1="220" y1="108" x2="275" y2="108" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowG4)" stroke-dasharray="4,2"/>
                <text x="250" y="123" fill="#059669" font-size="10" font-weight="bold">${"大 a"}</text>
                <text x="150" y="80" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="16">${"→"}</text>
                <text x="150" y="44" text-anchor="middle" fill="#64748b" font-weight="bold" font-size="10">${"相同質量 m"}</text>
            </svg>`;
        }

        function FBDFriction() {
            return html`<svg viewBox="0 0 280 180" className="w-full max-w-[280px] mx-auto">
                <defs>
                    <marker id="arrowO5" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#f97316"/></marker>
                    <marker id="arrowP5" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#a855f7"/></marker>
                    <marker id="arrowR5" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#ef4444"/></marker>
                    <marker id="arrowGn5" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#22c55e"/></marker>
                </defs>
                <rect x="20" y="130" width="240" height="25" rx="3" fill="#d1d5db" stroke="#9ca3af" stroke-width="1"/>
                <line x1="35" y1="130" x2="25" y2="155" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
                <line x1="63" y1="130" x2="53" y2="155" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
                <line x1="91" y1="130" x2="81" y2="155" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
                <line x1="119" y1="130" x2="109" y2="155" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
                <line x1="147" y1="130" x2="137" y2="155" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
                <line x1="175" y1="130" x2="165" y2="155" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
                <line x1="203" y1="130" x2="193" y2="155" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
                <line x1="231" y1="130" x2="221" y2="155" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
                <line x1="259" y1="130" x2="249" y2="155" stroke="#9ca3af" stroke-width="1" opacity="0.5"/>
                <rect x="90" y="80" width="80" height="50" rx="6" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
                <text x="130" y="110" text-anchor="middle" fill="white" font-weight="bold" font-size="13">m</text>
                <line x1="170" y1="105" x2="250" y2="105" stroke="#f97316" stroke-width="3" marker-end="url(#arrowO5)"/>
                <text x="225" y="97" fill="#f97316" font-weight="bold" font-size="11">${"F 推"}</text>
                <line x1="90" y1="105" x2="30" y2="105" stroke="#a855f7" stroke-width="3" marker-end="url(#arrowP5)"/>
                <text x="38" y="97" fill="#a855f7" font-weight="bold" font-size="11">${"f 摩擦"}</text>
                <line x1="130" y1="130" x2="130" y2="165" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowR5)"/>
                <text x="143" y="163" fill="#ef4444" font-size="10" font-weight="bold">W</text>
                <line x1="130" y1="80" x2="130" y2="45" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGn5)"/>
                <text x="143" y="53" fill="#22c55e" font-size="10" font-weight="bold">N</text>
                <text x="140" y="20" text-anchor="middle" fill="#64748b" font-size="10">${"粗糙表面 → 產生摩擦力"}</text>
            </svg>`;
        }

        function FBDEquilibrium() {
            return html`<svg viewBox="0 0 260 190" className="w-full max-w-[260px] mx-auto">
                <defs>
                    <marker id="arrowR6" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#ef4444"/></marker>
                    <marker id="arrowGn6" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#22c55e"/></marker>
                    <marker id="arrowO6" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#f97316"/></marker>
                    <marker id="arrowP6" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#a855f7"/></marker>
                </defs>
                <rect x="80" y="80" width="80" height="50" rx="6" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
                <text x="120" y="110" text-anchor="middle" fill="white" font-weight="bold" font-size="13">${"靜止"}</text>
                <line x1="120" y1="130" x2="120" y2="176" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowR6)"/>
                <text x="135" y="170" fill="#ef4444" font-weight="bold" font-size="12">W</text>
                <line x1="120" y1="80" x2="120" y2="34" stroke="#22c55e" stroke-width="3" marker-end="url(#arrowGn6)"/>
                <text x="135" y="42" fill="#22c55e" font-weight="bold" font-size="12">N</text>
                <line x1="160" y1="105" x2="220" y2="105" stroke="#f97316" stroke-width="3" marker-end="url(#arrowO6)"/>
                <text x="205" y="97" fill="#f97316" font-weight="bold" font-size="12">F</text>
                <line x1="80" y1="105" x2="20" y2="105" stroke="#a855f7" stroke-width="3" marker-end="url(#arrowP6)"/>
                <text x="28" y="97" fill="#a855f7" font-weight="bold" font-size="12">f = F</text>
                <text x="130" y="16" text-anchor="middle" fill="#059669" font-weight="bold" font-size="11">${"N = W, f = F → 淨力 = 0"}</text>
                <line x1="30" y1="130" x2="230" y2="130" stroke="#94a3b8" stroke-width="2"/>
            </svg>`;
        }

        function FBDUnits() {
            return html`<svg viewBox="0 0 280 130" className="w-full max-w-[280px] mx-auto">
                <defs>
                    <marker id="arrowO7" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#f97316"/></marker>
                    <marker id="arrowG7" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#059669"/></marker>
                </defs>
                <rect x="85" y="35" width="55" height="45" rx="6" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
                <text x="112" y="62" text-anchor="middle" fill="white" font-weight="bold" font-size="12">1 kg</text>
                <line x1="140" y1="57" x2="220" y2="57" stroke="#f97316" stroke-width="4" marker-end="url(#arrowO7)"/>
                <text x="185" y="48" fill="#f97316" font-weight="bold" font-size="13">1 N</text>
                <line x1="140" y1="95" x2="220" y2="95" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowG7)" stroke-dasharray="5,3"/>
                <text x="160" y="115" fill="#059669" font-weight="bold" font-size="12">${"a = 1 m/s²"}</text>
                <text x="140" y="18" text-anchor="middle" fill="#64748b" font-weight="bold" font-size="11">${"1N 使 1kg 產生 1m/s² 加速度"}</text>
                <line x1="40" y1="80" x2="260" y2="80" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
            </svg>`;
        }

        /* ======= Flashcard Data ======= */
        var flashcardData = [
            {
                id: 1, frontTitle: "牛頓第二運動定律", frontHint: "力、質量、加速度的核心關係",
                frontColor: "from-blue-500 to-indigo-600", frontIcon: "zap",
                backContent: {
                    formula: "F_{\\text{net}} = ma",
                    concept: "物體所受的淨力 (Fnet) 等於物體的質量 (m) 乘以其加速度 (a)。",
                    keyPoints: ["力的方向 = 加速度的方向", "淨力越大 → 加速度越大", "質量越大 → 加速度越小（慣性越大）", "沒有淨力 → 沒有加速度（勻速或靜止）"],
                    diagram: "basic"
                }
            },
            {
                id: 2, frontTitle: "自由體圖 (FBD)", frontHint: "分析力的第一步",
                frontColor: "from-emerald-500 to-teal-600", frontIcon: "pen-tool",
                backContent: {
                    formula: null,
                    concept: "自由體圖 (Free Body Diagram) 是將物體隔離出來，用箭頭標示所有作用在物體上的力，包括大小和方向。",
                    keyPoints: ["先畫出物體（通常用方形/圓形代表）", "標示所有力的箭頭：重力(W)、法向力(N)、推力(F)、摩擦力(f)", "箭頭長度代表力的大小", "這是解題的第一步！先畫 FBD 再列方程式"],
                    diagram: "fbd"
                }
            },
            {
                id: 3, frontTitle: "淨力 (Net Force)", frontHint: "所有力的向量和",
                frontColor: "from-orange-500 to-red-500", frontIcon: "git-merge",
                backContent: {
                    formula: "F_{\\text{net}} = F_{\\text{推力}} - f_{\\text{摩擦力}}",
                    concept: "淨力是作用在物體上所有力的向量和。在水平方向上，淨力等於推力減去摩擦力。",
                    keyPoints: ["同方向的力 → 相加", "反方向的力 → 相減", "淨力 = 0 → 物體保持勻速或靜止", "淨力 ≠ 0 → 物體有加速度"],
                    diagram: "netforce"
                }
            },
            {
                id: 4, frontTitle: "質量與加速度的關係", frontHint: "相同力作用下...",
                frontColor: "from-violet-500 to-purple-600", frontIcon: "scale",
                backContent: {
                    formula: "a = \\frac{F_{\\text{net}}}{m}",

                    diagram: "massaccel"
                }
            },
            {
                id: 5, frontTitle: "力與加速度的關係", frontHint: "相同質量下...",
                frontColor: "from-cyan-500 to-blue-500", frontIcon: "trending-up",
                backContent: {
                    formula: "a \\propto F_{\\text{net}} \\quad (m \\text{ 不變})",
                    concept: "在質量不變的情況下，淨力越大，物體的加速度越大。力與加速度成正比。",
                    keyPoints: ["a 與 F 成正比（m 不變時）", "力加倍 → 加速度加倍", "方向很重要：力的方向決定加速度的方向", "例：輕踩油門 vs 猛踩油門"],
                    diagram: "forceaccel"
                }
            },
            {
                id: 6, frontTitle: "摩擦力", frontHint: "阻礙物體運動的力",
                frontColor: "from-amber-500 to-orange-600", frontIcon: "wind",
                backContent: {
                    formula: "f = \\mu N",
                    concept: "摩擦力是兩個接觸面之間阻礙相對運動的力。其大小取決於摩擦係數(μ)和法向力(N)。",
                    keyPoints: ["方向：與運動方向相反", "靜摩擦力 ≥ 動摩擦力", "推力 < 最大靜摩擦力 → 物體不動", "μ 由接觸面的材質決定（粗糙 → μ 大）"],
                    diagram: "friction"
                }
            },
            {
                id: 7, frontTitle: "力的平衡 (淨力 = 0)", frontHint: "靜止或勻速直線運動",
                frontColor: "from-emerald-500 to-green-600", frontIcon: "equal",
                backContent: {
                    formula: "\\sum F = 0 \\Rightarrow a = 0",
                    concept: "當物體所受的所有力互相平衡（淨力 = 0），物體的加速度為零，即保持靜止或勻速直線運動。",
                    keyPoints: ["靜止 → 淨力必為 0", "勻速直線運動 → 淨力也是 0！", "水平方向：推力 = 摩擦力", "垂直方向：法向力 = 重力"],
                    diagram: "equilibrium"
                }
            },
            {
                id: 8, frontTitle: "力的單位：牛頓 (N)", frontHint: "1 N = 1 kg·m/s²",
                frontColor: "from-rose-500 to-pink-600", frontIcon: "ruler",
                backContent: {
                    formula: "1\\text{ N} = 1\\text{ kg} \\cdot \\text{m/s}^2",
                    concept: "牛頓 (N) 是國際單位制中力的單位。定義為：使 1 公斤的物體產生 1 m/s² 加速度所需的力。",
                    keyPoints: ["以科學家 Isaac Newton 命名", "1N ≈ 一個小蘋果的重力", "人的體重約 500~800 N", "計算時確保單位一致：kg、m/s²、N"],
                    diagram: "units"
                }

        ];

        var diagramComponents = {
            basic: FBDBasic, fbd: FBDBasic, netforce: FBDNetForce,
            massaccel: FBDMassAccel, forceaccel: FBDForceAccel,
            friction: FBDFriction, equilibrium: FBDEquilibrium, units: FBDUnits
        };

        /* ======= Flashcard Component ======= */

            return html`<div className="flashcard-container w-full cursor-pointer" onClick=${onFlip} style=${{ minHeight: '420px' }}>

        /* ======= Line Chart ======= */
        function LineChart(props) {
            var title = props.title, yLabel = props.yLabel, color = props.color;
            var dataKey = props.dataKey, history = props.history, simData = props.simData;
            var staticMaxY = props.staticMaxY;
            var trackLength = 10;
            var peakY = staticMaxY || 5;
            history.forEach(function(h) { if (h[dataKey] > peakY) peakY = h[dataKey]; });
            var maxY = Math.max(staticMaxY || 5, peakY * 1.2);
            var maxT = Math.max(5, simData.t * 1.2);
            var scaleX = function(t) { return 25 + (t / maxT) * 190; };
            var scaleY = function(y) { return 115 - (y / Math.max(maxY, 0.1)) * 90; };
            var pathData = history.length > 0 ? "M " + history.map(function(h) { return scaleX(h.t) + "," + scaleY(h[dataKey]); }).join(' L ') : '';
            var cp = history.length > 0 ? history[history.length - 1] : { t: 0 };
            if (!cp[dataKey]) cp[dataKey] = 0;
            return html`<div className="p-3 rounded-xl shadow-sm border flex flex-col items-center w-full" style=${{ background: 'var(--card-bg)', borderColor: 'var(--card-border)' }}>
                <h4 className="font-bold mb-1" style=${{ color: 'var(--text-primary)' }}>${title}</h4>
                <svg viewBox="0 0 240 140" className="w-full h-auto overflow-visible">
                    <line x1="25" y1="25" x2="25" y2="115" stroke="#94a3b8" stroke-width="2" />
                    <line x1="25" y1="115" x2="215" y2="115" stroke="#94a3b8" stroke-width="2" />
                    <text x="20" y="25" text-anchor="end" alignment-baseline="middle" font-size="10" fill="#64748b">${maxY.toFixed(1)}</text>
                    <text x="20" y="115" text-anchor="end" alignment-baseline="middle" font-size="10" fill="#64748b">0</text>
                    <text x="215" y="130" text-anchor="middle" font-size="10" fill="#64748b">${maxT.toFixed(1)}s</text>
                    <text x="25" y="130" text-anchor="middle" font-size="10" fill="#64748b">0</text>
                    <text x="25" y="15" text-anchor="middle" font-size="10" fill="#64748b" font-weight="bold">${yLabel}</text>
                    <text x="225" y="115" text-anchor="start" alignment-baseline="middle" font-size="10" fill="#64748b" font-weight="bold">t(s)</text>
                    <path d=${pathData} fill="none" stroke=${color} stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx=${scaleX(cp.t) || -10} cy=${scaleY(cp[dataKey]) || -10} r="4" fill=${color} />
                </svg>
            </div>`;
        }

        /* ======= Main App ======= */
        function App() {
            var tabState = useState('concepts');

            var cardState = useState(0);
            var currentCard = cardState[0], setCurrentCard = cardState[1];
            var flipState = useState(false);
            var isFlipped = flipState[0], setIsFlipped = flipState[1];
            var dirState = useState('right');
            var slideDirection = dirState[0], setSlideDirection = dirState[1];
            var keyState = useState(0);
            var slideKey = keyState[0], setSlideKey = keyState[1];

            var forceState = useState(5);
            var force = forceState[0], setForce = forceState[1];
            var frictionState = useState(0);
            var friction = frictionState[0], setFriction = frictionState[1];
            var massState = useState(2);
            var mass = massState[0], setMass = massState[1];

            var playState = useState(false);
            var isPlaying = playState[0], setIsPlaying = playState[1];
            var simState = useState({ t: 0, s: 0, v: 0, a: 0 });
            var simData = simState[0], setSimData = simState[1];
            var historyRef = useRef([{ t: 0, s: 0, v: 0, a: 0 }]);
            var trackLength = 10;
            var lastTimeRef = useRef(null);
            var requestRef = useRef();

            var qState = useState({ type: 'find_a', m: 2, a: 2, f: 0, F: 4 });
            var qData = qState[0], setQData = qState[1];
            var ansState = useState('');
            var userAns = ansState[0], setUserAns = ansState[1];
            var fbState = useState(null);
            var feedback = fbState[0], setFeedback = fbState[1];

            var goToCard = useCallback(function(index, direction) {
                if (index < 0 || index >= flashcardData.length) return;
                setIsFlipped(false);
                setSlideDirection(direction);
                setSlideKey(function(prev) { return prev + 1; });
                setTimeout(function() { setCurrentCard(index); }, 50);
            }, []);

            var nextCard = useCallback(function() { goToCard(currentCard + 1, 'right'); }, [currentCard, goToCard]);
            var prevCard = useCallback(function() { goToCard(currentCard - 1, 'left'); }, [currentCard, goToCard]);

            useEffect(function() {
                var handler = function(e) {
                    if (activeTab !== 'concepts') return;
                    if (e.key === 'ArrowRight') nextCard();
                    else if (e.key === 'ArrowLeft') prevCard();
                    else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); setIsFlipped(function(f) { return !f; }); }
                };
                window.addEventListener('keydown', handler);
                return function() { window.removeEventListener('keydown', handler); };
            }, [activeTab, nextCard, prevCard]);

            var resetSim = function() {
                setIsPlaying(false);
                setSimData({ t: 0, s: 0, v: 0, a: 0 });
                historyRef.current = [{ t: 0, s: 0, v: 0, a: 0 }];
                lastTimeRef.current = null;
            };

            useEffect(function() {
                if (!isPlaying) { lastTimeRef.current = null; cancelAnimationFrame(requestRef.current); return; }
                var animate = function(timestamp) {
                    if (!lastTimeRef.current) lastTimeRef.current = timestamp;
                    var dt = ((timestamp - lastTimeRef.current) / 1000) * 0.5;
                    lastTimeRef.current = timestamp;
                    var cS = simData.s, cV = simData.v, cT = simData.t;
                    if (cS < trackLength) {
                        var cA = (force - friction) / mass;
                        if (cA < 0 && cV <= 0.01) cA = 0;
                        var nV = cV + cA * dt;
                        if (nV < 0) { nV = 0; cA = 0; }
                        var nS = cS + nV * dt;
                        var nT = cT + dt;
                        if (nS >= trackLength) { nS = trackLength; setIsPlaying(false); }
                        var nd = { t: nT, s: nS, v: nV, a: cA };
                        historyRef.current.push(nd);
                        setSimData(nd);
                        if (nS < trackLength) requestRef.current = requestAnimationFrame(animate);
                    }
                };
                requestRef.current = requestAnimationFrame(animate);
                return function() { cancelAnimationFrame(requestRef.current); };
            }, [isPlaying, force, friction, mass, simData]);

            useEffect(function() { lucide.createIcons(); });

            var generateQuestion = function() {
                var types = ['find_a', 'find_F', 'find_m'];
                var type = types[Math.floor(Math.random() * types.length)];
                var m, a, f, F;
                do { m = Math.floor(Math.random() * 4) + 1; a = Math.floor(Math.random() * 3) + 1; f = Math.floor(Math.random() * 4); F = m * a + f; } while (F > 20 || F < 1);
                setQData({ type: type, m: m, a: a, f: f, F: F });
                setUserAns(''); setFeedback(null); setForce(5); setFriction(0); setMass(2); resetSim();
            };

            useEffect(function() {
                if (activeTab === 'practice' && !feedback && userAns === '') generateQuestion();
            }, [activeTab]);

            var checkAnswer = function() {
                var uv = parseFloat(userAns);

                var target = 0;
                if (qData.type === 'find_a') target = qData.a;
                if (qData.type === 'find_F') target = qData.F;
                if (qData.type === 'find_m') target = qData.m;
                if (Math.abs(uv - target) <= 0.1) { setFeedback({ text: '✅ 答對了！非常精準！', isCorrect: true }); }
                else { setFeedback({ text: '❌ 不太對喔。可以利用右邊的儀器設定參數，觀察看看！', isCorrect: false }); }
            };

            var effectiveFriction = (simData.v === 0 && force < friction) ? force : friction;
            var displayA = (force - effectiveFriction) / mass;
            var isStuck = simData.v === 0 && force <= friction;
            var finished = simData.s >= trackLength;

            var renderControlPanel = function() {
                return html`<div className="space-y-6 p-6 rounded-xl border-2 shadow-sm h-full flex flex-col justify-between" style=${{ background: 'var(--surface)', borderColor: 'var(--card-border)' }}>

                            <i data-lucide="sliders"></i> ${"實驗儀器面板"}
                        </h2>
                        <div className="mb-4">
                            <label className="flex justify-between font-bold mb-2 text-red-500"><span>${"推力 (Force)"}</span><span>${force} N</span></label>
                            <input type="range" min="0" max="20" step="1" value=${force} onChange=${function(e) { setForce(Number(e.target.value)); }} className="w-full h-2 bg-red-200 rounded-lg appearance-none cursor-pointer accent-red-600" />
                        </div>
                        <div className="mb-4">
                            <label className="flex justify-between font-bold mb-2 text-orange-500"><span>${"摩擦力 (Friction)"}</span><span>${friction} N</span></label>
                            <input type="range" min="0" max="20" step="1" value=${friction} onChange=${function(e) { setFriction(Number(e.target.value)); }} className="w-full h-2 bg-orange-200 rounded-lg appearance-none cursor-pointer accent-orange-600" />
                        </div>
                        <div className="mb-4">
                            <label className="flex justify-between font-bold mb-2 text-blue-500"><span>${"質量 (Mass)"}</span><span>${mass} kg</span></label>
                            <input type="range" min="1" max="20" step="1" value=${mass} onChange=${function(e) { setMass(Number(e.target.value)); }} className="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                        </div>
                    </div>
                    <div className="flex gap-4 pt-4 mt-auto">
                        <button onClick=${function() { setIsPlaying(!isPlaying); }} disabled=${finished || isStuck} className=${"flex-1 flex justify-center items-center gap-2 py-3 px-4 rounded-lg font-bold text-white transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed " + (isPlaying ? 'bg-amber-500 hover:bg-amber-600' : 'bg-green-500 hover:bg-green-600')}>

                            <i data-lucide="rotate-ccw" className="w-5 h-5"></i> ${"重設"}
                        </button>
                    </div>
                </div>`;
            };

            return html`<div className="max-w-4xl mx-auto rounded-2xl shadow-xl overflow-hidden" style=${{ background: 'var(--card-bg)' }}>
                <div className="bg-gradient-to-r from-blue-600 via-indigo-600 to-violet-600 p-6 text-white">

                            <p className="text-blue-100 flex items-center gap-2 text-sm">

                            </p>
                        </div>
                        <div className="flex bg-white/15 p-1 rounded-xl gap-1 backdrop-blur-sm">
                            <button onClick=${function() { setActiveTab('concepts'); }} className=${"flex items-center gap-1.5 px-3 py-2 rounded-lg transition-all text-sm font-bold " + (activeTab === 'concepts' ? 'bg-white text-indigo-700 shadow-md' : 'text-white/80 hover:bg-white/10')}>
                                <i data-lucide="layers" className="w-4 h-4"></i> ${"重要概念"}
                            </button>
                            <button onClick=${function() { setActiveTab('lab'); }} className=${"flex items-center gap-1.5 px-3 py-2 rounded-lg transition-all text-sm font-bold " + (activeTab === 'lab' ? 'bg-white text-indigo-700 shadow-md' : 'text-white/80 hover:bg-white/10')}>
                                <i data-lucide="flask-conical" className="w-4 h-4"></i> ${"自由探索"}
                            </button>
                            <button onClick=${function() { setActiveTab('practice'); }} className=${"flex items-center gap-1.5 px-3 py-2 rounded-lg transition-all text-sm font-bold " + (activeTab === 'practice' ? 'bg-white text-indigo-700 shadow-md' : 'text-white/80 hover:bg-white/10')}>
                                <i data-lucide="clipboard-list" className="w-4 h-4"></i> ${"無限練習"}
                            </button>
                        </div>
                    </div>
                </div>

                <div className="p-5 md:p-8">
                    ${activeTab === 'concepts' && html`<div className="space-y-6">
                        <div className="flex items-center justify-center gap-2 flex-wrap">

                                return html`<button key=${card.id} onClick=${function() { goToCard(i, i > currentCard ? 'right' : 'left'); }}
                                    className=${"progress-dot w-3 h-3 rounded-full transition-all " + (i === currentCard ? 'active bg-indigo-500 ring-4 ring-indigo-200' : 'bg-slate-300 hover:bg-slate-400')}

                                className="flex-shrink-0 w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center transition-all shadow-md disabled:opacity-30 disabled:cursor-not-allowed"

                        </div>
                        <div className="border-t pt-6 mt-4" style=${{ borderColor: 'var(--card-border)' }}>
                            <h3 className="font-bold text-sm mb-3 flex items-center gap-2" style=${{ color: 'var(--text-secondary)' }}>
                                <i data-lucide="grid-3x3" className="w-4 h-4"></i> ${"全部概念一覽（點擊跳轉）"}
                            </h3>
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                                ${flashcardData.map(function(card, i) {
                                    return html`<button key=${card.id} onClick=${function() { goToCard(i, i > currentCard ? 'right' : 'left'); }}
                                        className=${"text-left p-3 rounded-lg border text-xs font-bold transition-all " + (i === currentCard ? 'ring-2 ring-indigo-400' : 'hover:shadow-md')}
                                        style=${{ background: 'var(--surface)', borderColor: 'var(--card-border)', color: 'var(--text-primary)' }}>
                                        <span className="opacity-50 mono mr-1">${(i + 1) + "."}</span>
                                        ${card.frontTitle}
                                    </button>`;
                                })}
                            </div>
                        </div>
                    </div>`}

                    ${activeTab === 'lab' && html`<div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                        ${renderControlPanel()}
                        <div className="space-y-6 p-6 rounded-xl border shadow-sm flex flex-col justify-center" style=${{ background: 'var(--surface)', borderColor: 'var(--card-border)' }}>
                            <h2 className="text-xl font-bold border-b pb-2 flex items-center gap-2" style=${{ color: 'var(--text-primary)', borderColor: 'var(--card-border)' }}>
                                <i data-lucide="bar-chart-2"></i> ${"觀察結果"}
                            </h2>
                            <div className="p-4 rounded-lg shadow-sm text-center border-l-4 border-purple-500" style=${{ background: 'var(--card-bg)' }}>
                                <p className="text-sm mb-1 font-bold" style=${{ color: 'var(--text-secondary)' }}>${"公式： 加速度 = (推力 - 摩擦力) ÷ 質量"}</p>
                                <div className="text-3xl font-mono font-bold flex justify-center items-center gap-3 mt-2" style=${{ color: 'var(--text-primary)' }}>
                                    <span className="text-purple-500">a</span><span>=</span>
                                    <div className="flex flex-col items-center justify-center">
                                        <span className="border-b-2 px-2 whitespace-nowrap" style=${{ borderColor: 'var(--text-primary)' }}>
                                            <span className="text-red-500">${force}</span>${" - "}<span className="text-orange-500">${effectiveFriction}</span>
                                        </span>
                                        <span className="text-blue-500 px-2">${mass}</span>
                                    </div>
                                    <span>=</span><span className="text-purple-500">${displayA.toFixed(2)}</span>
                                </div>
                                <p className="text-sm mt-2" style=${{ color: 'var(--text-secondary)' }}>m/s²</p>
                            </div>
                            <div className="grid grid-cols-2 gap-4 text-center">
                                <div className="p-3 rounded-lg shadow-sm border" style=${{ background: 'var(--card-bg)', borderColor: 'var(--card-border)' }}>
                                    <p className="text-sm font-bold" style=${{ color: 'var(--text-secondary)' }}>${"目前速度 (v)"}</p>
                                    <p className="text-2xl font-bold mono text-cyan-500">${simData.v.toFixed(2)} <span className="text-sm font-normal" style=${{ color: 'var(--text-secondary)' }}>m/s</span></p>
                                </div>
                                <div className="p-3 rounded-lg shadow-sm border" style=${{ background: 'var(--card-bg)', borderColor: 'var(--card-border)' }}>
                                    <p className="text-sm font-bold" style=${{ color: 'var(--text-secondary)' }}>${"經過時間 (t)"}</p>
                                    <p className="text-2xl font-bold mono" style=${{ color: 'var(--text-primary)' }}>${simData.t.toFixed(2)} <span className="text-sm font-normal" style=${{ color: 'var(--text-secondary)' }}>s</span></p>
                                </div>
                            </div>
                        </div>
                    </div>`}

                    ${activeTab === 'practice' && html`<div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                        <div className="p-6 rounded-xl border-2 border-amber-300 shadow-sm flex flex-col justify-center" style=${{ background: '#fffbeb' }}>
                            <h2 className="text-xl font-bold border-b border-amber-300 pb-3 text-amber-800 flex items-center gap-2 mb-6">
                                <i data-lucide="clipboard-list"></i> ${"任務挑戰"}
                            </h2>
                            <div className="bg-white p-6 rounded-xl shadow-sm text-lg mb-6 border border-amber-200" style=${{ color: 'var(--text-primary)' }}>
                                <p className="font-bold text-blue-600 mb-3 text-sm flex items-center gap-1">
                                    <i data-lucide="help-circle" className="w-4 h-4"></i> ${"請利用右側儀器做實驗，或用紙筆計算："}
                                </p>
                                <div className="font-medium leading-relaxed">
                                    ${qData.type === 'find_a' && html`<span>${"設定：推力 "}<strong className="text-red-500">${qData.F}N</strong>${"、摩擦力 "}<strong className="text-orange-500">${qData.f}N</strong>${"、質量 "}<strong className="text-blue-500">${qData.m}kg</strong>${"。此時的 "}<strong>${"加速度 (a)"}</strong>${" 是多少？"}</span>`}
                                    ${qData.type === 'find_F' && html`<span>${"質量 "}<strong className="text-blue-500">${qData.m}kg</strong>${"、摩擦力 "}<strong className="text-orange-500">${qData.f}N</strong>${"。若要產生 "}<strong className="text-green-600">${qData.a} m/s²</strong>${" 的加速度，"}<strong>${"推力 (F)"}</strong>${" 需要多少？"}</span>`}
                                    ${qData.type === 'find_m' && html`<span>${"推力 "}<strong className="text-red-500">${qData.F}N</strong>${"、摩擦力 "}<strong className="text-orange-500">${qData.f}N</strong>${" 產生了 "}<strong className="text-green-600">${qData.a} m/s²</strong>${" 的加速度。"}<strong>${"質量 (m)"}</strong>${" 是多少？"}</span>`}
                                </div>
                            </div>
                            <div className="flex flex-col sm:flex-row items-center gap-4">
                                <div className="relative w-full sm:w-auto flex-1">
                                    <input type="number" value=${userAns} onChange=${function(e) { setUserAns(e.target.value); }} placeholder=${"輸入數字"} className="border-2 border-slate-300 rounded-lg p-3 pl-4 pr-16 w-full text-xl font-bold focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" style=${{ fontSize: '18px' }} />
                                    <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">
                                        ${qData.type === 'find_a' ? 'm/s²' : (qData.type === 'find_F' ? 'N' : 'kg')}
                                    </span>
                                </div>
                                <button onClick=${checkAnswer} className="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold transition-colors shadow-md flex items-center justify-center gap-2 whitespace-nowrap">
                                    <i data-lucide="check-circle" className="w-5 h-5"></i> ${"提交答案"}
                                </button>
                            </div>
                            ${feedback && html`<div className=${"mt-6 p-4 rounded-xl font-bold flex flex-col sm:flex-row justify-between items-center gap-4 shadow-sm border " + (feedback.isCorrect ? 'bg-green-100 text-green-800 border-green-300' : 'bg-red-100 text-red-800 border-red-300')}>
                                <div className="flex items-center gap-2">
                                    <i data-lucide=${feedback.isCorrect ? "check" : "x"} className="w-5 h-5"></i>
                                    ${feedback.text}
                                </div>
                                ${feedback.isCorrect && html`<button onClick=${generateQuestion} className="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg transition-colors shadow-md flex items-center justify-center gap-2">
                                    ${"下一題 "}<i data-lucide="arrow-right" className="w-4 h-4"></i>
                                </button>`}
                            </div>`}
                        </div>
                        ${renderControlPanel()}
                    </div>`}

                    ${activeTab !== 'concepts' && html`<div className="space-y-8">
                        <div>
                            <h3 className="text-lg font-bold mb-4 flex items-center gap-2" style=${{ color: 'var(--text-primary)' }}>
                                <i data-lucide="monitor-play" className="w-5 h-5"></i> ${"1. 實驗模擬畫面"}
                            </h3>
                            <div className="relative h-48 border-2 rounded-xl overflow-hidden flex items-end pb-4 px-4 shadow-inner" style=${{ background: '#f0f9ff', borderColor: 'var(--card-border)' }}>
                                <div className="absolute inset-0 opacity-20 pointer-events-none" style=${{ backgroundImage: 'linear-gradient(90deg, #cbd5e1 1px, transparent 1px)', backgroundSize: '10% 100%' }}></div>
                                <div className="absolute bottom-4 flex items-center" style=${{ left: Math.min((simData.s / trackLength) * 85, 85) + '%', zIndex: 10 }}>
                                    ${(isPlaying || simData.t === 0 || force > 0) && html`<div className="flex items-center text-red-600 mr-1 absolute" style=${{ transform: 'translateX(-100%)', left: 0 }}>
                                        <div className="font-bold text-sm mr-1 whitespace-nowrap">${"推力 " + force + "N"}</div>
                                        <div className="bg-red-600 h-1 transition-all duration-200" style=${{ width: (30 + force * 5) + 'px' }}></div>
                                        <div className="w-0 h-0 border-t-[4px] border-t-transparent border-l-[6px] border-l-red-600 border-b-[4px] border-b-transparent"></div>
                                    </div>`}
                                    <div className="bg-blue-500 border-2 border-blue-700 rounded-lg shadow-md flex items-center justify-center text-white font-bold relative transition-all duration-200" style=${{ width: (40 + mass * 4) + 'px', height: (40 + mass * 4) + 'px', boxShadow: '4px 4px 0px rgba(0,0,0,0.1)' }}>
                                        <span>${mass}kg</span>
                                        ${friction > 0 && html`<div className="flex items-center text-orange-500 absolute" style=${{ right: '100%', bottom: '-2px' }}>
                                            <div className="font-bold text-xs whitespace-nowrap absolute" style=${{ bottom: '8px', right: '10px' }}>${"摩擦 " + friction + "N"}</div>
                                            <div className="w-0 h-0 border-t-[4px] border-t-transparent border-r-[6px] border-r-orange-500 border-b-[4px] border-b-transparent"></div>
                                            <div className="bg-orange-500 h-1 transition-all duration-200" style=${{ width: (30 + friction * 5) + 'px' }}></div>
                                        </div>`}
                                    </div>
                                </div>
                                <div className="absolute bottom-0 left-0 right-0 h-4 bg-slate-400"></div>
                            </div>
                        </div>
                        <div>
                            <h3 className="text-lg font-bold mb-4 flex items-center gap-2" style=${{ color: 'var(--text-primary)' }}>
                                <i data-lucide="trending-up" className="w-5 h-5"></i> ${"2. 實時運動線圖"}
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <${LineChart} title=${"位移-時間圖 (s-t)"} yLabel=${"s (m)"} color="#8b5cf6" dataKey="s" history=${historyRef.current} simData=${simData} staticMaxY=${trackLength} />
                                <${LineChart} title=${"速度-時間圖 (v-t)"} yLabel=${"v (m/s)"} color="#06b6d4" dataKey="v" history=${historyRef.current} simData=${simData} />
                                <${LineChart} title=${"加速度-時間圖 (a-t)"} yLabel=${"a (m/s²)"} color="#22c55e" dataKey="a" history=${historyRef.current} simData=${simData} />
                            </div>
                            ${activeTab === 'practice' && html`<div className="text-center text-blue-600 font-bold mt-4 bg-blue-50 p-3 rounded-lg border border-blue-200 shadow-sm flex items-center justify-center gap-2">
                                ${"💡 試試看在車子移動的途中改變推力，看看 v-t 圖的「斜率」和 a-t 圖的「高低」會怎麼瞬間變化！"}
                            </div>`}
                        </div>
                    </div>`}
                </div>
            </div>`;
        }

        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>
</body>
</html>
