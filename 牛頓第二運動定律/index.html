<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牛頓第二運動定律視覺實驗室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen p-4 md:p-8">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // LaTeX 公式渲染器
        // ==========================================
        const LatexFormula = ({ tex }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.katex && containerRef.current) {
                    window.katex.render(tex, containerRef.current, { displayMode: true, throwOnError: false });
                }
            }, [tex]);
            return <div ref={containerRef} className="text-slate-800 my-2"></div>;
        };

        // ==========================================
        // SVG 實時動態圖表元件
        // ==========================================
        const LineChart = ({ title, yLabel, color, dataKey, history, simData, staticMaxY }) => {
            const trackLength = 10;
            let peakY = staticMaxY || 5;
            history.forEach(h => { if (h[dataKey] > peakY) peakY = h[dataKey]; });
            
            const maxY = Math.max(staticMaxY || 5, peakY * 1.2);
            const maxT = Math.max(5, simData.t * 1.2);

            const scaleX = (t) => 25 + (t / maxT) * 190;
            const scaleY = (y) => 115 - (y / Math.max(maxY, 0.1)) * 90;

            const pathData = history.length > 0 ? `M ${history.map(h => `${scaleX(h.t)},${scaleY(h[dataKey])}`).join(' L ')}` : '';
            const currentPoint = history.length > 0 ? history[history.length - 1] : { t: 0, [dataKey]: 0 };

            return (
                <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center w-full">
                    <h4 className="font-bold text-slate-700 mb-1">{title}</h4>
                    <svg viewBox="0 0 240 140" className="w-full h-auto overflow-visible">
                        <line x1="25" y1="25" x2="25" y2="115" stroke="#cbd5e1" strokeWidth="2" />
                        <line x1="25" y1="115" x2="215" y2="115" stroke="#cbd5e1" strokeWidth="2" />
                        <text x="20" y="25" textAnchor="end" alignmentBaseline="middle" fontSize="10" fill="#64748b">{maxY.toFixed(1)}</text>
                        <text x="20" y="115" textAnchor="end" alignmentBaseline="middle" fontSize="10" fill="#64748b">0</text>
                        <text x="215" y="130" textAnchor="middle" fontSize="10" fill="#64748b">{maxT.toFixed(1)}s</text>
                        <text x="25" y="130" textAnchor="middle" fontSize="10" fill="#64748b">0</text>
                        <text x="25" y="15" textAnchor="middle" fontSize="10" fill="#64748b" fontWeight="bold">{yLabel}</text>
                        <text x="225" y="115" textAnchor="start" alignmentBaseline="middle" fontSize="10" fill="#64748b" fontWeight="bold">t(s)</text>
                        <path d={pathData} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                        <circle cx={scaleX(currentPoint.t) || -10} cy={scaleY(currentPoint[dataKey]) || -10} r="4" fill={color} />
                    </svg>
                </div>
            );
        };

        function App() {
            // UI 狀態
            const [activeTab, setActiveTab] = useState('formulas');

            // 物理狀態
            const [force, setForce] = useState(5);
            const [friction, setFriction] = useState(0);
            const [mass, setMass] = useState(2);
            
            // 模擬狀態
            const [isPlaying, setIsPlaying] = useState(false);
            const [simData, setSimData] = useState({ t: 0, s: 0, v: 0, a: 0 });
            // 使用 useRef 儲存歷史軌跡
            const historyRef = useRef([{ t: 0, s: 0, v: 0, a: 0 }]);
            
            const trackLength = 10;
            const lastTimeRef = useRef(null);
            const requestRef = useRef();

            // 測驗狀態
            const [qData, setQData] = useState({ type: 'find_a', m: 2, a: 2, f: 0, F: 4 });
            const [userAns, setUserAns] = useState('');
            const [feedback, setFeedback] = useState(null);

            // 重設動畫
            const resetSim = () => {
                setIsPlaying(false);
                setSimData({ t: 0, s: 0, v: 0, a: 0 });
                historyRef.current = [{ t: 0, s: 0, v: 0, a: 0 }];
                lastTimeRef.current = null;
            };

            // 動畫迴圈 (Euler Integration)
            useEffect(() => {
                if (!isPlaying) {
                    lastTimeRef.current = null;
                    cancelAnimationFrame(requestRef.current);
                    return;
                }

                const animate = (timestamp) => {
                    if (!lastTimeRef.current) lastTimeRef.current = timestamp;
                    // dt 乘上 0.5 稍微放慢播放速度以便觀察
                    const dt = ((timestamp - lastTimeRef.current) / 1000) * 0.5;
                    lastTimeRef.current = timestamp;

                    let currentS = simData.s;
                    let currentV = simData.v;
                    let currentT = simData.t;

                    if (currentS < trackLength) {
                        let currentA = (force - friction) / mass;
                        
                        // 靜摩擦力判斷：若推力小於摩擦力且物體靜止，則加速度為 0
                        if (currentA < 0 && currentV <= 0.01) {
                            currentA = 0;
                        }

                        let newV = currentV + currentA * dt;
                        // 不允許物體反向運動 (速度小於0)
                        if (newV < 0) {
                            newV = 0;
                            currentA = 0;
                        }

                        let newS = currentS + newV * dt;
                        let newT = currentT + dt;

                        if (newS >= trackLength) {
                            newS = trackLength;
                            setIsPlaying(false); // 抵達終點自動暫停
                        }

                        const newData = { t: newT, s: newS, v: newV, a: currentA };
                        historyRef.current.push(newData);
                        setSimData(newData);
                        
                        if (newS < trackLength) {
                            requestRef.current = requestAnimationFrame(animate);
                        }
                    }
                };

                requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, [isPlaying, force, friction, mass, simData]);

            // 每次重新渲染後更新 Lucide Icons
            useEffect(() => { lucide.createIcons(); });

            // 生成隨機題目
            const generateQuestion = () => {
                const types = ['find_a', 'find_F', 'find_m'];
                const type = types[Math.floor(Math.random() * types.length)];
                let m, a, f, F;
                do {
                    m = Math.floor(Math.random() * 4) + 1; // 1~4 kg
                    a = Math.floor(Math.random() * 3) + 1; // 1~3 m/s^2
                    f = Math.floor(Math.random() * 4);     // 0~3 N
                    F = m * a + f;
                } while (F > 20 || F < 1);

                setQData({ type, m, a, f, F });
                setUserAns('');
                setFeedback(null);
                setForce(5); setFriction(0); setMass(2);
                resetSim();
            };

            // 切換到練習模式時自動出題
            useEffect(() => {
                if (activeTab === 'practice' && !feedback && userAns === '') generateQuestion();
            }, [activeTab]);

            // 檢查答案
            const checkAnswer = () => {
                const userVal = parseFloat(userAns);
                if (isNaN(userVal)) {
                    setFeedback({ text: '⚠️ 請輸入有效的數字！', isCorrect: false });
                    return;
                }

                let target = 0;
                if (qData.type === 'find_a') target = qData.a;
                if (qData.type === 'find_F') target = qData.F;
                if (qData.type === 'find_m') target = qData.m;

                if (Math.abs(userVal - target) <= 0.1) {
                    setFeedback({ text: '✅ 答對了！非常精準！', isCorrect: true });
                } else {
                    setFeedback({ text: `❌ 不太對喔。可以利用右邊的儀器設定參數，觀察看看！`, isCorrect: false });
                }
            };

            // 實時推力/摩擦力計算
            const effectiveFriction = (simData.v === 0 && force < friction) ? force : friction;
            const displayA = (force - effectiveFriction) / mass;
            const isStuck = simData.v === 0 && force <= friction;
            const finished = simData.s >= trackLength;

            // 提取出的共用元件：控制儀器面板
            // 💡 修改：移除了 onChange 裡的 resetSim()，允許實時調整！
            const renderControlPanel = () => (
                <div className="space-y-6 bg-slate-100 p-6 rounded-xl border-2 border-slate-200 shadow-sm h-full flex flex-col justify-between">
                    <div>
                        <h2 className="text-xl font-bold border-b border-slate-300 pb-2 flex items-center gap-2 text-slate-800 mb-4">
                            <i data-lucide="sliders"></i> 實驗儀器面板
                        </h2>

                        <div className="mb-4">
                            <label className="flex justify-between font-bold mb-2 text-red-600">
                                <span>推力 (Force)</span><span>{force} N</span>
                            </label>
                            <input type="range" min="0" max="20" step="1" value={force} onChange={(e) => setForce(Number(e.target.value))} className="w-full h-2 bg-red-200 rounded-lg appearance-none cursor-pointer accent-red-600" />
                        </div>
                        <div className="mb-4">
                            <label className="flex justify-between font-bold mb-2 text-orange-600">
                                <span>摩擦力 (Friction)</span><span>{friction} N</span>
                            </label>
                            <input type="range" min="0" max="20" step="1" value={friction} onChange={(e) => setFriction(Number(e.target.value))} className="w-full h-2 bg-orange-200 rounded-lg appearance-none cursor-pointer accent-orange-600" />
                        </div>
                        <div className="mb-4">
                            <label className="flex justify-between font-bold mb-2 text-blue-600">
                                <span>質量 (Mass)</span><span>{mass} kg</span>
                            </label>
                            <input type="range" min="1" max="20" step="1" value={mass} onChange={(e) => setMass(Number(e.target.value))} className="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                        </div>
                    </div>

                    <div className="flex gap-4 pt-4 mt-auto">
                        <button onClick={() => setIsPlaying(!isPlaying)} disabled={finished || isStuck} className={`flex-1 flex justify-center items-center gap-2 py-3 px-4 rounded-lg font-bold text-white transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed ${isPlaying ? 'bg-amber-500 hover:bg-amber-600' : 'bg-green-500 hover:bg-green-600'}`}>
                            <i data-lucide={isPlaying ? 'pause' : 'play'} className="w-5 h-5"></i>
                            {isStuck ? '推不動！' : (isPlaying ? '暫停動畫' : '開始推動')}
                        </button>
                        <button onClick={resetSim} className="flex justify-center items-center gap-2 bg-slate-500 hover:bg-slate-600 text-white py-3 px-4 rounded-lg font-bold transition-colors shadow-md">
                            <i data-lucide="rotate-ccw" className="w-5 h-5"></i> 重設
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
                    {/* 頂部標題與導覽列 */}
                    <div className="bg-blue-600 p-6 text-white">
                        <div className="flex flex-col md:flex-row justify-between md:items-center gap-4">
                            <div>
                                <h1 className="text-3xl font-bold mb-2">牛頓第二運動定律</h1>
                                <p className="text-blue-100 flex items-center gap-2 text-sm">
                                    <i data-lucide="info" className="w-4 h-4"></i> 動畫進行中，您可以隨時改變推力與質量，觀察曲線的即時變化！
                                </p>
                            </div>
                            
                            <div className="flex bg-blue-800/50 p-1 rounded-lg gap-1">
                                <button onClick={() => setActiveTab('formulas')} className={`flex items-center gap-2 px-4 py-2 rounded-md transition-colors text-sm font-bold ${activeTab === 'formulas' ? 'bg-white text-blue-700 shadow-sm' : 'text-blue-100 hover:bg-blue-700/50'}`}>
                                    <i data-lucide="book-open" className="w-4 h-4"></i> 理論公式
                                </button>
                                <button onClick={() => setActiveTab('lab')} className={`flex items-center gap-2 px-4 py-2 rounded-md transition-colors text-sm font-bold ${activeTab === 'lab' ? 'bg-white text-blue-700 shadow-sm' : 'text-blue-100 hover:bg-blue-700/50'}`}>
                                    <i data-lucide="flask-conical" className="w-4 h-4"></i> 自由探索
                                </button>
                                <button onClick={() => setActiveTab('practice')} className={`flex items-center gap-2 px-4 py-2 rounded-md transition-colors text-sm font-bold ${activeTab === 'practice' ? 'bg-white text-blue-700 shadow-sm' : 'text-blue-100 hover:bg-blue-700/50'}`}>
                                    <i data-lucide="clipboard-list" className="w-4 h-4"></i> 無限練習
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="p-6 md:p-8">
                        {/* 1. 分頁: 理論公式 (Formulas) */}
                        {activeTab === 'formulas' && (
                            <div className="space-y-6 bg-sky-50 p-6 md:p-8 rounded-xl border border-sky-200 shadow-sm">
                                <h2 className="text-2xl font-bold border-b border-sky-200 pb-3 text-sky-800 flex items-center gap-2">
                                    <i data-lucide="book-open"></i> 理論公式總覽
                                </h2>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                                    <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-green-500">
                                        <h3 className="text-lg font-bold text-green-600 mb-2">1. 計算淨力 (Net Force)</h3>
                                        <p className="text-slate-600 mb-4 text-sm">當物體同時受到推力與摩擦力時，我們必須先算出兩者抵銷後的「淨力」。</p>
                                        <div className="bg-slate-50 p-2 rounded-lg border border-slate-100">
                                            {/* 💡 修改：加入中文下標 */}
                                            <LatexFormula tex="F_{\text{淨力}} = F_{\text{推力}} - f_{\text{摩擦力}}" />
                                        </div>
                                    </div>

                                    <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-purple-500">
                                        <h3 className="text-lg font-bold text-purple-600 mb-2">2. 牛頓第二定律</h3>
                                        {/* 💡 修改：修正符號顯示，改回乾淨文字 */}
                                        <p className="text-slate-600 mb-4 text-sm">物體的加速度 (a) 與所受的淨力成正比，與質量 (m) 成反比。</p>
                                        <div className="bg-slate-50 p-2 rounded-lg border border-slate-100">
                                            {/* 💡 修改：加入中文下標 */}
                                            <LatexFormula tex="a = \frac{F_{\text{淨力}}}{m}" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 2. 分頁: 自由探索 (Lab) */}
                        {activeTab === 'lab' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                {renderControlPanel()}

                                <div className="space-y-6 bg-sky-50 p-6 rounded-xl border border-sky-200 shadow-sm flex flex-col justify-center">
                                    <h2 className="text-xl font-bold border-b border-sky-200 pb-2 text-sky-800 flex items-center gap-2">
                                        <i data-lucide="bar-chart-2"></i> 觀察結果
                                    </h2>
                                    
                                    <div className="bg-white p-4 rounded-lg shadow-sm text-center border-l-4 border-purple-500">
                                        <p className="text-sm text-slate-500 mb-1 font-bold">公式： 加速度 = (推力 - 摩擦力) ÷ 質量</p>
                                        <div className="text-3xl font-mono font-bold flex justify-center items-center gap-3 mt-2">
                                            <span className="text-purple-600">a</span><span>=</span>
                                            <div className="flex flex-col items-center justify-center">
                                                <span className="text-slate-800 border-b-2 border-slate-800 px-2 whitespace-nowrap">
                                                    <span className="text-red-600">{force}</span> - <span className="text-orange-500">{effectiveFriction}</span>
                                                </span>
                                                <span className="text-blue-600 px-2">{mass}</span>
                                            </div>
                                            <span>=</span><span className="text-purple-600">{displayA.toFixed(2)}</span>
                                        </div>
                                        <p className="text-sm text-slate-500 mt-2">m/s²</p>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 text-center">
                                        <div className="bg-white p-3 rounded-lg shadow-sm border border-slate-100">
                                            <p className="text-sm text-slate-500 font-bold">目前速度 (v)</p>
                                            <p className="text-2xl font-bold font-mono text-cyan-600">{simData.v.toFixed(2)} <span className="text-sm font-normal text-slate-500">m/s</span></p>
                                        </div>
                                        <div className="bg-white p-3 rounded-lg shadow-sm border border-slate-100">
                                            <p className="text-sm text-slate-500 font-bold">經過時間 (t)</p>
                                            <p className="text-2xl font-bold font-mono text-slate-700">{simData.t.toFixed(2)} <span className="text-sm font-normal text-slate-500">s</span></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. 分頁: 無限練習 (Practice) */}
                        {activeTab === 'practice' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                <div className="bg-yellow-50 p-6 rounded-xl border-2 border-yellow-300 shadow-sm flex flex-col justify-center">
                                    <h2 className="text-xl font-bold border-b border-yellow-300 pb-3 text-yellow-800 flex items-center gap-2 mb-6">
                                        <i data-lucide="clipboard-list"></i> 任務挑戰
                                    </h2>
                                    
                                    <div className="bg-white p-6 rounded-xl shadow-sm text-lg text-slate-800 mb-6 border border-yellow-200">
                                        <p className="font-bold text-blue-600 mb-3 text-sm flex items-center gap-1">
                                            <i data-lucide="help-circle" className="w-4 h-4"></i> 請利用右側儀器做實驗，或用紙筆計算：
                                        </p>
                                        <div className="font-medium leading-relaxed">
                                            {qData.type === 'find_a' && <span>設定：推力 <strong className="text-red-600">{qData.F}N</strong>、摩擦力 <strong className="text-orange-500">{qData.f}N</strong>、質量 <strong className="text-blue-600">{qData.m}kg</strong>。此時的 <strong>加速度 (a)</strong> 是多少？</span>}
                                            {qData.type === 'find_F' && <span>質量 <strong className="text-blue-600">{qData.m}kg</strong>、摩擦力 <strong className="text-orange-500">{qData.f}N</strong>。若要產生 <strong className="text-green-600">{qData.a} m/s²</strong> 的加速度，<strong>推力 (F)</strong> 需要多少？</span>}
                                            {qData.type === 'find_m' && <span>推力 <strong className="text-red-600">{qData.F}N</strong>、摩擦力 <strong className="text-orange-500">{qData.f}N</strong> 產生了 <strong className="text-green-600">{qData.a} m/s²</strong> 的加速度。<strong>質量 (m)</strong> 是多少？</span>}
                                        </div>
                                    </div>

                                    <div className="flex flex-col sm:flex-row items-center gap-4">
                                        <div className="relative w-full sm:w-auto flex-1">
                                            <input type="number" value={userAns} onChange={(e) => setUserAns(e.target.value)} placeholder="輸入數字" className="border-2 border-slate-300 rounded-lg p-3 pl-4 pr-16 w-full text-xl font-bold focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" />
                                            <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">
                                                {qData.type === 'find_a' ? 'm/s²' : (qData.type === 'find_F' ? 'N' : 'kg')}
                                            </span>
                                        </div>
                                        <button onClick={checkAnswer} className="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold transition-colors shadow-md flex items-center justify-center gap-2 whitespace-nowrap">
                                            <i data-lucide="check-circle" className="w-5 h-5"></i> 提交答案
                                        </button>
                                    </div>

                                    {feedback && (
                                        <div className={`mt-6 p-4 rounded-xl font-bold flex flex-col sm:flex-row justify-between items-center gap-4 shadow-sm border ${feedback.isCorrect ? 'bg-green-100 text-green-800 border-green-300' : 'bg-red-100 text-red-800 border-red-300'}`}>
                                            <div className="flex items-center gap-2">
                                                <i data-lucide={feedback.isCorrect ? "check" : "x"} className="w-5 h-5"></i>
                                                {feedback.text}
                                            </div>
                                            {feedback.isCorrect && (
                                                <button onClick={generateQuestion} className="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg transition-colors shadow-md flex items-center justify-center gap-2">
                                                    下一題 <i data-lucide="arrow-right" className="w-4 h-4"></i>
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </div>
                                
                                {renderControlPanel()}
                            </div>
                        )}

                        {/* 動畫顯示與實時圖表區 (只在不是 'formulas' 頁面時渲染) */}
                        {activeTab !== 'formulas' && (
                            <div className="space-y-8">
                                <div>
                                    <h3 className="text-lg font-bold mb-4 text-slate-700 flex items-center gap-2">
                                        <i data-lucide="monitor-play" className="w-5 h-5"></i> 1. 實驗模擬畫面
                                    </h3>
                                    <div className="relative h-48 bg-sky-50 border-2 border-slate-300 rounded-xl overflow-hidden flex items-end pb-4 px-4 shadow-inner">
                                        {/* 背景格線 */}
                                        <div className="absolute inset-0 opacity-20 pointer-events-none" style={{ backgroundImage: 'linear-gradient(90deg, #cbd5e1 1px, transparent 1px)', backgroundSize: '10% 100%' }}></div>
                                        
                                        {/* 移動的容器 */}
                                        <div className="absolute bottom-4 flex items-center" style={{ left: `${Math.min((simData.s / trackLength) * 85, 85)}%`, zIndex: 10 }}>
                                            
                                            {/* 推力箭頭 */}
                                            {(isPlaying || simData.t === 0 || force > 0) && (
                                                <div className="flex items-center text-red-600 mr-1 absolute" style={{ transform: 'translateX(-100%)', left: 0 }}>
                                                    <div className="font-bold text-sm mr-1 whitespace-nowrap">推力 {force}N</div>
                                                    <div className="bg-red-600 h-1 transition-all duration-200" style={{ width: `${30 + force * 5}px` }}></div>
                                                    <div className="w-0 h-0 border-t-[4px] border-t-transparent border-l-[6px] border-l-red-600 border-b-[4px] border-b-transparent"></div>
                                                </div>
                                            )}
                                            
                                            {/* 質量方塊 */}
                                            <div className="bg-blue-500 border-2 border-blue-700 rounded-lg shadow-md flex items-center justify-center text-white font-bold relative transition-all duration-200" style={{ width: `${40 + mass * 4}px`, height: `${40 + mass * 4}px`, boxShadow: '4px 4px 0px rgba(0,0,0,0.1)' }}>
                                                <span>{mass}kg</span>
                                                
                                                {/* 摩擦力箭頭 */}
                                                {friction > 0 && (
                                                    <div className="flex items-center text-orange-500 absolute" style={{ right: '100%', bottom: '-2px' }}>
                                                        <div className="font-bold text-xs whitespace-nowrap absolute" style={{ bottom: '8px', right: '10px' }}>摩擦 {friction}N</div>
                                                        <div className="w-0 h-0 border-t-[4px] border-t-transparent border-r-[6px] border-r-orange-500 border-b-[4px] border-b-transparent"></div>
                                                        <div className="bg-orange-500 h-1 transition-all duration-200" style={{ width: `${30 + friction * 5}px` }}></div>
                                                    </div>
                                                )}
                                            </div>

                                        </div>
                                        {/* 地面 */}
                                        <div className="absolute bottom-0 left-0 right-0 h-4 bg-slate-400"></div>
                                    </div>
                                </div>

                                {/* 實時運動線圖 */}
                                <div>
                                    <h3 className="text-lg font-bold mb-4 text-slate-700 flex items-center gap-2">
                                        <i data-lucide="trending-up" className="w-5 h-5"></i> 2. 實時運動線圖
                                    </h3>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <LineChart title="位移-時間圖 (s-t)" yLabel="s (m)" color="#8b5cf6" dataKey="s" history={historyRef.current} simData={simData} staticMaxY={trackLength} />
                                        <LineChart title="速度-時間圖 (v-t)" yLabel="v (m/s)" color="#06b6d4" dataKey="v" history={historyRef.current} simData={simData} />
                                        <LineChart title="加速度-時間圖 (a-t)" yLabel="a (m/s²)" color="#22c55e" dataKey="a" history={historyRef.current} simData={simData} />
                                    </div>
                                    
                                    {activeTab === 'practice' && (
                                        <div className="text-center text-blue-600 font-bold mt-4 bg-blue-50 p-3 rounded-lg border border-blue-200 shadow-sm flex items-center justify-center gap-2">
                                            💡 試試看在車子移動的途中改變推力，看看 v-t 圖的「斜率」和 a-t 圖的「高低」會怎麼瞬間變化！
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
