<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>牛頓第二運動定律模擬器</title>
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 隱藏不想顯示的捲軸 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen p-4 md:p-8">

  <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    
    <!-- 標題與模式切換區 -->
    <div class="bg-blue-600 p-6 text-white">
      <div class="flex flex-col md:flex-row justify-between md:items-center gap-4">
        <div>
          <h1 class="text-3xl font-bold mb-2">牛頓第二運動定律</h1>
          <p class="text-blue-100 flex items-center gap-2">
            <i data-lucide="info" class="w-5 h-5"></i>
            動畫進行中，您可以隨時改變推力與質量，觀察曲線的即時變化！
          </p>
        </div>
        
        <div class="flex bg-blue-800/50 p-1 rounded-lg">
          <button id="btnExploreMode" class="flex items-center gap-2 px-4 py-2 rounded-md transition-colors bg-white text-blue-700 font-bold">
            <i data-lucide="flask-conical" class="w-5 h-5"></i> 自由探索
          </button>
          <button id="btnPracticeMode" class="flex items-center gap-2 px-4 py-2 rounded-md transition-colors text-blue-100 hover:bg-blue-700/50">
            <i data-lucide="clipboard-list" class="w-5 h-5"></i> 無限練習
          </button>
        </div>
      </div>
    </div>

    <div class="p-6 md:p-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
        
        <!-- 左側：滑桿控制區 -->
        <div class="space-y-6 bg-slate-100 p-6 rounded-xl border-2 border-slate-200">
          <h2 class="text-xl font-bold border-b border-slate-300 pb-2 flex items-center gap-2">實驗儀器面板</h2>
          
          <div>
            <label class="flex justify-between font-bold mb-2 text-red-600">
              <span>推力 (Force)</span><span id="lblForce">5 N</span>
            </label>
            <input type="range" id="inpForce" min="0" max="20" step="1" value="5" class="w-full h-2 bg-red-200 rounded-lg appearance-none cursor-pointer accent-red-600" />
          </div>
          <div>
            <label class="flex justify-between font-bold mb-2 text-orange-600">
              <span>摩擦力 (Friction)</span><span id="lblFriction">0 N</span>
            </label>
            <input type="range" id="inpFriction" min="0" max="20" step="1" value="0" class="w-full h-2 bg-orange-200 rounded-lg appearance-none cursor-pointer accent-orange-600" />
          </div>
          <div>
            <label class="flex justify-between font-bold mb-2 text-blue-600">
              <span>質量 (Mass)</span><span id="lblMass">2 kg</span>
            </label>
            <input type="range" id="inpMass" min="1" max="20" step="1" value="2" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
          </div>

          <div class="flex gap-4 pt-4">
            <button id="btnStart" class="flex-1 flex justify-center items-center gap-2 bg-green-500 hover:bg-green-600 text-white py-3 px-4 rounded-lg font-bold transition-colors disabled:opacity-50">
              <i data-lucide="play" class="w-5 h-5"></i> <span id="txtStartBtn">開始推動</span>
            </button>
            <button id="btnReset" class="flex justify-center items-center gap-2 bg-slate-500 hover:bg-slate-600 text-white py-3 px-4 rounded-lg font-bold transition-colors">
              <i data-lucide="rotate-ccw" class="w-5 h-5"></i> 重設
            </button>
          </div>
        </div>

        <!-- 右側：探索模式 -->
        <div id="panelExplore" class="space-y-6 bg-green-50 p-6 rounded-xl border border-green-200 flex flex-col justify-center">
          <h2 class="text-xl font-bold border-b border-green-200 pb-2 text-green-800">觀察結果</h2>
          <div class="bg-white p-4 rounded-lg shadow-sm text-center">
            <p class="text-sm text-slate-500 mb-1">公式： 加速度 = 淨力(推力 - 摩擦力) ÷ 質量</p>
            <div class="text-3xl font-mono font-bold flex justify-center items-center gap-3">
              <span class="text-green-600">a</span><span>=</span>
              <div class="flex flex-col items-center justify-center">
                <span class="text-slate-800 border-b-2 border-slate-800 px-2 whitespace-nowrap">
                  <span id="fmlaForce" class="text-red-600">5</span> - <span id="fmlaFriction" class="text-orange-500">0</span>
                </span>
                <span id="fmlaMass" class="text-blue-600 px-2">2</span>
              </div>
              <span>=</span><span id="fmlaA" class="text-green-600">2.50</span>
            </div>
            <p class="text-sm text-slate-500 mt-2">m/s²</p>
          </div>
          <div class="grid grid-cols-2 gap-4 text-center">
            <div class="bg-white p-3 rounded-lg shadow-sm">
              <p class="text-sm text-slate-500">目前速度 (v)</p>
              <p class="text-2xl font-bold font-mono text-cyan-600"><span id="valV">0.00</span> <span class="text-sm font-normal text-slate-500">m/s</span></p>
            </div>
            <div class="bg-white p-3 rounded-lg shadow-sm">
              <p class="text-sm text-slate-500">經過時間 (t)</p>
              <p class="text-2xl font-bold font-mono text-slate-700"><span id="valT">0.00</span> <span class="text-sm font-normal text-slate-500">s</span></p>
            </div>
          </div>
        </div>

        <!-- 右側：練習模式 (預設隱藏) -->
        <div id="panelPractice" class="hidden space-y-4 bg-yellow-50 p-6 rounded-xl border-2 border-yellow-300 flex flex-col justify-center">
          <h2 class="text-xl font-bold border-b border-yellow-300 pb-2 text-yellow-800 flex items-center gap-2">
            <i data-lucide="clipboard-list" class="w-5 h-5"></i> 任務挑戰
          </h2>
          
          <div class="bg-white p-5 rounded-lg shadow-sm text-lg text-slate-700">
            <p class="font-bold text-blue-600 mb-2 text-sm">請利用左側儀器做實驗，或用紙筆計算：</p>
            <div id="qText"></div>
          </div>

          <div class="flex items-center gap-3 mt-2">
            <input type="number" id="inpAns" placeholder="輸入數字" class="border-2 border-slate-300 rounded-lg p-2 w-28 text-center text-xl font-bold focus:border-blue-500 outline-none" />
            <span id="lblAnsUnit" class="font-bold text-slate-500">m/s²</span>
            <button id="btnSubmitAns" class="ml-auto bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-bold transition-colors">提交答案</button>
          </div>

          <!-- 答題回饋區 -->
          <div id="fbCorrect" class="hidden bg-green-100 text-green-700 p-4 rounded-lg border border-green-300 font-bold flex justify-between items-center animate-pulse">
            <span class="flex items-center gap-2"><i data-lucide="check-circle" class="w-5 h-5"></i> 答對了！</span>
            <button id="btnNextQ" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors">下一題</button>
          </div>
          <div id="fbWrong" class="hidden bg-red-100 text-red-700 p-3 rounded-lg border border-red-300 font-bold flex items-center gap-2">
            <i data-lucide="x-circle" class="w-5 h-5"></i> 答案不對喔。利用滑桿動手實驗看看！
          </div>
        </div>

      </div>

      <!-- 動畫顯示區 -->
      <div class="mb-8">
        <h3 class="text-lg font-bold mb-4 text-slate-700">1. 實驗模擬畫面</h3>
        <div class="relative h-48 bg-sky-50 border-2 border-slate-300 rounded-lg overflow-hidden flex items-end pb-4 px-4 shadow-inner">
          <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: linear-gradient(90deg, #cbd5e1 1px, transparent 1px); background-size: 10% 100%;"></div>
          
          <!-- 移動的容器 -->
          <div id="animContainer" class="absolute bottom-4 flex items-center" style="left: 0%; z-index: 10;">
            
            <!-- 推力箭頭 -->
            <div id="forceArrow" class="flex items-center text-red-600 mr-1" style="transform: translateX(-100%); position: absolute; left: 0;">
              <div id="forceArrowLbl" class="font-bold text-sm mr-1 whitespace-nowrap">推力 5N</div>
              <div id="forceArrowLine" class="bg-red-600 h-1 transition-all duration-200" style="width: 55px;"></div>
              <div class="w-0 h-0 border-t-[4px] border-t-transparent border-l-[6px] border-l-red-600 border-b-[4px] border-b-transparent"></div>
            </div>
            
            <!-- 質量方塊 -->
            <div id="massBox" class="bg-blue-500 border-2 border-blue-700 rounded shadow-md flex items-center justify-center text-white font-bold relative transition-all duration-200" style="width: 48px; height: 48px; box-shadow: 4px 4px 0px rgba(0,0,0,0.1);">
              <span id="massBoxLbl">2kg</span>
              
              <!-- 摩擦力箭頭 -->
              <div id="frictionArrow" class="hidden flex items-center text-orange-500 absolute" style="right: 100%; bottom: -2px;">
                <div id="frictionArrowLbl" class="font-bold text-xs whitespace-nowrap absolute" style="bottom: 8px; right: 10px;">摩擦 0N</div>
                <div class="w-0 h-0 border-t-[4px] border-t-transparent border-r-[6px] border-r-orange-500 border-b-[4px] border-b-transparent"></div>
                <div id="frictionArrowLine" class="bg-orange-500 h-1 transition-all duration-200" style="width: 30px;"></div>
              </div>
            </div>

          </div>
          <div class="absolute bottom-0 left-0 right-0 h-4 bg-slate-400"></div>
        </div>
      </div>

      <!-- 實時運動線圖 -->
      <div>
        <h3 class="text-lg font-bold mb-4 text-slate-700">2. 實時運動線圖</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="graphContainer">
          <!-- 圖表會透過 JS 動態生成 -->
        </div>
        <div id="practiceHint" class="hidden text-center text-blue-600 font-bold mt-4 bg-blue-50 p-2 rounded-lg">
          💡 試試看在車子移動的途中改變推力，看看 v-t 圖的「斜率」和 a-t 圖的「高低」會怎麼瞬間變化！
        </div>
      </div>

    </div>
  </div>

  <script>
    // 初始化 Lucide 圖標
    lucide.createIcons();

    // --- 應用程式狀態 ---
    const state = {
      mode: 'explore', // 'explore' or 'practice'
      force: 5,
      friction: 0,
      mass: 2,
      isAnimating: false,
      qData: null,
      qStatus: 'idle', // 'idle', 'correct', 'wrong'
      simData: { t: 0, s: 0, v: 0, a: 0 },
      history: [{ t: 0, s: 0, v: 0, a: 0 }]
    };

    const trackLength = 10;
    let animationFrameId = null;
    let lastTimestamp = null;

    // --- DOM 元素綁定 ---
    const els = {
      // 模式
      btnExplore: document.getElementById('btnExploreMode'),
      btnPractice: document.getElementById('btnPracticeMode'),
      panelExplore: document.getElementById('panelExplore'),
      panelPractice: document.getElementById('panelPractice'),
      practiceHint: document.getElementById('practiceHint'),
      
      // 輸入控制
      inpForce: document.getElementById('inpForce'),
      inpFriction: document.getElementById('inpFriction'),
      inpMass: document.getElementById('inpMass'),
      lblForce: document.getElementById('lblForce'),
      lblFriction: document.getElementById('lblFriction'),
      lblMass: document.getElementById('lblMass'),
      btnStart: document.getElementById('btnStart'),
      txtStartBtn: document.getElementById('txtStartBtn'),
      btnReset: document.getElementById('btnReset'),
      
      // 動畫
      animContainer: document.getElementById('animContainer'),
      massBox: document.getElementById('massBox'),
      massBoxLbl: document.getElementById('massBoxLbl'),
      forceArrow: document.getElementById('forceArrow'),
      forceArrowLine: document.getElementById('forceArrowLine'),
      forceArrowLbl: document.getElementById('forceArrowLbl'),
      frictionArrow: document.getElementById('frictionArrow'),
      frictionArrowLine: document.getElementById('frictionArrowLine'),
      frictionArrowLbl: document.getElementById('frictionArrowLbl'),
      
      // 探索數據
      fmlaForce: document.getElementById('fmlaForce'),
      fmlaFriction: document.getElementById('fmlaFriction'),
      fmlaMass: document.getElementById('fmlaMass'),
      fmlaA: document.getElementById('fmlaA'),
      valV: document.getElementById('valV'),
      valT: document.getElementById('valT'),
      
      // 練習區
      qText: document.getElementById('qText'),
      inpAns: document.getElementById('inpAns'),
      lblAnsUnit: document.getElementById('lblAnsUnit'),
      btnSubmitAns: document.getElementById('btnSubmitAns'),
      fbCorrect: document.getElementById('fbCorrect'),
      fbWrong: document.getElementById('fbWrong'),
      btnNextQ: document.getElementById('btnNextQ'),

      // 圖表容器
      graphContainer: document.getElementById('graphContainer')
    };

    // --- 圖表系統 ---
    const graphConfigs = [
      { id: 's', title: '位移-時間圖 (s-t)', yLabel: 's (m)', color: '#8b5cf6', dataKey: 's', staticMaxY: trackLength },
      { id: 'v', title: '速度-時間圖 (v-t)', yLabel: 'v (m/s)', color: '#06b6d4', dataKey: 'v', staticMaxY: null },
      { id: 'a', title: '加速度-時間圖 (a-t)', yLabel: 'a (m/s²)', color: '#22c55e', dataKey: 'a', staticMaxY: null }
    ];

    function initGraphs() {
      els.graphContainer.innerHTML = '';
      graphConfigs.forEach(cfg => {
        const div = document.createElement('div');
        div.className = "bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center w-full";
        div.innerHTML = `
          <h4 class="font-bold text-slate-700 mb-1">${cfg.title}</h4>
          <svg viewBox="0 0 240 140" class="w-full h-auto overflow-visible">
            <line x1="25" y1="25" x2="25" y2="115" stroke="#cbd5e1" stroke-width="2" />
            <line x1="25" y1="115" x2="215" y2="115" stroke="#cbd5e1" stroke-width="2" />
            <text id="g-${cfg.id}-maxY" x="20" y="25" text-anchor="end" alignment-baseline="middle" font-size="10" fill="#64748b">5.0</text>
            <text x="20" y="115" text-anchor="end" alignment-baseline="middle" font-size="10" fill="#64748b">0</text>
            <text id="g-${cfg.id}-maxT" x="215" y="130" text-anchor="middle" font-size="10" fill="#64748b">5.0s</text>
            <text x="25" y="130" text-anchor="middle" font-size="10" fill="#64748b">0</text>
            <text x="25" y="15" text-anchor="middle" font-size="10" fill="#64748b" font-weight="bold">${cfg.yLabel}</text>
            <text x="225" y="115" text-anchor="start" alignment-baseline="middle" font-size="10" fill="#64748b" font-weight="bold">t(s)</text>
            <path id="g-${cfg.id}-path" d="" fill="none" stroke="${cfg.color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
            <circle id="g-${cfg.id}-dot" cx="-10" cy="-10" r="4" fill="${cfg.color}" />
          </svg>
        `;
        els.graphContainer.appendChild(div);
      });
    }

    function renderGraphs() {
      let peakV = 5, peakA = 5;
      for (let i = 0; i < state.history.length; i++) {
        if (state.history[i].v > peakV) peakV = state.history[i].v;
        if (state.history[i].a > peakA) peakA = state.history[i].a;
      }
      
      const maxT = Math.max(5, state.simData.t * 1.2);
      
      graphConfigs.forEach(cfg => {
        let maxY = cfg.staticMaxY;
        if (cfg.id === 'v') maxY = Math.max(5, peakV * 1.2);
        if (cfg.id === 'a') maxY = Math.max(5, peakA * 1.2);

        document.getElementById(`g-${cfg.id}-maxY`).textContent = maxY.toFixed(1);
        document.getElementById(`g-${cfg.id}-maxT`).textContent = maxT.toFixed(1) + 's';

        const scaleX = (t) => 25 + (t / maxT) * 190;
        const scaleY = (y) => 115 - (y / Math.max(maxY, 0.1)) * 90;

        const pathEl = document.getElementById(`g-${cfg.id}-path`);
        const dotEl = document.getElementById(`g-${cfg.id}-dot`);

        if (state.history.length > 0) {
          const pathData = `M ${state.history.map(h => `${scaleX(h.t)},${scaleY(h[cfg.dataKey])}`).join(' L ')}`;
          pathEl.setAttribute('d', pathData);
          
          const currentPoint = state.history[state.history.length - 1];
          dotEl.setAttribute('cx', scaleX(currentPoint.t));
          dotEl.setAttribute('cy', scaleY(currentPoint[cfg.dataKey]));
        } else {
          pathEl.setAttribute('d', '');
          dotEl.setAttribute('cx', -10);
        }
      });
    }

    // --- 實時物理引擎 (Euler Integration) ---
    function animate(timestamp) {
      if (!lastTimestamp) lastTimestamp = timestamp;
      const dt = (timestamp - lastTimestamp) / 1000 * 0.5; // 放慢 0.5 倍速
      lastTimestamp = timestamp;

      let stopNow = false;

      if (state.simData.s >= trackLength) {
        stopNow = true;
      } else {
        let currentA = (state.force - state.friction) / state.mass;
        if (currentA < 0 && state.simData.v <= 0.01) {
          currentA = 0;
        }

        let newV = state.simData.v + currentA * dt;
        if (newV < 0) {
          newV = 0;
          currentA = 0;
        }

        let newS = state.simData.s + newV * dt;
        let newT = state.simData.t + dt;

        if (newS >= trackLength) {
          newS = trackLength;
          stopNow = true;
        }

        state.simData = { t: newT, s: newS, v: newV, a: currentA };
        state.history.push(state.simData);
      }

      updateUI();

      if (!stopNow && state.isAnimating) {
        animationFrameId = requestAnimationFrame(animate);
      } else {
        state.isAnimating = false;
        lastTimestamp = null;
        updateUI();
      }
    }

    // --- 核心更新 UI 邏輯 ---
    function updateUI() {
      // 面板控制數值
      els.lblForce.textContent = `${state.force} N`;
      els.lblFriction.textContent = `${state.friction} N`;
      els.lblMass.textContent = `${state.mass} kg`;
      
      els.inpForce.value = state.force;
      els.inpFriction.value = state.friction;
      els.inpMass.value = state.mass;

      // 判斷按鈕狀態
      const isStuck = state.simData.v === 0 && state.force <= state.friction;
      const finished = state.simData.s >= trackLength;
      
      els.btnStart.disabled = state.isAnimating || finished || isStuck;
      els.txtStartBtn.textContent = isStuck ? '推不動！' : '開始推動';

      // 探索模式的公式面板
      const effectiveFriction = (state.simData.v === 0 && state.force < state.friction) ? state.force : state.friction;
      const displayA = (state.force - effectiveFriction) / state.mass;
      
      els.fmlaForce.textContent = state.force;
      els.fmlaFriction.textContent = effectiveFriction;
      els.fmlaMass.textContent = state.mass;
      els.fmlaA.textContent = displayA.toFixed(2);
      els.valV.textContent = state.simData.v.toFixed(2);
      els.valT.textContent = state.simData.t.toFixed(2);

      // 動畫畫面更新
      const positionPercent = Math.min((state.simData.s / trackLength) * 85, 85);
      els.animContainer.style.left = `${positionPercent}%`;
      
      const boxSize = 40 + state.mass * 4;
      els.massBox.style.width = `${boxSize}px`;
      els.massBox.style.height = `${boxSize}px`;
      els.massBoxLbl.textContent = `${state.mass}kg`;

      // 推力與摩擦力箭頭
      if (state.isAnimating || state.simData.t === 0 || state.force > 0) {
        els.forceArrow.classList.remove('hidden');
        els.forceArrowLbl.textContent = `推力 ${state.force}N`;
        els.forceArrowLine.style.width = `${30 + state.force * 5}px`;
      } else {
        els.forceArrow.classList.add('hidden');
      }

      if (state.friction > 0) {
        els.frictionArrow.classList.remove('hidden');
        els.frictionArrowLbl.textContent = `摩擦 ${state.friction}N`;
        els.frictionArrowLine.style.width = `${30 + state.friction * 5}px`;
      } else {
        els.frictionArrow.classList.add('hidden');
      }

      // 繪製圖表
      renderGraphs();
    }

    // --- 事件綁定與功能 ---
    function setMode(newMode) {
      state.mode = newMode;
      if (newMode === 'explore') {
        els.btnExplore.className = "flex items-center gap-2 px-4 py-2 rounded-md transition-colors bg-white text-blue-700 font-bold";
        els.btnPractice.className = "flex items-center gap-2 px-4 py-2 rounded-md transition-colors text-blue-100 hover:bg-blue-700/50";
        els.panelExplore.classList.remove('hidden');
        els.panelPractice.classList.add('hidden');
        els.practiceHint.classList.add('hidden');
      } else {
        els.btnPractice.className = "flex items-center gap-2 px-4 py-2 rounded-md transition-colors bg-white text-blue-700 font-bold";
        els.btnExplore.className = "flex items-center gap-2 px-4 py-2 rounded-md transition-colors text-blue-100 hover:bg-blue-700/50";
        els.panelPractice.classList.remove('hidden');
        els.panelExplore.classList.add('hidden');
        els.practiceHint.classList.remove('hidden');
        if (!state.qData) generateQuestion();
      }
    }

    els.btnExplore.addEventListener('click', () => setMode('explore'));
    els.btnPractice.addEventListener('click', () => setMode('practice'));

    // 滑桿事件 (直接改變 state，動畫迴圈會實時抓取)
    els.inpForce.addEventListener('input', (e) => { state.force = Number(e.target.value); updateUI(); });
    els.inpFriction.addEventListener('input', (e) => { state.friction = Number(e.target.value); updateUI(); });
    els.inpMass.addEventListener('input', (e) => { state.mass = Number(e.target.value); updateUI(); });

    els.btnStart.addEventListener('click', () => {
      if (state.simData.s >= trackLength) {
        handleReset();
      }
      state.isAnimating = true;
      lastTimestamp = null;
      animationFrameId = requestAnimationFrame(animate);
      updateUI();
    });

    els.btnReset.addEventListener('click', handleReset);

    function handleReset() {
      state.isAnimating = false;
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      state.simData = { t: 0, s: 0, v: 0, a: 0 };
      state.history = [{ t: 0, s: 0, v: 0, a: 0 }];
      updateUI();
    }

    // --- 練習任務邏輯 ---
    function generateQuestion() {
      const types = ['find_a', 'find_F', 'find_m'];
      const type = types[Math.floor(Math.random() * types.length)];
      let m, a, f, F;
      do {
        m = Math.floor(Math.random() * 4) + 1; 
        a = Math.floor(Math.random() * 3) + 1; 
        f = Math.floor(Math.random() * 4);     
        F = m * a + f;
      } while (F > 20 || F < 1);

      state.qData = { type, m, a, f, F };
      els.inpAns.value = '';
      setQStatus('idle');
      
      // 更新題目文字
      if (type === 'find_a') {
        els.qText.innerHTML = `設定：推力 <strong class="text-red-600">${F}N</strong>、摩擦力 <strong class="text-orange-500">${f}N</strong>、質量 <strong class="text-blue-600">${m}kg</strong>。此時的 <strong>加速度 (a)</strong> 是多少？`;
        els.lblAnsUnit.textContent = 'm/s²';
      } else if (type === 'find_F') {
        els.qText.innerHTML = `質量 <strong class="text-blue-600">${m}kg</strong>、摩擦力 <strong class="text-orange-500">${f}N</strong>。若要產生 <strong class="text-green-600">${a} m/s²</strong> 的加速度，<strong>推力 (F)</strong> 需要多少？`;
        els.lblAnsUnit.textContent = 'N';
      } else {
        els.qText.innerHTML = `推力 <strong class="text-red-600">${F}N</strong>、摩擦力 <strong class="text-orange-500">${f}N</strong> 產生了 <strong class="text-green-600">${a} m/s²</strong> 的加速度。<strong>質量 (m)</strong> 是多少？`;
        els.lblAnsUnit.textContent = 'kg';
      }

      state.force = 5; state.friction = 0; state.mass = 2;
      handleReset();
    }

    function setQStatus(status) {
      state.qStatus = status;
      if (status === 'correct') {
        els.fbCorrect.classList.remove('hidden');
        els.fbWrong.classList.add('hidden');
      } else if (status === 'wrong') {
        els.fbWrong.classList.remove('hidden');
        els.fbCorrect.classList.add('hidden');
      } else {
        els.fbCorrect.classList.add('hidden');
        els.fbWrong.classList.add('hidden');
      }
    }

    els.btnSubmitAns.addEventListener('click', () => {
      const val = parseFloat(els.inpAns.value);
      if (isNaN(val)) return;
      let target = state.qData.type === 'find_a' ? state.qData.a : (state.qData.type === 'find_F' ? state.qData.F : state.qData.m);
      setQStatus(val === target ? 'correct' : 'wrong');
    });

    els.inpAns.addEventListener('input', () => setQStatus('idle'));
    els.btnNextQ.addEventListener('click', generateQuestion);

    // --- 啟動 ---
    initGraphs();
    updateUI();

  </script>
</body>
</html>
