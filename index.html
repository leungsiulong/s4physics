<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物理科學習目錄</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
  :root {
    --bg-primary: #f0f4fc;
    --bg-secondary: #e3e9f7;
    --bg-card: rgba(255, 255, 255, 0.85);
    --text-primary: #1a1f3d;
    --text-secondary: #5c6284;
    --accent-1: #5c2de0;
    --accent-2: #2b6ff2;
    --accent-3: #0098b5;
    --glow-1: rgba(92, 45, 224, 0.15);
    --glow-2: rgba(43, 111, 242, 0.15);
    --glow-3: rgba(0, 152, 181, 0.12);
    --border-color: rgba(92, 45, 224, 0.18);
    --card-hover-bg: rgba(255, 255, 255, 0.95);
    --grid-color: rgba(92, 45, 224, 0.06);
    --orb-alpha: 0.06;
    --particle-opacity: 0.35;
    --section1-color: #e65100;
    --section1-bg: rgba(230, 81, 0, 0.1);
    --section1-hover-shadow: rgba(230, 81, 0, 0.15);
    --section2-color: #00873e;
    --section2-bg: rgba(0, 135, 62, 0.1);
    --section2-hover-shadow: rgba(0, 135, 62, 0.15);
    --section3-color: #1565c0;
    --section3-bg: rgba(21, 101, 192, 0.1);
    --section3-hover-shadow: rgba(21, 101, 192, 0.15);
    --formula-color: rgba(92, 45, 224, 0.2);
    --back-hover-bg: rgba(43, 111, 242, 0.08);
  }

  html.dark {
    --bg-primary: #0a0e27;
    --bg-secondary: #111640;
    --bg-card: rgba(25, 32, 80, 0.7);
    --text-primary: #e8eaf6;
    --text-secondary: #9fa8da;
    --accent-1: #7c4dff;
    --accent-2: #448aff;
    --accent-3: #00e5ff;
    --glow-1: rgba(124, 77, 255, 0.4);
    --glow-2: rgba(68, 138, 255, 0.4);
    --glow-3: rgba(0, 229, 255, 0.3);
    --border-color: rgba(124, 77, 255, 0.25);
    --card-hover-bg: rgba(40, 50, 110, 0.8);
    --grid-color: rgba(124, 77, 255, 0.04);
    --orb-alpha: 0.08;
    --particle-opacity: 0.3;
    --section1-color: #ff9100;
    --section1-bg: rgba(255, 109, 0, 0.15);
    --section1-hover-shadow: rgba(255, 109, 0, 0.2);
    --section2-color: #69f0ae;
    --section2-bg: rgba(0, 200, 83, 0.15);
    --section2-hover-shadow: rgba(0, 200, 83, 0.2);
    --section3-color: #42a5f5;
    --section3-bg: rgba(66, 165, 245, 0.15);
    --section3-hover-shadow: rgba(66, 165, 245, 0.2);
    --formula-color: rgba(124, 77, 255, 0.25);
    --back-hover-bg: rgba(68, 138, 255, 0.1);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background */
  .bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* Grid overlay */
  .grid-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Floating particles */
  .particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatParticle linear infinite;
    opacity: var(--particle-opacity);
  }

  @keyframes floatParticle {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: var(--particle-opacity); }
    90% { opacity: var(--particle-opacity); }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* Container */
  .container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
  }

  /* Views */
  .view {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 600px;
  }

  .view.active {
    display: flex;
    animation: viewIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .view.exit {
    display: flex;
    animation: viewOut 0.4s cubic-bezier(0.55, 0, 1, 0.45) forwards;
  }

  @keyframes viewIn {
    0% { opacity: 0; transform: translateY(30px) scale(0.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes viewOut {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-20px) scale(0.96); }
  }

  /* Header area */
  .header-icon {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.5rem;
    box-shadow: 0 8px 32px var(--glow-1);
    animation: iconPulse 3s ease-in-out infinite;
    position: relative;
  }

  .header-icon::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
    z-index: -1;
    opacity: 0.4;
    filter: blur(8px);
    animation: iconGlow 3s ease-in-out infinite alternate;
  }

  @keyframes iconPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  @keyframes iconGlow {
    0% { opacity: 0.3; }
    100% { opacity: 0.6; }
  }

  .header-icon i {
    font-size: 2rem;
    color: white;
  }

  .title {
    font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
    font-size: 1.5rem;
    font-weight: 900;
    text-align: center;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }

  .subtitle {
    font-size: 0.95rem;
    color: var(--text-secondary);
    text-align: center;
    margin-bottom: 2.5rem;
    line-height: 1.6;
  }

  /* Chapter card button */
  .chapter-card {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 1.8rem 1.5rem;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    overflow: hidden;
    text-align: left;
    font-family: inherit;
    color: inherit;
    outline: none;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  :root .chapter-card {
    box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
  }

  html.dark .chapter-card {
    box-shadow: none;
  }

  :root .section-card {
    box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
  }

  html.dark .section-card {
    box-shadow: none;
  }

  .chapter-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    background: linear-gradient(to bottom, var(--accent-1), var(--accent-3));
    border-radius: 4px 0 0 4px;
    transition: width 0.35s ease;
  }

  .chapter-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 80% 50%, var(--glow-2), transparent 60%);
    opacity: 0;
    transition: opacity 0.35s ease;
  }

  .chapter-card:hover, .chapter-card:focus-visible {
    background: var(--card-hover-bg);
    border-color: var(--accent-2);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px var(--glow-1), 0 4px 16px var(--glow-2);
  }

  .chapter-card:hover::before {
    width: 6px;
  }

  .chapter-card:hover::after {
    opacity: 0.15;
  }

  .chapter-card:active {
    transform: translateY(-1px) scale(0.99);
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }

  .card-info {
    flex: 1;
  }

  .card-badge {
    display: inline-block;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent-3);
    background: rgba(0, 229, 255, 0.1);
    border: 1px solid rgba(0, 229, 255, 0.2);
    padding: 0.25rem 0.7rem;
    border-radius: 20px;
    margin-bottom: 0.7rem;
  }

  .card-title {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 0.4rem;
  }

  .card-desc {
    font-size: 0.85rem;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .card-arrow {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: rgba(124, 77, 255, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-left: 1rem;
    transition: all 0.35s ease;
    position: relative;
    z-index: 1;
  }

  .card-arrow i {
    font-size: 1rem;
    color: var(--accent-2);
    transition: transform 0.35s ease;
  }

  .chapter-card:hover .card-arrow {
    background: rgba(124, 77, 255, 0.3);
  }

  .chapter-card:hover .card-arrow i {
    transform: translateX(3px);
  }

  /* Section cards (sub-chapter) */
  .section-cards {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
  }

  .section-card {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 1.5rem;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: block;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .section-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 4px;
    border-radius: 4px 0 0 4px;
    transition: width 0.35s ease;
  }

  .section-card:nth-child(1)::before {
    background: var(--section1-color);
  }

  .section-card:nth-child(2)::before {
    background: var(--section2-color);
  }

  .section-card:nth-child(3)::before {
    background: var(--section3-color);
  }

  .section-card::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.35s ease;
  }

  .section-card:nth-child(1)::after {
    background: radial-gradient(circle at 80% 50%, var(--section1-hover-shadow), transparent 60%);
  }

  .section-card:nth-child(2)::after {
    background: radial-gradient(circle at 80% 50%, var(--section2-hover-shadow), transparent 60%);
  }

  .section-card:nth-child(3)::after {
    background: radial-gradient(circle at 80% 50%, var(--section3-hover-shadow), transparent 60%);
  }

  .section-card:hover {
    background: var(--card-hover-bg);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }

  .section-card:nth-child(1):hover {
    border-color: var(--section1-color);
    box-shadow: 0 12px 40px var(--section1-hover-shadow);
  }

  .section-card:nth-child(2):hover {
    border-color: var(--section2-color);
    box-shadow: 0 12px 40px var(--section2-hover-shadow);
  }

  .section-card:nth-child(3):hover {
    border-color: var(--section3-color);
    box-shadow: 0 12px 40px var(--section3-hover-shadow);
  }

  .section-card:hover::before { width: 6px; }
  .section-card:hover::after { opacity: 1; }

  .section-card:active {
    transform: translateY(-1px) scale(0.99);
  }

  .section-inner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-icon {
    width: 50px;
    height: 50px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 1rem;
    flex-shrink: 0;
  }

  .section-card:nth-child(1) .section-icon {
    background: var(--section1-bg);
    color: var(--section1-color);
  }

  .section-card:nth-child(2) .section-icon {
    background: var(--section2-bg);
    color: var(--section2-color);
  }

  .section-card:nth-child(3) .section-icon {
    background: var(--section3-bg);
    color: var(--section3-color);
  }

  .section-icon i {
    font-size: 1.25rem;
  }

  .section-info {
    flex: 1;
  }

  .section-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    margin-bottom: 0.35rem;
    opacity: 0.7;
  }

  .section-card:nth-child(1) .section-num { color: var(--section1-color); }
  .section-card:nth-child(2) .section-num { color: var(--section2-color); }
  .section-card:nth-child(3) .section-num { color: var(--section3-color); }

  .section-title {
    font-size: 1.1rem;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 0.3rem;
  }

  .section-desc {
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  .section-arrow {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-left: 0.75rem;
    transition: all 0.35s ease;
  }

  .section-card:nth-child(1) .section-arrow {
    background: var(--section1-bg);
    color: var(--section1-color);
  }

  .section-card:nth-child(2) .section-arrow {
    background: var(--section2-bg);
    color: var(--section2-color);
  }

  .section-card:nth-child(3) .section-arrow {
    background: var(--section3-bg);
    color: var(--section3-color);
  }

  .section-arrow i {
    font-size: 0.85rem;
    transition: transform 0.35s ease;
  }

  .section-card:hover .section-arrow i {
    transform: translateX(3px);
  }

  /* Back button */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: none;
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    padding: 0.5rem 1rem;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 2rem;
    align-self: flex-start;
    backdrop-filter: blur(8px);
  }

  .back-btn:hover {
    color: var(--text-primary);
    border-color: var(--accent-2);
    background: var(--back-hover-bg);
  }

  .back-btn i {
    transition: transform 0.3s ease;
  }

  .back-btn:hover i {
    transform: translateX(-3px);
  }

  /* Stagger animation */
  .stagger-1 { animation-delay: 0.1s; }
  .stagger-2 { animation-delay: 0.2s; }
  .stagger-3 { animation-delay: 0.3s; }
  .stagger-4 { animation-delay: 0.4s; }
  .stagger-5 { animation-delay: 0.5s; }

  .fade-up {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Formula decoration */
  .formula-decoration {
    font-family: 'Orbitron', serif;
    font-size: 0.75rem;
    color: var(--formula-color);
    letter-spacing: 2px;
    margin-top: 3rem;
    text-align: center;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .container { padding: 1.5rem 1rem; }
    .title { font-size: 1.25rem; }
    .card-title { font-size: 1.1rem; }
    .section-title { font-size: 1rem; }
    .header-icon { width: 64px; height: 64px; }
    .header-icon i { font-size: 1.6rem; }
    .section-icon { width: 42px; height: 42px; }
  }
</style>
</head>
<body>
<canvas class="bg-canvas" id="bgCanvas"></canvas>
<div class="grid-overlay"></div>
<div class="particles" id="particles"></div>

<div class="container">
  <!-- View 1: Main Menu -->
  <div class="view active" id="viewMain">
    <div class="header-icon fade-up stagger-1">
      <i class="fas fa-atom"></i>
    </div>
    <h1 class="title fade-up stagger-2">物理科學習平台</h1>
    <p class="subtitle fade-up stagger-3">Physics Learning Platform</p>

    <button class="chapter-card fade-up stagger-4" onclick="navigateTo('viewChapter3')" aria-label="進入第三課 力與運動">
      <div class="card-top">
        <div class="card-info">
          <span class="card-badge">Chapter 3</span>
          <div class="card-title">Ch3 力與運動(I)</div>
          <div class="card-desc">Force and Motion — 牛頓運動定律</div>
        </div>
        <div class="card-arrow">
          <i class="fas fa-arrow-right"></i>
        </div>
      </div>
    </button>

    <div class="formula-decoration fade-up stagger-4">F = m · a</div>
  </div>

  <!-- View 2: Chapter 3 Sub-sections -->
  <div class="view" id="viewChapter3">
    <button class="back-btn fade-up stagger-1" onclick="navigateTo('viewMain')" aria-label="返回主頁">
      <i class="fas fa-arrow-left"></i>
      <span>返回主頁</span>
    </button>

    <div class="header-icon fade-up stagger-1" style="background: linear-gradient(135deg, #ff6d00, #00c853);">
      <i class="fas fa-rocket"></i>
    </div>
    <h1 class="title fade-up stagger-2">Ch3 力與運動(I)</h1>
    <p class="subtitle fade-up stagger-3">選擇以下課題開始學習</p>

    <div class="section-cards">
      <a class="section-card fade-up stagger-3"
         href="https://leungsiulong.github.io/s4physics/Ch3/力"
         target="_blank"
         rel="noopener noreferrer"
         aria-label="Ch3.1 力">
        <div class="section-inner">
          <div class="section-icon">
            <i class="fas fa-hand-fist"></i>
          </div>
          <div class="section-info">
            <div class="section-num">SECTION 3.1</div>
            <div class="section-title">3.1 力</div>
            <div class="section-desc">Force</div>
          </div>
          <div class="section-arrow">
            <i class="fas fa-external-link-alt"></i>
          </div>
        </div>
      </a>

      <a class="section-card fade-up stagger-4"
         href="https://leungsiulong.github.io/s4physics/Ch3/牛頓第二運動定律"
         target="_blank"
         rel="noopener noreferrer"
         aria-label="Ch3.3 牛頓運動第二定律">
        <div class="section-inner">
          <div class="section-icon">
            <i class="fas fa-arrows-alt"></i>
          </div>
          <div class="section-info">
            <div class="section-num">SECTION 3.3</div>
            <div class="section-title">3.3 牛頓運動第二定律</div>
            <div class="section-desc">Newton's Second Law of Motion</div>
          </div>
          <div class="section-arrow">
            <i class="fas fa-external-link-alt"></i>
          </div>
        </div>
      </a>

      <a class="section-card fade-up stagger-5"
         href="https://leungsiulong.github.io/s4physics/Ch3/重量與牛頓第二定律"
         target="_blank"
         rel="noopener noreferrer"
         aria-label="Ch3.4 重量與牛頓運動第二定律">
        <div class="section-inner">
          <div class="section-icon">
            <i class="fas fa-weight-hanging"></i>
          </div>
          <div class="section-info">
            <div class="section-num">SECTION 3.4</div>
            <div class="section-title">3.4 重量與牛頓運動第二定律</div>
            <div class="section-desc">Weight and Newton's Second Law</div>
          </div>
          <div class="section-arrow">
            <i class="fas fa-external-link-alt"></i>
          </div>
        </div>
      </a>
    </div>

    <div class="formula-decoration fade-up stagger-4">W = m · g</div>
  </div>
</div>

<script>
  // Dark mode detection
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add('dark');
  }
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(event) {
    if (event.matches) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  });

  // View navigation
  function navigateTo(targetId) {
    var currentView = document.querySelector('.view.active');
    var targetView = document.getElementById(targetId);

    if (currentView === targetView) return;

    currentView.classList.remove('active');
    currentView.classList.add('exit');

    setTimeout(function() {
      currentView.classList.remove('exit');

      // Reset fade-up animations
      var fadeEls = targetView.querySelectorAll('.fade-up');
      fadeEls.forEach(function(el) {
        el.style.animation = 'none';
        el.offsetHeight; // trigger reflow
        el.style.animation = '';
      });

      targetView.classList.add('active');
    }, 350);
  }

  // Background canvas animation
  (function() {
    var canvas = document.getElementById('bgCanvas');
    var ctx = canvas.getContext('2d');
    var w, h, orbs;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    function createOrbs() {
      orbs = [];
      var count = Math.min(5, Math.floor(w / 200));
      for (var i = 0; i < count; i++) {
        orbs.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 200 + 100,
          dx: (Math.random() - 0.5) * 0.3,
          dy: (Math.random() - 0.5) * 0.3,
          hue: Math.random() * 60 + 240
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, w, h);
      orbs.forEach(function(orb) {
        orb.x += orb.dx;
        orb.y += orb.dy;
        if (orb.x < -orb.r) orb.x = w + orb.r;
        if (orb.x > w + orb.r) orb.x = -orb.r;
        if (orb.y < -orb.r) orb.y = h + orb.r;
        if (orb.y > h + orb.r) orb.y = -orb.r;

        var gradient = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.r);
        var alpha = document.documentElement.classList.contains('dark') ? 0.08 : 0.06;
        gradient.addColorStop(0, 'hsla(' + orb.hue + ', 80%, 50%, ' + alpha + ')');
        gradient.addColorStop(1, 'hsla(' + orb.hue + ', 80%, 50%, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(orb.x, orb.y, orb.r, 0, Math.PI * 2);
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    resize();
    createOrbs();
    draw();
    window.addEventListener('resize', function() {
      resize();
      createOrbs();
    });
  })();

  // Floating particles
  (function() {
    var container = document.getElementById('particles');
    var colors = ['#7c4dff', '#448aff', '#00e5ff', '#ff6d00', '#69f0ae'];

    for (var i = 0; i < 15; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      var size = Math.random() * 4 + 2;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (Math.random() * 15 + 10) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(p);
    }
  })();
</script>
</body>
</html>
