            return html`<div className="max-w-4xl mx-auto rounded-2xl shadow-xl overflow-hidden" style=${{ background:'var(--card-bg)' }}>
                <div className="bg-gradient-to-r from-cyan-600 via-blue-600 to-indigo-600 p-6 text-white relative overflow-hidden">
                    <div className="absolute top-[-20px] right-[-20px] w-[100px] h-[100px] rounded-full bg-white opacity-5"></div>
                    <div className="absolute bottom-[-30px] left-[20%] w-[80px] h-[80px] rounded-full bg-white opacity-5"></div>
                    <div className="flex flex-col md:flex-row justify-between md:items-center gap-4">
                        <div>
                            <h1 className="text-2xl md:text-3xl font-black mb-2 tracking-tight">${"力的世界"}</h1>
                            <p className="text-blue-100 flex items-center gap-2 text-sm">
                                <i data-lucide="hand" className="w-4 h-4"></i> ${"認識各種力，學會畫隔離體圖和計算淨力！"}
                            </p>
                        </div>
                        <div className="flex bg-white/15 p-1 rounded-xl gap-1 backdrop-blur-sm w-full md:w-auto">
                            <button onClick=${function() { setActiveTab('concepts'); }} className=${"flex-1 md:flex-initial flex items-center justify-center gap-1.5 px-2 md:px-3 py-2 rounded-lg transition-all text-xs md:text-sm font-bold " + (activeTab === 'concepts' ? 'bg-white text-indigo-700 shadow-md' : 'text-white/80 hover:bg-white/10')}>
                                <i data-lucide="layers" className="w-4 h-4"></i> ${"重要概念"}
                            </button>
                            <button onClick=${function() { setActiveTab('lab'); }} className=${"flex-1 md:flex-initial flex items-center justify-center gap-1.5 px-2 md:px-3 py-2 rounded-lg transition-all text-xs md:text-sm font-bold " + (activeTab === 'lab' ? 'bg-white text-indigo-700 shadow-md' : 'text-white/80 hover:bg-white/10')}>
                                <i data-lucide="flask-conical" className="w-4 h-4"></i> ${"自由探索"}
                            </button>
                            <button onClick=${function() { setActiveTab('practice'); }} className=${"flex-1 md:flex-initial flex items-center justify-center gap-1.5 px-2 md:px-3 py-2 rounded-lg transition-all text-xs md:text-sm font-bold " + (activeTab === 'practice' ? 'bg-white text-indigo-700 shadow-md' : 'text-white/80 hover:bg-white/10')}>
                                <i data-lucide="clipboard-list" className="w-4 h-4"></i> ${"無限練習"}
                            </button>
                        </div>
                    </div>
                </div>

                <div className="p-5 md:p-8">

                    ${activeTab === 'concepts' && html`<div className="space-y-6">
                        <div className="flex items-center justify-center gap-2 flex-wrap">
                            ${flashcardData.map(function(card, i) {
                                return html`<button key=${card.id} onClick=${function() { goToCard(i, i > currentCard ? 'right' : 'left'); }}
                                    className=${"progress-dot w-3 h-3 rounded-full transition-all " + (i === currentCard ? 'active bg-blue-500 ring-4 ring-blue-200' : 'bg-slate-300 hover:bg-slate-400')}
                                    title=${card.frontTitle} />`;
                            })}
                        </div>
                        <div className="text-center text-sm font-bold" style=${{ color:'var(--text-secondary)' }}>
                            <span className="mono">${currentCard+1}</span> / <span className="mono">${flashcardData.length}</span>
                            <span className="ml-2 opacity-70">${"— " + flashcardData[currentCard].frontTitle}</span>
                        </div>
                        ${isFlipped && html`<div className="flashcard-overlay" onClick=${function(e) { e.stopPropagation(); setIsFlipped(false); }}></div>`}
                        <div className="flex items-center gap-3 md:gap-5"
                            onTouchStart=${handleTouchStart} onTouchMove=${handleTouchMove} onTouchEnd=${handleTouchEnd}>
                            <button onClick=${prevCard} disabled=${currentCard === 0}
                                className="flex-shrink-0 w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center transition-all shadow-md disabled:opacity-30 disabled:cursor-not-allowed"
                                style=${{ background:'var(--card-bg)', border:'2px solid var(--card-border)' }}>
                                <i data-lucide="chevron-left" className="w-5 h-5 md:w-6 md:h-6" style=${{ color:'var(--text-primary)' }}></i>
                            </button>
                            <div key=${slideKey} className=${"flex-1 " + (isFlipped ? 'flashcard-lifted ' : '') + (slideDirection === 'right' ? 'slide-in-right' : 'slide-in-left')}>
                                <${Flashcard} card=${flashcardData[currentCard]} isFlipped=${isFlipped} onFlip=${function() { setIsFlipped(function(f) { return !f; }); }} />
                            </div>
                            <button onClick=${nextCard} disabled=${currentCard === flashcardData.length-1}
                                className="flex-shrink-0 w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center transition-all shadow-md disabled:opacity-30 disabled:cursor-not-allowed"
                                style=${{ background:'var(--card-bg)', border:'2px solid var(--card-border)' }}>
                                <i data-lucide="chevron-right" className="w-5 h-5 md:w-6 md:h-6" style=${{ color:'var(--text-primary)' }}></i>
                            </button>
                        </div>
                        <div className="text-center text-xs flex items-center justify-center gap-4 flex-wrap" style=${{ color:'var(--text-secondary)' }}>
                            <span className="hidden md:flex items-center gap-1">
                                <kbd className="px-2 py-0.5 rounded text-xs font-mono border" style=${{ background:'var(--surface)', borderColor:'var(--card-border)' }}>${"←"}</kbd>
                                <kbd className="px-2 py-0.5 rounded text-xs font-mono border" style=${{ background:'var(--surface)', borderColor:'var(--card-border)' }}>${"→"}</kbd>
                                ${"切換卡片"}
                            </span>
                            <span className="hidden md:flex items-center gap-1">
                                <kbd className="px-2 py-0.5 rounded text-xs font-mono border" style=${{ background:'var(--surface)', borderColor:'var(--card-border)' }}>${"空白鍵"}</kbd>
                                ${"翻轉卡片"}
                            </span>
                            <span className="flex md:hidden items-center gap-1">
                                <i data-lucide="move-horizontal" className="w-4 h-4"></i>
                                ${"左右滑動切換 · 點擊翻轉"}
                            </span>
                        </div>
                        <div className="border-t pt-6 mt-4" style=${{ borderColor:'var(--card-border)' }}>
                            <h3 className="font-bold text-sm mb-3 flex items-center gap-2" style=${{ color:'var(--text-secondary)' }}>
                                <i data-lucide="grid-3x3" className="w-4 h-4"></i> ${"全部概念一覽（點擊跳轉）"}
                            </h3>
                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                ${flashcardData.map(function(card, i) {
                                    return html`<button key=${card.id} onClick=${function() { goToCard(i, i > currentCard ? 'right' : 'left'); }}
                                        className=${"text-left p-3 rounded-lg border text-xs font-bold transition-all " + (i === currentCard ? 'ring-2 ring-blue-400' : 'hover:shadow-md')}
                                        style=${{ background:'var(--surface)', borderColor:'var(--card-border)', color:'var(--text-primary)' }}>
                                        <span className="opacity-50 mono mr-1">${(i+1) + "."}</span>
                                        ${card.frontTitle}
                                    </button>`;
                                })}
                            </div>
                        </div>
                    </div>`}

                    ${activeTab === 'lab' && html`<div>
                        <div className="flex gap-2 mb-5">
                            <button onClick=${function() { setLabTab('netforce'); }}
                                className=${"flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all " + (labTab === 'netforce' ? 'shadow-lg text-white' : 'border-2')}
                                style=${labTab === 'netforce' ? { background:'linear-gradient(135deg, #3b82f6, #2563eb)' } : { borderColor:'var(--card-border)', background:'var(--card-bg)', color:'var(--text-primary)' }}>
                                ${"🎯 實驗一：淨力探索"}
                            </button>
                            <button onClick=${function() { setLabTab('fbd'); }}
                                className=${"flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all " + (labTab === 'fbd' ? 'shadow-lg text-white' : 'border-2')}
                                style=${labTab === 'fbd' ? { background:'linear-gradient(135deg, #f59e0b, #d97706)' } : { borderColor:'var(--card-border)', background:'var(--card-bg)', color:'var(--text-primary)' }}>
                                ${"📐 實驗二：隔離體圖"}
                            </button>
                        </div>

                        ${labTab === 'netforce' && html`<div>
                            <div className="mb-5 p-4 rounded-xl border" style=${{ background:'var(--surface)', borderColor:'var(--card-border)' }}>
                                <h3 className="font-bold text-base mb-2 flex items-center gap-2" style=${{ color:'var(--text-primary)' }}>
                                    <i data-lucide="hand" className="w-5 h-5" style=${{ color:'var(--accent-blue)' }}></i> ${"淨力探索實驗室"}
                                </h3>
                                <p className="text-sm leading-relaxed" style=${{ color:'var(--text-secondary)' }}>
                                    ${"在畫布上拖曳箭嘴來探索淨力！試試看不同的力組合會產生甚麼結果。"}
                                </p>
                                <ul className="text-sm mt-2 space-y-1" style=${{ color:'var(--text-secondary)' }}>
                                    <li>${"👆 拖曳箭頭的圓圈 → 改變力的方向（↑↓←→）和大小"}</li>
                                    <li>${"➕ 點擊「新增一道力」→ 增加更多力"}</li>
                                    <li>${"🎯 試試讓淨力 = 0，看看甚麼是「平衡」！"}</li>
                                    <li>${"🟣 紫色虛線箭嘴 = 淨力（所有力加起來的結果）"}</li>
                                </ul>
                            </div>
                            <${ForceSimulation} />
                        </div>`}

                        ${labTab === 'fbd' && html`<div>
                            <div className="mb-5 p-4 rounded-xl border" style=${{ background:'var(--surface)', borderColor:'var(--card-border)' }}>
                                <h3 className="font-bold text-base mb-2 flex items-center gap-2" style=${{ color:'var(--text-primary)' }}>
                                    <i data-lucide="crosshair" className="w-5 h-5" style=${{ color:'#f59e0b' }}></i> ${"隔離體圖（Free-Body Diagram）"}
                                </h3>
                                <p className="text-sm leading-relaxed" style=${{ color:'var(--text-secondary)' }}>
                                    ${"隔離體圖是分析力的重要工具。選擇一個情景，辨認作用在物體上的所有力，練習畫出正確的隔離體圖！"}
                                </p>
                                <ul className="text-sm mt-2 space-y-1" style=${{ color:'var(--text-secondary)' }}>
                                    <li>${"1️⃣ 選擇一個情景（例如書本放在桌上）"}</li>
                                    <li>${"2️⃣ 思考有哪些力作用在物體上"}</li>
                                    <li>${"3️⃣ 按住力的按鈕，拖到物體的上下左右來選擇方向"}</li>
                                    <li>${"4️⃣ 按「檢查答案」看看力和方向都答對了嗎！"}</li>
                                </ul>
                            </div>
                            <${FBDExperiment} />
                        </div>`}
                    </div>`}

                    ${activeTab === 'practice' && html`<div>
                        <div className="p-6 rounded-xl border-2 shadow-sm" style=${{ background:'var(--quiz-bg)', borderColor:'var(--quiz-border)' }}>
                            <div className="flex items-center justify-between border-b pb-3 mb-5" style=${{ borderColor:'var(--quiz-border)' }}>
                                <h2 className="text-xl font-bold flex items-center gap-2" style=${{ color:'var(--quiz-text)' }}>
                                    <i data-lucide="clipboard-list"></i> ${"隨機任務挑戰"}
                                </h2>
                                <div className="flex items-center gap-2 text-sm font-bold mono" style=${{ color:'var(--quiz-text)' }}>
                                    <i data-lucide="trophy" className="w-4 h-4"></i>
                                    <span>${score.correct + "/" + score.total}</span>
                                    ${score.total > 0 && html`<span className="opacity-70">${"(" + Math.round(score.correct/score.total*100) + "%)"}</span>`}
                                </div>
                            </div>

                            ${function() {
                                var cat = getCatInfo();
                                return html`<div className="flex items-center gap-2 mb-3">
                                    <span className="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold text-white" style=${{ background: cat.color }}>
                                        <i data-lucide=${cat.icon} className="w-3 h-3"></i> ${cat.label}
                                    </span>
                                </div>`;
                            }()}

                            <div className="p-5 rounded-xl shadow-sm mb-5 border" style=${{ background:'var(--quiz-q-bg)', borderColor:'var(--quiz-q-border)' }}>
                                <div className="font-medium leading-relaxed text-base" style=${{ color:'var(--text-primary)' }}>${getQuestionText()}</div>
                            </div>

                            ${isMCQ && html`<div className="flex flex-col gap-2.5">
                                ${getOptions().map(function(opt, i) {
                                    return html`<button key=${i} onClick=${function() { handleMCQSelect(i); }}
                                        disabled=${feedback !== null}
                                        className=${getOptionClassName(i)}>
                                        <span className="font-bold mr-2 opacity-60">${String.fromCharCode(65 + i) + "."}</span>
                                        ${opt}
                                        ${feedback && i === feedback.correctIdx && html`<span className="ml-2">✅</span>`}
                                        ${feedback && i === selectedOption && !feedback.isCorrect && html`<span className="ml-2">❌</span>`}
                                    </button>`;
                                })}
                            </div>`}

                            ${!isMCQ && html`<div className="flex flex-col gap-4">
                                <div className="relative w-full">
                                    <input type="number" value=${userAns} onChange=${function(e) { setUserAns(e.target.value); }}
                                        onKeyDown=${function(e) { if (e.key === 'Enter' && userAns !== '') checkNumerical(); }}
                                        placeholder=${"請輸入淨力大小"} disabled=${feedback && feedback.isCorrect}
                                        className="border-2 rounded-lg p-3 pl-4 pr-14 w-full text-xl font-bold focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all"
                                        style=${{ fontSize:'18px', borderColor:'var(--card-border)', background:'var(--card-bg)', color:'var(--text-primary)' }} />
                                    <span className="absolute right-4 top-1/2 -translate-y-1/2 font-bold" style=${{ color:'var(--text-secondary)' }}>N</span>
                                </div>
                                <button onClick=${checkNumerical} disabled=${feedback && feedback.isCorrect}
                                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white px-8 py-3 rounded-lg font-bold transition-colors shadow-md flex items-center justify-center gap-2">
                                    <i data-lucide="check-circle" className="w-5 h-5"></i> ${"提交答案"}
                                </button>
                            </div>`}

                            ${feedback && html`<div className=${"mt-5 p-4 rounded-xl font-bold shadow-sm border score-pop " + (feedback.isCorrect ? 'bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-300 border-green-300 dark:border-green-700' : 'bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-300 border-red-300 dark:border-red-700')}>
                                <div className="flex items-center gap-2 mb-2">
                                    <i data-lucide=${feedback.isCorrect ? "check" : "x"} className="w-5 h-5"></i>
                                    ${feedback.text}
                                </div>
                                ${feedback.explanation && html`<p className="text-sm font-medium opacity-80 mb-3">${"💡 " + feedback.explanation}</p>`}
                                <button onClick=${generateQuestion}
                                    className=${"w-full sm:w-auto px-6 py-2 rounded-lg transition-colors shadow-md flex items-center justify-center gap-2 font-bold text-white " + (feedback.isCorrect ? 'bg-green-600 hover:bg-green-700' : 'bg-blue-600 hover:bg-blue-700')}>
                                    ${feedback.isCorrect ? "下一題 " : "再試一題 "}<i data-lucide="arrow-right" className="w-4 h-4"></i>
                                </button>
                            </div>`}
                        </div>

                        <div className="mt-6 p-4 rounded-xl border" style=${{ background:'var(--surface)', borderColor:'var(--card-border)' }}>
                            <h3 className="font-bold text-sm mb-3 flex items-center gap-2" style=${{ color:'var(--text-secondary)' }}>
                                <i data-lucide="book-open" className="w-4 h-4"></i> ${"溫馨提示"}
                            </h3>
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 text-xs" style=${{ color:'var(--text-secondary)' }}>
                                <div className="p-3 rounded-lg border" style=${{ background:'var(--card-bg)', borderColor:'var(--card-border)' }}>
                                    <div className="font-bold mb-1" style=${{ color:'#d97706' }}>${"💡 概念題"}</div>
                                    ${"考你對力的基本理解"}
                                </div>
                                <div className="p-3 rounded-lg border" style=${{ background:'var(--card-bg)', borderColor:'var(--card-border)' }}>
                                    <div className="font-bold mb-1" style=${{ color:'#8b5cf6' }}>${"🔢 淨力計算"}</div>
                                    ${"同方向相加，反方向相減"}
                                </div>
                                <div className="p-3 rounded-lg border" style=${{ background:'var(--card-bg)', borderColor:'var(--card-border)' }}>
                                    <div className="font-bold mb-1" style=${{ color:'#2563eb' }}>${"✏️ 隔離體圖"}</div>
                                    ${"判斷物體受到哪些力"}
                                </div>
                            </div>
                        </div>
                    </div>`}

                </div>
            </div>`;
        }

        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>
</body>
</html>
