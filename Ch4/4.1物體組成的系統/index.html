<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物體組成的系統 - 物理互動學習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --card-bg: #ffffff; --card-border: #e2e8f0; --surface: #f8fafc;
            --text-primary: #1e293b; --text-secondary: #64748b;
            --accent-blue: #2563eb; --accent-indigo: #4f46e5;
            --quiz-bg: #fffbeb; --quiz-border: #fcd34d; --quiz-text: #92400e;
            --quiz-q-bg: #ffffff; --quiz-q-border: #fde68a;
            --opt-bg: #ffffff; --opt-border: #e2e8f0; --opt-hover-bg: #eff6ff; --opt-hover-border: #93c5fd;
            --step-blue-bg: #eff6ff; --step-blue-border: #3b82f6; --step-blue-text: #1e40af;
            --step-green-bg: #f0fdf4; --step-green-border: #22c55e; --step-green-text: #166534;
            --step-purple-bg: #faf5ff; --step-purple-border: #8b5cf6; --step-purple-text: #5b21b6;
            --hint-bg: #eff6ff; --hint-border: #3b82f6; --hint-text: #1e40af;
        }
        .dark {
            --card-bg: #1e293b; --card-border: #334155; --surface: #0f172a;
            --text-primary: #f1f5f9; --text-secondary: #94a3b8;
            --accent-blue: #60a5fa; --accent-indigo: #818cf8;
            --quiz-bg: #1c1917; --quiz-border: #854d0e; --quiz-text: #fbbf24;
            --quiz-q-bg: #1e293b; --quiz-q-border: #854d0e;
            --opt-bg: #1e293b; --opt-border: #475569; --opt-hover-bg: #1e3a5f; --opt-hover-border: #60a5fa;
            --step-blue-bg: #172554; --step-blue-border: #60a5fa; --step-blue-text: #93c5fd;
            --step-green-bg: #052e16; --step-green-border: #22c55e; --step-green-text: #86efac;
            --step-purple-bg: #2e1065; --step-purple-border: #a78bfa; --step-purple-text: #c4b5fd;
            --hint-bg: #172554; --hint-border: #60a5fa; --hint-text: #93c5fd;
        }
        * { font-family: 'Noto Sans TC', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulseSoft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes scorePopIn {
            0% { transform: scale(0.7); opacity: 0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulse-border {
            0% { border-color: rgba(239, 68, 68, 0.4); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { border-color: rgba(239, 68, 68, 1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { border-color: rgba(239, 68, 68, 0.4); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .slide-up { animation: slideUp 0.4s ease-out; }
        .fade-in { animation: fadeIn 0.3s ease; }
        .pulse-soft { animation: pulseSoft 2s ease-in-out infinite; }
        .score-pop { animation: scorePopIn 0.35s ease-out; }
        .system-box { animation: pulse-border 2s infinite; border: 3px dashed #ef4444; border-radius: 8px; background-color: rgba(239, 68, 68, 0.05); pointer-events: none; }

        .dark .katex { color: #f1f5f9; }

        @keyframes forceArrowPulse {
            0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.85; transform: translateX(-50%) scale(1.05); }
        }
        .force-arrow-anim { animation: forceArrowPulse 1.5s ease-in-out infinite; }

        .sim-surface { background: linear-gradient(to bottom, #e0f2fe, #f0f9ff); }
        .dark .sim-surface { background: linear-gradient(to bottom, #0f172a, #1e293b); }
        .sim-ground { background: #94a3b8; border-top: 4px solid #64748b; }
        .dark .sim-ground { background: #475569; border-top: 4px solid #334155; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8" style="background:var(--surface);color:var(--text-primary);">
    <div id="root"></div>

    <script>
        var html = htm.bind(React.createElement);
        var useState = React.useState, useEffect = React.useEffect,
            useRef = React.useRef, useMemo = React.useMemo, useCallback = React.useCallback;

        /* ===== Dark mode ===== */
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (e.matches) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        });

        /* ===== KaTeX ===== */
        function MathText(props) {
            var ref = useRef(null);
            useEffect(function() {
                if (window.katex && ref.current) {
                    window.katex.render(props.math, ref.current, { displayMode: props.display === true, throwOnError: false });
                }
            }, [props.math, props.display]);
            return html`<span ref=${ref} className="my-1 inline-block"></span>`;
        }

        /* ===== Main App ===== */
        function App() {
            var tabS = useState('learn');
            var activeTab = tabS[0], setActiveTab = tabS[1];

            useEffect(function() { lucide.createIcons(); });

            return html`<div className="max-w-4xl mx-auto rounded-2xl shadow-xl overflow-hidden" style=${{ background: 'var(--card-bg)' }}>
                <!-- Gradient Header -->
                <div className="bg-gradient-to-r from-blue-600 via-indigo-600 to-violet-600 p-6 text-white">
                    <div className="flex flex-col md:flex-row justify-between md:items-center gap-4">
                        <div>
                            <h1 className="text-2xl md:text-3xl font-black mb-2 tracking-tight flex items-center gap-3">
                                <i data-lucide="boxes" className="w-7 h-7 md:w-8 md:h-8"></i>
                                ${"物體組成的系統"}
                            </h1>
                            <p className="text-blue-100 flex items-center gap-2 text-sm">
                                <i data-lucide="sparkles" className="w-4 h-4"></i>
                                ${"把複雜的多個物體，看成一個簡單的整體！"}
                            </p>
                        </div>
                        <div className="flex bg-white/15 p-1 rounded-xl gap-1 backdrop-blur-sm w-full md:w-auto">
                            <button onClick=${function() { setActiveTab('learn'); }}
                                className=${"flex-1 md:flex-initial flex items-center justify-center gap-1.5 px-2 md:px-4 py-2 rounded-lg transition-all text-xs md:text-sm font-bold " + (activeTab === 'learn' ? 'bg-white text-indigo-700 shadow-md' : 'text-white/80 hover:bg-white/10')}>
                                <i data-lucide="book-open" className="w-4 h-4"></i> ${"概念圖解"}
                            </button>
                            <button onClick=${function() { setActiveTab('sim'); }}
                                className=${"flex-1 md:flex-initial flex items-center justify-center gap-1.5 px-2 md:px-4 py-2 rounded-lg transition-all text-xs md:text-sm font-bold " + (activeTab === 'sim' ? 'bg-white text-indigo-700 shadow-md' : 'text-white/80 hover:bg-white/10')}>
                                <i data-lucide="play-circle" className="w-4 h-4"></i> ${"動畫實驗"}
                            </button>
                            <button onClick=${function() { setActiveTab('quiz'); }}
                                className=${"flex-1 md:flex-initial flex items-center justify-center gap-1.5 px-2 md:px-4 py-2 rounded-lg transition-all text-xs md:text-sm font-bold " + (activeTab === 'quiz' ? 'bg-white text-indigo-700 shadow-md' : 'text-white/80 hover:bg-white/10')}>
                                <i data-lucide="pencil" className="w-4 h-4"></i> ${"簡單挑戰"}
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Content Area -->
                <div className="p-5 md:p-8">
                    ${activeTab === 'learn' && html`<${LearnTab} onGoToSim=${function() { setActiveTab('sim'); }} />`}
                    ${activeTab === 'sim' && html`<${SimTab} />`}
                    ${activeTab === 'quiz' && html`<${QuizTab} />`}
                </div>
            </div>`;
        }

        /* ===== 1. 概念學習分頁 ===== */
        function LearnTab(props) {
            return html`<div className="space-y-8 slide-up">
                <!-- 為什麼學系統 -->
                <div className="p-5 rounded-xl border-l-4 shadow-sm" style=${{ background: 'var(--hint-bg)', borderColor: 'var(--hint-border)' }}>
                    <h2 className="text-xl font-bold flex items-center gap-2 mb-3" style=${{ color: 'var(--hint-text)' }}>
                        <i data-lucide="help-circle" className="w-6 h-6"></i>
                        ${"為什麼要學習「系統」？"}
                    </h2>
                    <p className="leading-relaxed text-base" style=${{ color: 'var(--text-primary)' }}>
                        ${"想像你正在推動兩個靠在一起的箱子 (箱子A 和 箱子B)。"}
                        <br />
                        ${"雖然你只推了箱子A，但兩個箱子會"}
                        <b>${"一起移動"}</b>
                        ${"。與其分開計算它們，我們可以把它們綁在一起，當作"}
                        <b>${"「一個超大箱子」"}</b>
                        ${"來算！"}
                    </p>
                </div>

                <!-- 步驟卡片 -->
                <div className="grid md:grid-cols-2 gap-8 items-start">
                    <div className="space-y-4">
                        <div className="p-4 rounded-xl shadow-sm border" style=${{ background: 'var(--card-bg)', borderColor: 'var(--card-border)' }}>
                            <h3 className="font-bold text-lg mb-2 flex items-center gap-2" style=${{ color: 'var(--text-primary)' }}>
                                <span className="px-2 py-1 rounded-md text-xs font-bold" style=${{ background: 'var(--step-blue-bg)', color: 'var(--step-blue-text)', border: '1px solid var(--step-blue-border)' }}>${"步驟 1"}</span>
                                ${"把多個物體圈起來"}
                            </h3>
                            <p style=${{ color: 'var(--text-secondary)' }}>
                                ${"只要物體們具有"}
                                <b style=${{ color: 'var(--text-primary)' }}>${"相同的加速度"}</b>
                                ${"（一起變快或變慢），我們就可以把它們視為一個「系統」。"}
                            </p>
                        </div>
                        <div className="p-4 rounded-xl shadow-sm border" style=${{ background: 'var(--card-bg)', borderColor: 'var(--card-border)' }}>
                            <h3 className="font-bold text-lg mb-2 flex items-center gap-2" style=${{ color: 'var(--text-primary)' }}>
                                <span className="px-2 py-1 rounded-md text-xs font-bold" style=${{ background: 'var(--step-green-bg)', color: 'var(--step-green-text)', border: '1px solid var(--step-green-border)' }}>${"步驟 2"}</span>
                                ${"計算「總質量」"}
                            </h3>
                            <p style=${{ color: 'var(--text-secondary)' }}>
                                ${"系統的總質量就是所有物體質量的總和："}
                                <br />
                                <span className="text-lg font-bold ml-2" style=${{ color: 'var(--step-green-text)' }}>${"M = m₁ + m₂"}</span>
                            </p>
                        </div>
                        <div className="p-4 rounded-xl shadow-sm border" style=${{ background: 'var(--card-bg)', borderColor: 'var(--card-border)' }}>
                            <h3 className="font-bold text-lg mb-2 flex items-center gap-2" style=${{ color: 'var(--text-primary)' }}>
                                <span className="px-2 py-1 rounded-md text-xs font-bold" style=${{ background: 'var(--step-purple-bg)', color: 'var(--step-purple-text)', border: '1px solid var(--step-purple-border)' }}>${"步驟 3"}</span>
                                ${"使用牛頓第二定律"}
                            </h3>
                            <p style=${{ color: 'var(--text-secondary)' }}>
                                ${"套用公式 "}<${MathText} math="F_{net} = ma" />${"，此時的 m 必須填入「總質量」。"}
                            </p>
                        </div>
                    </div>

                    <!-- 圖示區塊 -->
                    <div className="p-6 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed" style=${{ background: 'var(--surface)', borderColor: 'var(--card-border)' }}>
                        <svg viewBox="0 0 200 60" className="w-32 h-16 mb-2">
                            <rect x="10" y="5" width="55" height="50" rx="6" fill="#fdba74" stroke="#f97316" stroke-width="2"/>
                            <text x="37" y="28" text-anchor="middle" fill="#9a3412" font-weight="bold" font-size="12">A</text>
                            <text x="37" y="44" text-anchor="middle" fill="#9a3412" font-size="9">m₁</text>
                            <rect x="135" y="10" width="45" height="40" rx="6" fill="#6ee7b7" stroke="#10b981" stroke-width="2"/>
                            <text x="157" y="28" text-anchor="middle" fill="#065f46" font-weight="bold" font-size="12">B</text>
                            <text x="157" y="42" text-anchor="middle" fill="#065f46" font-size="9">m₂</text>
                            <text x="100" y="36" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="18">+</text>
                        </svg>
                        <div className="text-center font-bold text-xl mb-4" style=${{ color: 'var(--text-secondary)' }}>⬇</div>
                        <div className="relative p-5 border-4 border-red-400 border-dashed rounded-xl" style=${{ background: 'rgba(239,68,68,0.05)' }}>
                            <span className="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold shadow-md">${"視為一個系統"}</span>
                            <svg viewBox="0 0 150 55" className="w-36 h-14">
                                <rect x="5" y="2" width="55" height="50" rx="6" fill="#fdba74" stroke="#f97316" stroke-width="2"/>
                                <text x="32" y="25" text-anchor="middle" fill="#9a3412" font-weight="bold" font-size="12">A</text>
                                <text x="32" y="40" text-anchor="middle" fill="#9a3412" font-size="9">m₁</text>
                                <rect x="65" y="7" width="45" height="40" rx="6" fill="#6ee7b7" stroke="#10b981" stroke-width="2"/>
                                <text x="87" y="25" text-anchor="middle" fill="#065f46" font-weight="bold" font-size="12">B</text>
                                <text x="87" y="39" text-anchor="middle" fill="#065f46" font-size="9">m₂</text>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- 進入動畫實驗 -->
                <div className="text-center mt-6">
                    <button onClick=${props.onGoToSim}
                        className="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white px-8 py-3 rounded-xl text-lg font-bold shadow-lg transition-all hover:shadow-xl flex items-center gap-2 mx-auto">
                        ${"去動畫實驗室看看"}
                        <i data-lucide="arrow-right" className="w-5 h-5"></i>
                    </button>
                </div>
            </div>`;
        }

        /* ===== 2. 動畫實驗分頁 ===== */
        function SimTab() {
            var m1S = useState(2); var m1 = m1S[0], setM1 = m1S[1];
            var m2S = useState(3); var m2 = m2S[0], setM2 = m2S[1];
            var forceS = useState(15); var force = forceS[0], setForce = forceS[1];
            var sysS = useState(false); var isSystemView = sysS[0], setIsSystemView = sysS[1];
            var modeS = useState('push'); var mode = modeS[0], setMode = modeS[1];
            var playS = useState(false); var isPlaying = playS[0], setIsPlaying = playS[1];
            var posS = useState(0); var position = posS[0], setPosition = posS[1];
            var ifS = useState(false); var showForce = ifS[0], setShowForce = ifS[1];
            var requestRef = useRef();
            var lastTimeRef = useRef();

            var totalMass = m1 + m2;
            var acceleration = (force / totalMass).toFixed(1);
            var internalForce = (m2 * force / totalMass);
            var internalForceDisplay = internalForce.toFixed(1);
            var reactionForce = (m1 * force / totalMass);
            var reactionForceDisplay = reactionForce.toFixed(1);

            var animate = function(time) {
                if (lastTimeRef.current !== undefined) {
                    var deltaTime = (time - lastTimeRef.current) / 1000;
                    setPosition(function(prevPos) {
                        var speed = acceleration * 20;
                        var newPos = prevPos + speed * deltaTime;
                        if (newPos > 400) {
                            setIsPlaying(false);
                            return 0;
                        }
                        return newPos;
                    });
                }
                lastTimeRef.current = time;
                requestRef.current = requestAnimationFrame(animate);
            };

            useEffect(function() {
                if (isPlaying) {
                    requestRef.current = requestAnimationFrame(animate);
                } else {
                    cancelAnimationFrame(requestRef.current);
                    lastTimeRef.current = undefined;
                }
                return function() { cancelAnimationFrame(requestRef.current); };
            }, [isPlaying, acceleration]);

            var handleReset = function() {
                setIsPlaying(false);
                setPosition(0);
                lastTimeRef.current = undefined;
            };

            return html`<div className="slide-up">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-6">
                    <!-- 左側：控制面板 -->
                    <div className="space-y-6 p-6 rounded-xl border-2 shadow-sm" style=${{ background: 'var(--surface)', borderColor: 'var(--card-border)' }}>
                        <h3 className="text-xl font-bold border-b pb-2 flex items-center gap-2" style=${{ color: 'var(--text-primary)', borderColor: 'var(--card-border)' }}>
                            <i data-lucide="sliders" className="w-5 h-5"></i> ${"設定變數"}
                        </h3>

                        <!-- 模式切換 -->
                        <div className="p-1 rounded-lg flex text-sm font-medium" style=${{ background: 'var(--surface)', border: '1px solid var(--card-border)' }}>
                            <button onClick=${function() { setMode('push'); handleReset(); }}
                                className=${"flex-1 py-2 rounded-md transition-colors font-bold " + (mode === 'push' ? 'bg-white dark:bg-slate-700 shadow-sm text-blue-600' : 'text-gray-500')}
                                style=${mode === 'push' ? { background: 'var(--card-bg)' } : {}}>
                                ${"靠在一起推動"}
                            </button>
                            <button onClick=${function() { setMode('pull'); handleReset(); }}
                                className=${"flex-1 py-2 rounded-md transition-colors font-bold " + (mode === 'pull' ? 'bg-white dark:bg-slate-700 shadow-sm text-blue-600' : 'text-gray-500')}
                                style=${mode === 'pull' ? { background: 'var(--card-bg)' } : {}}>
                                ${"用繩子拉動"}
                            </button>
                        </div>

                        <div>
                            <label className="flex justify-between font-bold mb-2 text-blue-500">
                                <span>${"木塊 A 質量 (m₁)"}</span>
                                <span className="px-2 rounded mono" style=${{ background: 'var(--step-blue-bg)' }}>${m1 + " kg"}</span>
                            </label>
                            <input type="range" min="1" max="10" value=${m1}
                                onChange=${function(e) { setM1(Number(e.target.value)); handleReset(); }}
                                className="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                        </div>
                        <div>
                            <label className="flex justify-between font-bold mb-2 text-blue-500">
                                <span>${"木塊 B 質量 (m₂)"}</span>
                                <span className="px-2 rounded mono" style=${{ background: 'var(--step-blue-bg)' }}>${m2 + " kg"}</span>
                            </label>
                            <input type="range" min="1" max="10" value=${m2}
                                onChange=${function(e) { setM2(Number(e.target.value)); handleReset(); }}
                                className="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                        </div>
                        <div>
                            <label className="flex justify-between font-bold mb-2 text-red-500">
                                <span>${"施力 (F)"}</span>
                                <span className="px-2 rounded mono" style=${{ background: 'rgba(239,68,68,0.1)' }}>${force + " N"}</span>
                            </label>
                            <input type="range" min="1" max="50" step="1" value=${force}
                                onChange=${function(e) { setForce(Number(e.target.value)); handleReset(); }}
                                className="w-full h-2 bg-red-200 rounded-lg appearance-none cursor-pointer accent-red-600" />
                        </div>

                        <!-- 系統視角開關 -->
                        <div className="p-4 rounded-xl border" style=${{ background: 'var(--quiz-bg)', borderColor: 'var(--quiz-border)' }}>
                            <label className="flex items-center cursor-pointer">
                                <div className="relative">
                                    <input type="checkbox" className="sr-only" checked=${isSystemView} onChange=${function(e) { setIsSystemView(e.target.checked); }} />
                                    <div className=${"block w-14 h-8 rounded-full transition-colors " + (isSystemView ? 'bg-red-500' : 'bg-gray-300')}></div>
                                    <div className=${"dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition-transform " + (isSystemView ? 'transform translate-x-6' : '')}></div>
                                </div>
                                <div className="ml-3 font-bold" style=${{ color: 'var(--quiz-text)' }}>
                                    ${"開啟「系統」視角"}
                                </div>
                            </label>
                            <p className="text-xs mt-2 ml-14" style=${{ color: 'var(--text-secondary)' }}>
                                ${"開啟後，我們將不再區分A和B，而是把它們當作一個總質量為 " + totalMass + "kg 的大物體。"}
                            </p>
                        </div>

                        <!-- 顯示作用力開關 -->
                        <div className="p-4 rounded-xl border" style=${{ background: 'var(--step-blue-bg)', borderColor: 'var(--step-blue-border)' }}>
                            <label className="flex items-center cursor-pointer">
                                <div className="relative">
                                    <input type="checkbox" className="sr-only" checked=${showForce} onChange=${function(e) { setShowForce(e.target.checked); }} />
                                    <div className=${"block w-14 h-8 rounded-full transition-colors " + (showForce ? 'bg-blue-500' : 'bg-gray-300')}></div>
                                    <div className=${"dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition-transform " + (showForce ? 'transform translate-x-6' : '')}></div>
                                </div>
                                <div className="ml-3 font-bold" style=${{ color: 'var(--step-blue-text)' }}>
                                    ${mode === 'push' ? '顯示接觸力（作用力）' : '顯示繩張力（作用力）'}
                                </div>
                            </label>
                            <p className="text-xs mt-2 ml-14" style=${{ color: 'var(--text-secondary)' }}>
                                ${"顯示 A 與 B 之間的作用力和反作用力箭頭及算式。"}
                            </p>
                        </div>

                        <div className="flex gap-4 pt-2">
                            <button onClick=${function() { isPlaying ? handleReset() : setIsPlaying(true); }}
                                className=${"flex-1 flex justify-center items-center gap-2 py-3 px-4 rounded-lg font-bold text-white transition-colors shadow-md " + (isPlaying ? 'bg-amber-500 hover:bg-amber-600' : 'bg-green-500 hover:bg-green-600')}>
                                <i data-lucide=${isPlaying ? 'square' : 'play'} className="w-5 h-5"></i>
                                ${isPlaying ? '停止並重置' : '開始模擬'}
                            </button>
                        </div>
                    </div>

                    <!-- 右側：物理算式觀察 -->
                    <div className="space-y-6 p-6 rounded-xl border shadow-sm flex flex-col justify-center" style=${{ background: 'var(--surface)', borderColor: 'var(--card-border)' }}>
                        <h2 className="text-xl font-bold border-b pb-2 flex items-center gap-2" style=${{ color: 'var(--text-primary)', borderColor: 'var(--card-border)' }}>
                            <i data-lucide="bar-chart-2"></i> ${"物理算式觀察"}
                        </h2>
                        <div className="space-y-4">
                            <div className="p-4 rounded-lg shadow-sm border-l-4 border-green-500" style=${{ background: 'var(--card-bg)' }}>
                                <div className="text-xs mb-1 font-bold" style=${{ color: 'var(--text-secondary)' }}>${"總質量 (M)"}</div>
                                <div className="flex items-center justify-center py-1">
                                    <${MathText} math=${"M = " + m1 + " + " + m2 + " = {\\color{#22c55e}" + totalMass + "\\text{ kg}}"} display=${true} />
                                </div>
                            </div>
                            <div className="p-4 rounded-lg shadow-sm border-l-4 border-red-500" style=${{ background: 'var(--card-bg)' }}>
                                <div className="text-xs mb-1 font-bold" style=${{ color: 'var(--text-secondary)' }}>${"淨力 = 施力 F"}</div>
                                <div className="flex items-center justify-center py-1">
                                    <${MathText} math=${"F = {\\color{#ef4444}" + force + "\\text{ N}}"} display=${true} />
                                </div>
                            </div>
                            <div className="p-4 rounded-lg shadow-sm border-l-4 border-purple-500" style=${{ background: 'var(--card-bg)' }}>
                                <div className="text-xs mb-1 font-bold" style=${{ color: 'var(--text-secondary)' }}>${"加速度 (a = F / M)"}</div>
                                <div className="flex items-center justify-center py-1">
                                    <${MathText} math=${"a = \\frac{" + force + "}{" + totalMass + "} = {\\color{#8b5cf6}" + acceleration + "\\text{ m/s}^2}"} display=${true} />
                                </div>
                            </div>

                            <!-- 作用力算式 -->
                            ${showForce && html`
                                <div className="p-4 rounded-lg shadow-sm border-l-4 border-cyan-500 fade-in" style=${{ background: 'var(--card-bg)' }}>
                                    <div className="text-xs mb-2 font-bold flex items-center gap-1" style=${{ color: 'var(--text-secondary)' }}>
                                        <i data-lucide="arrow-left-right" className="w-3 h-3"></i>
                                        ${mode === 'push' ? 'A 與 B 之間的接觸力' : '繩子的張力 T'}
                                    </div>
                                    <div className="p-3 rounded-lg mb-2 text-sm leading-relaxed" style=${{ background: 'var(--surface)', color: 'var(--text-secondary)' }}>
                                        <b style=${{ color: 'var(--text-primary)' }}>${"思路："}</b>
                                        ${"單獨看木塊 B，推動它的唯一水平力就是 A 對 B 的" + (mode === 'push' ? '接觸力' : '繩張力') + "。"}
                                        <br />
                                        ${"根據牛頓第二定律 (只看 B)："}
                                    </div>
                                    <div className="flex items-center justify-center py-1">
                                        <${MathText} math=${mode === 'push'
                                            ? "F_{A \\to B} = m_2 \\times a = " + m2 + " \\times " + acceleration + " = {\\color{#0891b2}" + internalForceDisplay + "\\text{ N}}"
                                            : "T = m_2 \\times a = " + m2 + " \\times " + acceleration + " = {\\color{#0891b2}" + internalForceDisplay + "\\text{ N}}"
                                        } display=${true} />
                                    </div>
                                    <div className="mt-2 p-2 rounded-lg text-xs" style=${{ background: 'rgba(8,145,178,0.08)', color: '#0891b2' }}>
                                        <b>${"牛頓第三定律："}</b>
                                        ${" B 對 A 的反作用力大小相同 = " + internalForceDisplay + " N，方向相反（向左）。"}
                                    </div>
                                </div>
                            `}
                        </div>
                    </div>
                </div>

                <!-- 動畫實驗畫面 -->
                <div className="mt-4">
                    <h3 className="text-lg font-bold mb-4 flex items-center gap-2" style=${{ color: 'var(--text-primary)' }}>
                        <i data-lucide="monitor-play" className="w-5 h-5"></i> ${"實驗模擬畫面"}
                    </h3>
                    <div className="relative sim-surface rounded-2xl overflow-hidden border-2 shadow-inner" style=${{ borderColor: 'var(--card-border)', minHeight: showForce ? '280px' : '240px', transition: 'min-height 0.3s ease' }}>
                        <!-- 地面 -->
                        <div className="absolute bottom-0 w-full h-10 sim-ground"></div>

                        <!-- 動畫區域 -->
                        <div className="relative w-full" style=${{ height: showForce ? '240px' : '200px', transition: 'height 0.3s ease' }}>
                            <div style=${{ transform: 'translateX(' + position + 'px)', transition: isPlaying ? 'none' : 'transform 0.3s ease-out' }}
                                className="absolute bottom-0 left-[10%] flex items-end h-full">

                                <!-- 系統虛線框 -->
                                <div className=${"absolute bottom-0 transition-opacity duration-300 " + (isSystemView ? 'opacity-100 system-box' : 'opacity-0')}
                                    style=${{ width: mode === 'push' ? '148px' : '220px', height: '80px', left: '-4px', zIndex: 20 }}>
                                    <div className="absolute -top-8 w-full text-center text-red-500 font-black text-sm">${"系統總質量: " + totalMass + "kg"}</div>
                                </div>

                                <!-- 推力箭頭 -->
                                <div className="absolute bottom-6 left-[-60px] flex items-center text-red-600 font-bold pulse-soft z-10"
                                    style=${{ opacity: force > 0 ? 1 : 0 }}>
                                    <div className="text-sm mr-1">${"推力 " + force + "N"}</div>
                                    <i data-lucide="arrow-right" className="w-6 h-6"></i>
                                </div>

                                <!-- 物體結構 -->
                                <div className="flex items-end relative z-0">
                                    <!-- 木塊 A -->
                                    <div className="bg-orange-300 border-2 border-orange-500 rounded flex flex-col items-center justify-center shadow-md relative"
                                        style=${{ width: '70px', height: '60px', opacity: isSystemView ? 0.3 : 1, transition: 'opacity 0.3s' }}>
                                        <span className="font-black text-orange-900">${"A"}</span>
                                        <span className="text-xs text-orange-800 font-bold">${m1 + "kg"}</span>

                                        <!-- 反作用力箭頭 B→A（向左）顯示在 A 上方 -->
                                        ${showForce && html`
                                            <div className="absolute flex flex-col items-center force-arrow-anim" style=${{ bottom: '65px', left: '50%', transform: 'translateX(-50%)', zIndex: 30 }}>
                                                <div className="text-xs font-bold whitespace-nowrap px-1.5 py-0.5 rounded shadow-sm" style=${{ background: 'rgba(234,88,12,0.15)', color: '#c2410c', border: '1px solid #fb923c' }}>
                                                    ${"B→A " + internalForceDisplay + "N"}
                                                </div>
                                                <svg width="32" height="18" style=${{ display: 'block' }}>
                                                    <line x1="26" y1="9" x2="8" y2="9" stroke="#ea580c" stroke-width="3" stroke-linecap="round"/>
                                                    <polygon points="2,9 10,4 10,14" fill="#ea580c"/>
                                                </svg>
                                            </div>
                                        `}
                                    </div>

                                    <!-- 繩子 (Pull 模式) -->
                                    ${mode === 'pull' && html`
                                        <div className="h-[4px] bg-gray-600 relative mb-4" style=${{ width: '70px' }}>
                                            <div className=${"absolute -top-6 w-full flex justify-center text-xs font-bold transition-opacity " + (isSystemView ? 'opacity-0' : 'opacity-100')}
                                                style=${{ color: 'var(--text-secondary)' }}>
                                                <span className="px-1 rounded" style=${{ background: 'var(--card-bg)' }}>
                                                    ${showForce ? "T = " + internalForceDisplay + "N" : "張力 T"}
                                                </span>
                                            </div>
                                        </div>
                                    `}

                                    <!-- 木塊 B -->
                                    <div className="bg-emerald-300 border-2 border-emerald-500 rounded flex flex-col items-center justify-center shadow-md relative"
                                        style=${{ width: '70px', height: '60px', opacity: isSystemView ? 0.3 : 1, transition: 'opacity 0.3s' }}>
                                        <span className="font-black text-emerald-900">${"B"}</span>
                                        <span className="text-xs text-emerald-800 font-bold">${m2 + "kg"}</span>

                                        <!-- 作用力箭頭 A→B（向右）顯示在 B 上方 -->
                                        ${showForce && html`
                                            <div className="absolute flex flex-col items-center force-arrow-anim" style=${{ bottom: '65px', left: '50%', transform: 'translateX(-50%)', zIndex: 30 }}>
                                                <div className="text-xs font-bold whitespace-nowrap px-1.5 py-0.5 rounded shadow-sm" style=${{ background: 'rgba(5,150,105,0.15)', color: '#047857', border: '1px solid #34d399' }}>
                                                    ${"A→B " + internalForceDisplay + "N"}
                                                </div>
                                                <svg width="32" height="18" style=${{ display: 'block' }}>
                                                    <line x1="6" y1="9" x2="24" y2="9" stroke="#059669" stroke-width="3" stroke-linecap="round"/>
                                                    <polygon points="30,9 22,4 22,14" fill="#059669"/>
                                                </svg>
                                            </div>
                                        `}
                                    </div>
                                </div>

                                <!-- 加速度標示 -->
                                ${isPlaying && html`
                                    <div className="absolute -top-12 w-full flex justify-center items-center text-purple-600 font-black gap-1 drop-shadow-md">
                                        ${"a = " + acceleration + " m/s²"} <i data-lucide="chevrons-right" className="w-5 h-5 pulse-soft"></i>
                                    </div>
                                `}
                            </div>
                        </div>
                        <div className="text-center font-bold mt-1 tracking-[0.5em] text-xs pb-1" style=${{ color: 'var(--text-secondary)' }}>${"光滑水平面（沒有摩擦力）"}</div>
                    </div>
                </div>
            </div>`;
        }

        /* ===== 3. 測驗分頁 ===== */
        function QuizTab() {
            var qS = useState(null); var question = qS[0], setQuestion = qS[1];
            var stepS = useState(1); var step = stepS[0], setStep = stepS[1];
            var ansS = useState(''); var userAns = ansS[0], setUserAns = ansS[1];
            var fbS = useState(null); var feedback = fbS[0], setFeedback = fbS[1];
            var scoreS = useState({ correct: 0, total: 0 }); var score = scoreS[0], setScore = scoreS[1];

            var generateQuestion = function() {
                var mm1 = Math.floor(Math.random() * 4) + 1;
                var mm2 = Math.floor(Math.random() * 5) + 2;
                var totalM = mm1 + mm2;
                var a = Math.floor(Math.random() * 3) + 2;
                var F = totalM * a;
                setQuestion({ m1: mm1, m2: mm2, totalM: totalM, F: F, a: a });
                setStep(1);
                setUserAns('');
                setFeedback(null);
            };

            useEffect(function() {
                if (!question) generateQuestion();
            }, []);

            var checkAnswer = function() {
                var ans = Number(userAns);
                if (step === 1) {
                    if (ans === question.totalM) {
                        setFeedback({ isCorrect: true, msg: '太棒了！總質量就是把物體加起來。我們進入下一步！' });
                        setScore(function(p) { return { correct: p.correct + 1, total: p.total + 1 }; });
                        setTimeout(function() {
                            setStep(2);
                            setUserAns('');
                            setFeedback(null);
                        }, 1500);
                    } else {
                        setFeedback({ isCorrect: false, msg: '不對喔，總質量應該是 m₁ + m₂ (' + question.m1 + ' + ' + question.m2 + ')，再試試看！' });
                        setScore(function(p) { return { correct: p.correct, total: p.total + 1 }; });
                    }
                } else if (step === 2) {
                    if (ans === question.a) {
                        setFeedback({ isCorrect: true, msg: '完全正確！你已經掌握了系統的牛頓第二定律！' });
                        setScore(function(p) { return { correct: p.correct + 1, total: p.total + 1 }; });
                        setStep(3);
                    } else {
                        setFeedback({ isCorrect: false, msg: '想想公式 a = F ÷ M。推力是 ' + question.F + '，總質量是 ' + question.totalM + '。' });
                        setScore(function(p) { return { correct: p.correct, total: p.total + 1 }; });
                    }
                }
            };

            if (!question) return null;

            return html`<div className="slide-up">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- 題目面板 -->
                    <div className="p-6 rounded-xl border-2 shadow-sm flex flex-col" style=${{ background: 'var(--quiz-bg)', borderColor: 'var(--quiz-border)' }}>
                        <div className="flex items-center justify-between border-b pb-3 mb-5" style=${{ borderColor: 'var(--quiz-border)' }}>
                            <h2 className="text-xl font-bold flex items-center gap-2" style=${{ color: 'var(--quiz-text)' }}>
                                <i data-lucide="target" className="w-6 h-6"></i>
                                ${"觀念小測驗"}
                            </h2>
                            <div className="flex items-center gap-2 text-sm font-bold mono" style=${{ color: 'var(--quiz-text)' }}>
                                <i data-lucide="trophy" className="w-4 h-4"></i>
                                <span>${score.correct + "/" + score.total}</span>
                                ${score.total > 0 && html`<span className="opacity-70">${"(" + Math.round(score.correct / score.total * 100) + "%)"}</span>`}
                            </div>
                        </div>

                        <div className="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold text-white mb-4 self-start" style=${{ background: '#2563eb' }}>
                            <i data-lucide="layers" className="w-3 h-3"></i>
                            ${"第 " + (step === 3 ? 2 : step) + " / 2 步"}
                        </div>

                        <!-- 題目敘述 -->
                        <div className="p-5 rounded-xl shadow-sm mb-5 border leading-relaxed text-base" style=${{ background: 'var(--quiz-q-bg)', borderColor: 'var(--quiz-q-border)', color: 'var(--text-primary)' }}>
                            ${"在一個光滑水平面上，木塊 A 質量為 "}
                            <b className="text-blue-500">${question.m1 + " kg"}</b>
                            ${"，木塊 B 質量為 "}
                            <b className="text-blue-500">${question.m2 + " kg"}</b>
                            ${"。"}
                            <br />
                            ${"現在施加一個 "}
                            <b className="text-red-500">${question.F + " N"}</b>
                            ${" 的推力讓它們一起移動。"}
                        </div>

                        ${step !== 3 ? html`
                            <div className="flex flex-col gap-4">
                                <label className="block font-bold text-lg" style=${{ color: 'var(--text-primary)' }}>
                                    ${step === 1 ? '請問這個「系統」的總質量 (M) 是多少？' : '請問這個系統的加速度 (a) 是多少？'}
                                </label>
                                <div className="relative w-full">
                                    <input type="number" value=${userAns}
                                        onChange=${function(e) { setUserAns(e.target.value); }}
                                        onKeyDown=${function(e) { if (e.key === 'Enter' && userAns !== '') checkAnswer(); }}
                                        placeholder=${"輸入數字..."}
                                        className="border-2 rounded-lg p-3 pl-4 pr-20 w-full text-xl font-bold focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all"
                                        style=${{ fontSize: '18px', borderColor: 'var(--card-border)', background: 'var(--card-bg)', color: 'var(--text-primary)' }} />
                                    <span className="absolute right-4 top-1/2 -translate-y-1/2 font-bold mono" style=${{ color: 'var(--text-secondary)' }}>
                                        ${step === 1 ? 'kg' : 'm/s²'}
                                    </span>
                                </div>
                                <button onClick=${checkAnswer}
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-bold transition-colors shadow-md flex items-center justify-center gap-2">
                                    <i data-lucide="check-circle" className="w-5 h-5"></i> ${"送出答案"}
                                </button>

                                ${feedback && html`
                                    <div className=${"mt-2 p-4 rounded-xl font-bold shadow-sm border score-pop " + (feedback.isCorrect ? 'bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-300 border-green-300 dark:border-green-700' : 'bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-300 border-red-300 dark:border-red-700')}>
                                        <div className="flex items-center gap-2">
                                            <i data-lucide=${feedback.isCorrect ? 'check' : 'x'} className="w-5 h-5"></i>
                                            ${feedback.msg}
                                        </div>
                                    </div>
                                `}
                            </div>
                        ` : html`
                            <div className="text-center py-8 space-y-4 fade-in">
                                <div className="inline-block p-4 rounded-full mb-2" style=${{ background: 'var(--quiz-bg)' }}>
                                    <i data-lucide="award" className="w-16 h-16 text-yellow-500"></i>
                                </div>
                                <h3 className="text-2xl font-black text-green-600">${"挑戰成功！"}</h3>
                                <p style=${{ color: 'var(--text-secondary)' }}>${"你完美應用了："}</p>
                                <div className="inline-block px-6 py-3 rounded-xl font-bold text-lg border" style=${{ background: 'var(--surface)', borderColor: 'var(--card-border)', color: 'var(--text-primary)' }}>
                                    <span className="text-red-500">${question.F + " N"}</span>${" = "}
                                    <span className="text-green-600">${question.totalM + " kg"}</span>${" × "}
                                    <span className="text-purple-600">${question.a + " m/s²"}</span>
                                </div>
                                <div className="pt-6">
                                    <button onClick=${generateQuestion}
                                        className="bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2 mx-auto transition-all">
                                        <i data-lucide="refresh-cw" className="w-5 h-5"></i> ${"再挑戰一題"}
                                    </button>
                                </div>
                            </div>
                        `}
                    </div>

                    <!-- 公式參考面板 -->
                    <div className="space-y-6 p-6 rounded-xl border shadow-sm flex flex-col justify-center" style=${{ background: 'var(--surface)', borderColor: 'var(--card-border)' }}>
                        <h2 className="text-xl font-bold border-b pb-2 flex items-center gap-2" style=${{ color: 'var(--text-primary)', borderColor: 'var(--card-border)' }}>
                            <i data-lucide="lightbulb"></i> ${"公式提示"}
                        </h2>
                        <div className="space-y-4">
                            <div className="p-4 rounded-lg shadow-sm border-l-4 border-green-500" style=${{ background: 'var(--card-bg)' }}>
                                <div className="text-xs mb-1 font-bold" style=${{ color: 'var(--text-secondary)' }}>${"步驟 1：計算總質量"}</div>
                                <div className="flex items-center justify-center py-1">
                                    <${MathText} math="M = m_1 + m_2" display=${true} />
                                </div>
                            </div>
                            <div className="p-4 rounded-lg shadow-sm border-l-4 border-purple-500" style=${{ background: 'var(--card-bg)' }}>
                                <div className="text-xs mb-1 font-bold" style=${{ color: 'var(--text-secondary)' }}>${"步驟 2：使用牛頓第二定律"}</div>
                                <div className="flex items-center justify-center py-1">
                                    <${MathText} math="F = Ma \\Rightarrow a = \\frac{F}{M}" display=${true} />
                                </div>
                            </div>
                            ${question && step !== 3 && html`
                                <div className="p-4 rounded-lg shadow-sm border-l-4 border-amber-500" style=${{ background: 'var(--card-bg)' }}>
                                    <div className="text-xs mb-1 font-bold" style=${{ color: 'var(--text-secondary)' }}>${"本題數據"}</div>
                                    <div className="space-y-1 font-bold" style=${{ color: 'var(--text-primary)' }}>
                                        <div>${"m₁ = " + question.m1 + " kg, m₂ = " + question.m2 + " kg"}</div>
                                        <div>${"F = " + question.F + " N"}</div>
                                    </div>
                                </div>
                            `}
                        </div>
                        <div className="p-3 rounded-xl border text-center" style=${{ background: 'var(--quiz-bg)', borderColor: 'var(--quiz-border)' }}>
                            <p className="text-sm font-bold" style=${{ color: 'var(--quiz-text)' }}>
                                <i data-lucide="info" className="w-4 h-4 inline-block mr-1"></i>
                                ${"光滑水平面上沒有摩擦力"}
                            </p>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        /* ===== Render ===== */
        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>
</body>
</html>
