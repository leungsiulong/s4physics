<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重量與牛頓第二定律視覺實驗室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .rocket-fire { animation: flicker 0.1s infinite alternate; }
        @keyframes flicker {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen p-4 md:p-8">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 💡 新增的共用元件：LaTeX 公式渲染器
        // ==========================================
        const LatexFormula = ({ tex }) => {
            const containerRef = useRef(null);
            
            useEffect(() => {
                // 當元件載入且 window.katex 準備好時，將傳入的 tex 語法渲染出來
                if (window.katex && containerRef.current) {
                    window.katex.render(tex, containerRef.current, { 
                        displayMode: true, // 獨立一行的顯示模式
                        throwOnError: false // 遇到語法錯誤時不讓整個網頁崩潰
                    });
                }
            }, [tex]);

            return <div ref={containerRef} className="text-slate-800 my-2"></div>;
        };

        function App() {
            // UI 狀態：預設分頁為 'formulas' (理論公式)
            const [activeTab, setActiveTab] = useState('formulas');

            // 物理狀態
            const [mass, setMass] = useState(10);
            const [thrust, setThrust] = useState(98);
            const [gravity, setGravity] = useState(9.8);
            const [isPlaying, setIsPlaying] = useState(false);
            const [pos, setPos] = useState(0);
            const [vel, setVel] = useState(0);

            // 測驗狀態
            const [qType, setQType] = useState('weight');
            const [qParams, setQParams] = useState({ m: 10, f: 150, g: 9.8 });
            const [userAns, setUserAns] = useState('');
            const [feedback, setFeedback] = useState(null);

            // 物理計算
            const weight = mass * gravity;
            const netForce = thrust - weight;
            const acceleration = netForce / mass;

            // 動畫 Refs
            const posRef = useRef(0);
            const velRef = useRef(0);
            const lastTimeRef = useRef(performance.now());
            const requestRef = useRef();

            // 重設動畫
            const reset = () => {
                setIsPlaying(false);
                setPos(0); setVel(0);
                posRef.current = 0; velRef.current = 0;
            };

            // 動畫迴圈
            useEffect(() => {
                if (!isPlaying) {
                    lastTimeRef.current = performance.now();
                    cancelAnimationFrame(requestRef.current);
                    return;
                }
                const animate = (time) => {
                    const dt = Math.min((time - lastTimeRef.current) / 1000, 0.1); 
                    lastTimeRef.current = time;
                    velRef.current += acceleration * 15 * dt; 
                    posRef.current += velRef.current * dt;

                    if (posRef.current <= 0) { posRef.current = 0; if (velRef.current < 0) velRef.current = 0; }
                    if (posRef.current >= 350) { posRef.current = 350; if (velRef.current > 0) velRef.current = 0; }

                    setPos(posRef.current);
                    setVel(velRef.current);
                    requestRef.current = requestAnimationFrame(animate);
                };
                requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, [isPlaying, acceleration]);

            useEffect(() => { lucide.createIcons(); });

            // 教學一鍵設定
            const presets = {
                hover: () => { setMass(10); setThrust(98); reset(); },
                liftOff: () => { setMass(10); setThrust(150); reset(); },
                freeFall: () => { setMass(10); setThrust(0); reset(); setPos(300); posRef.current = 300; }
            };

            // 產生新題目
            const generateQuestion = () => {
                const types = ['weight', 'netForce', 'accel'];
                const selectedType = types[Math.floor(Math.random() * types.length)];
                const randomM = Math.floor(Math.random() * 15) + 5; 
                let randomF = Math.floor(randomM * 9.8) + (Math.floor(Math.random() * 100) - 40); 
                if (randomF < 0) randomF = 0;

                setQType(selectedType);
                setQParams({ m: randomM, f: randomF, g: 9.8 });
                setUserAns(''); 
                setFeedback(null);
            };

            useEffect(() => {
                if (activeTab === 'practice' && !feedback && userAns === '') generateQuestion();
            }, [activeTab]);

            // 檢查答案
            const checkAnswer = () => {
                let correctAns = 0;
                if (qType === 'weight') correctAns = qParams.m * qParams.g;
                if (qType === 'netForce') correctAns = Math.abs(qParams.f - (qParams.m * qParams.g));
                if (qType === 'accel') correctAns = Math.abs((qParams.f - (qParams.m * qParams.g)) / qParams.m);

                const userVal = parseFloat(userAns);
                if (isNaN(userVal)) {
                    setFeedback({ text: '⚠️ 請輸入有效的數字！', isCorrect: false });
                    return;
                }
                
                if (Math.abs(userVal - correctAns) <= 0.2) {
                    setFeedback({ text: '✅ 答對了！計算非常精準！', isCorrect: true });
                } else {
                    setFeedback({ text: `❌ 算錯囉。正確答案約為 ${correctAns.toFixed(1)}，請再試試！`, isCorrect: false });
                }
            };

            // 渲染：題目文字
            const renderQuestionText = () => {
                const { m, f, g } = qParams;
                if (qType === 'weight') {
                    return `一架質量為 ${m} kg 的無人機，在地球上 (g=9.8 m/s²) 的「重量」是多少 N？`;
                } else if (qType === 'netForce') {
                    return `一架質量為 ${m} kg 的無人機，引擎向上推力為 ${f} N。請問它受到的「淨力」大小是多少 N？`;
                } else if (qType === 'accel') {
                    return `一架質量為 ${m} kg 的無人機，引擎向上推力為 ${f} N。請問它的「加速度」大小是多少 m/s²？`;
                }
            };

            // 提取出的共用元件：控制儀器面板
            const renderControlPanel = () => (
                <div className="space-y-6 bg-slate-100 p-6 rounded-xl border-2 border-slate-200 shadow-sm h-full flex flex-col justify-between">
                    <div>
                        <h2 className="text-xl font-bold border-b border-slate-300 pb-2 flex items-center gap-2 text-slate-800 mb-4">
                            <i data-lucide="sliders"></i> 控制儀器面板
                        </h2>
                        
                        <div className="bg-amber-50 p-3 rounded-xl border border-amber-200 mb-6">
                            <p className="text-sm font-bold text-amber-800 mb-2">教學一鍵設定：</p>
                            <div className="grid grid-cols-3 gap-2">
                                <button onClick={presets.hover} className="bg-white border border-amber-300 hover:bg-amber-100 text-amber-900 py-2 rounded text-xs font-bold transition shadow-sm">停在半空</button>
                                <button onClick={presets.liftOff} className="bg-white border border-blue-300 hover:bg-blue-100 text-blue-900 py-2 rounded text-xs font-bold transition shadow-sm">加速升空</button>
                                <button onClick={presets.freeFall} className="bg-white border border-red-300 hover:bg-red-100 text-red-900 py-2 rounded text-xs font-bold transition shadow-sm">自由下墜</button>
                            </div>
                        </div>

                        <div className="mb-4">
                            <label className="flex justify-between font-bold mb-2 text-blue-600">
                                <span>質量 (Mass)</span><span>{mass} kg</span>
                            </label>
                            <input type="range" min="1" max="20" value={mass} onChange={(e)=>setMass(Number(e.target.value))} className="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                        </div>
                        <div className="mb-4">
                            <label className="flex justify-between font-bold mb-2 text-green-600">
                                <span>推力 (Thrust)</span><span>{thrust} N</span>
                            </label>
                            <input type="range" min="0" max="300" value={thrust} onChange={(e)=>setThrust(Number(e.target.value))} className="w-full h-2 bg-green-200 rounded-lg appearance-none cursor-pointer accent-green-600" />
                        </div>
                    </div>

                    <div className="flex gap-4 pt-4 mt-auto">
                        <button onClick={() => setIsPlaying(!isPlaying)} className={`flex-1 flex justify-center items-center gap-2 py-3 px-4 rounded-lg font-bold text-white transition-colors shadow-md ${isPlaying ? 'bg-amber-500 hover:bg-amber-600' : 'bg-green-500 hover:bg-green-600'}`}>
                            <i data-lucide={isPlaying ? 'pause' : 'play'} className="w-5 h-5"></i>
                            {isPlaying ? '暫停動畫' : '開始推動'}
                        </button>
                        <button onClick={reset} className="flex justify-center items-center gap-2 bg-slate-500 hover:bg-slate-600 text-white py-3 px-4 rounded-lg font-bold transition-colors shadow-md">
                            <i data-lucide="rotate-ccw" className="w-5 h-5"></i> 重設
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
                    {/* 頂部標題與導覽列 */}
                    <div className="bg-blue-600 p-6 text-white">
                        <div className="flex flex-col md:flex-row justify-between md:items-center gap-4">
                            <div>
                                <h1 className="text-3xl font-bold mb-2">重量與牛頓第二定律</h1>
                                <p className="text-blue-100 flex items-center gap-2 text-sm">
                                    <i data-lucide="info" className="w-4 h-4"></i> 觀察火箭升空的力學變化，學習重量與加速度的關係！
                                </p>
                            </div>
                            
                            <div className="flex bg-blue-800/50 p-1 rounded-lg gap-1">
                                <button onClick={() => setActiveTab('formulas')} className={`flex items-center gap-2 px-4 py-2 rounded-md transition-colors text-sm font-bold ${activeTab === 'formulas' ? 'bg-white text-blue-700 shadow-sm' : 'text-blue-100 hover:bg-blue-700/50'}`}>
                                    <i data-lucide="book-open" className="w-4 h-4"></i> 理論公式
                                </button>
                                <button onClick={() => setActiveTab('lab')} className={`flex items-center gap-2 px-4 py-2 rounded-md transition-colors text-sm font-bold ${activeTab === 'lab' ? 'bg-white text-blue-700 shadow-sm' : 'text-blue-100 hover:bg-blue-700/50'}`}>
                                    <i data-lucide="flask-conical" className="w-4 h-4"></i> 自由探索
                                </button>
                                <button onClick={() => setActiveTab('practice')} className={`flex items-center gap-2 px-4 py-2 rounded-md transition-colors text-sm font-bold ${activeTab === 'practice' ? 'bg-white text-blue-700 shadow-sm' : 'text-blue-100 hover:bg-blue-700/50'}`}>
                                    <i data-lucide="clipboard-list" className="w-4 h-4"></i> 無限練習
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="p-6 md:p-8">
                        {/* 1. 分頁: 理論公式 (Formulas) */}
                        {activeTab === 'formulas' && (
                            <div className="space-y-6 bg-sky-50 p-6 md:p-8 rounded-xl border border-sky-200 shadow-sm">
                                <h2 className="text-2xl font-bold border-b border-sky-200 pb-3 text-sky-800 flex items-center gap-2">
                                    <i data-lucide="book-open"></i> 理論公式總覽
                                </h2>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                                    <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-red-500">
                                        <h3 className="text-lg font-bold text-red-600 mb-2">1. 重量 (Weight)</h3>
                                        <p className="text-slate-600 mb-4 text-sm">物體受到重力吸引而產生的向下的力。</p>
                                        <div className="bg-slate-50 p-2 rounded-lg border border-slate-100">
                                            {/* 💡 使用 LaTeX 渲染重量公式 */}
                                            <LatexFormula tex="W = m \cdot g" />
                                        </div>
                                        <ul className="text-sm text-slate-500 mt-4 space-y-1">
                                            <li><strong className="text-slate-700">W:</strong> 重量 (牛頓 N)</li>
                                            <li><strong className="text-slate-700">m:</strong> 質量 (公斤 kg)</li>
                                            <li><strong className="text-slate-700">g:</strong> 重力加速度 (約 9.8 m/s²)</li>
                                        </ul>
                                    </div>

                                    <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-purple-500">
                                        <h3 className="text-lg font-bold text-purple-600 mb-2">2. 牛頓第二定律</h3>
                                        <p className="text-slate-600 mb-4 text-sm">物體的加速度與所受的淨力成正比，與質量成反比。</p>
                                        <div className="bg-slate-50 p-2 rounded-lg border border-slate-100">
                                            {/* 💡 使用 LaTeX 渲染牛頓第二定律公式 */}
                                            <LatexFormula tex="F_{\text{net}} = m \cdot a" />
                                        </div>
                                        <ul className="text-sm text-slate-500 mt-4 space-y-1">
                                            <li><strong className="text-slate-700">F_net:</strong> 淨力 (牛頓 N)</li>
                                            <li><strong className="text-slate-700">m:</strong> 質量 (公斤 kg)</li>
                                            <li><strong className="text-slate-700">a:</strong> 加速度 (m/s²)</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 2. 分頁: 自由探索 (Lab) */}
                        {activeTab === 'lab' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                {renderControlPanel()}

                                <div className="space-y-6 bg-sky-50 p-6 rounded-xl border border-sky-200 shadow-sm flex flex-col justify-center">
                                    <h2 className="text-xl font-bold border-b border-sky-200 pb-2 text-sky-800 flex items-center gap-2">
                                        <i data-lucide="bar-chart-2"></i> 物理算式觀察
                                    </h2>
                                    <div className="space-y-4">
                                        <div className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-red-500">
                                            <div className="text-slate-500 text-xs mb-1 font-bold">第一步：計算向下重量 (W)</div>
                                            <div className="font-mono font-bold text-lg text-slate-800">
                                                W = {mass} × {gravity} = <span className="text-red-500">{weight.toFixed(1)} N</span>
                                            </div>
                                        </div>
                                        <div className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-green-500">
                                            <div className="text-slate-500 text-xs mb-1 font-bold">第二步：計算淨力 (F_net)</div>
                                            <div className="font-mono font-bold text-lg text-slate-800">
                                                F_net = {thrust} - {weight.toFixed(1)} = <span className="text-green-500">{netForce.toFixed(1)} N</span>
                                            </div>
                                        </div>
                                        <div className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-purple-500">
                                            <div className="text-slate-500 text-xs mb-1 font-bold">第三步：求出加速度 (a)</div>
                                            <div className="font-mono font-bold text-lg text-slate-800">
                                                a = {netForce.toFixed(1)} ÷ {mass} = <span className="text-purple-500">{acceleration.toFixed(2)} m/s²</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. 分頁: 無限練習 (Practice) */}
                        {activeTab === 'practice' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                <div className="bg-yellow-50 p-6 rounded-xl border-2 border-yellow-300 shadow-sm flex flex-col justify-center">
                                    <h2 className="text-xl font-bold border-b border-yellow-300 pb-3 text-yellow-800 flex items-center gap-2 mb-6">
                                        <i data-lucide="clipboard-list"></i> 隨機任務挑戰
                                    </h2>
                                    
                                    <div className="bg-white p-6 rounded-xl shadow-sm text-lg text-slate-800 mb-6 border border-yellow-200">
                                        <p className="font-bold text-blue-600 mb-3 text-sm flex items-center gap-1">
                                            <i data-lucide="help-circle" className="w-4 h-4"></i> 提示：可在右側設定儀器來模擬！
                                        </p>
                                        <div className="font-medium leading-relaxed">
                                            {renderQuestionText()}
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-4">
                                        <div className="relative w-full">
                                            <input 
                                                type="number" 
                                                value={userAns} 
                                                onChange={(e) => setUserAns(e.target.value)} 
                                                placeholder="請輸入計算結果" 
                                                className="border-2 border-slate-300 rounded-lg p-3 pl-4 pr-12 w-full text-xl font-bold focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" 
                                            />
                                            <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">
                                                {qType === 'accel' ? 'm/s²' : 'N'}
                                            </span>
                                        </div>
                                        <button onClick={checkAnswer} className="w-full bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-bold transition-colors shadow-md flex items-center justify-center gap-2">
                                            <i data-lucide="check-circle" className="w-5 h-5"></i> 提交答案
                                        </button>
                                    </div>

                                    {feedback && (
                                        <div className={`mt-6 p-4 rounded-xl font-bold flex flex-col sm:flex-row justify-between items-center gap-4 shadow-sm border ${feedback.isCorrect ? 'bg-green-100 text-green-800 border-green-300' : 'bg-red-100 text-red-800 border-red-300'}`}>
                                            <div className="flex items-center gap-2">
                                                <i data-lucide={feedback.isCorrect ? "check" : "x"} className="w-5 h-5"></i>
                                                {feedback.text}
                                            </div>
                                            {feedback.isCorrect && (
                                                <button onClick={generateQuestion} className="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg transition-colors shadow-md flex items-center justify-center gap-2">
                                                    下一題 <i data-lucide="arrow-right" className="w-4 h-4"></i>
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </div>
                                
                                {renderControlPanel()}
                            </div>
                        )}

                        {/* 動畫顯示區：火箭發射模擬 (只在不是 'formulas' 頁面時渲染) */}
                        {activeTab !== 'formulas' && (
                            <div>
                                <h3 className="text-lg font-bold mb-4 text-slate-700 flex items-center gap-2">
                                    <i data-lucide="monitor-play" className="w-5 h-5"></i> 實驗模擬畫面
                                </h3>
                                <div className="relative h-80 bg-gradient-to-b from-blue-300 to-sky-100 rounded-2xl overflow-hidden border-2 border-slate-200 shadow-inner flex justify-center items-end">
                                    <div className="absolute top-10 left-10 text-4xl opacity-50">☁️</div>
                                    <div className="absolute top-24 right-20 text-5xl opacity-50">☁️</div>
                                    <div className="absolute bottom-0 w-32 h-16 bg-slate-300 rounded-t-lg border-t-4 border-slate-400"></div>

                                    <div className="absolute bottom-16 flex flex-col items-center transition-transform duration-75" style={{ transform: `translateY(-${pos}px)` }}>
                                        <div className="text-6xl drop-shadow-lg relative z-10">🚀</div>
                                        {isPlaying && thrust > 0 && (
                                            <div className="rocket-fire mt-1 flex flex-col items-center opacity-90">
                                                <div className="w-4 h-6 bg-yellow-400 rounded-full blur-[2px]"></div>
                                                <div className="w-2 h-4 bg-orange-500 rounded-full blur-[1px] -mt-4"></div>
                                            </div>
                                        )}
                                    </div>
                                    <div className="absolute bottom-0 w-full h-12 bg-emerald-600 border-t-4 border-emerald-500"></div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
