<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重量與牛頓第二定律視覺實驗室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-bg: #ffffff; --card-border: #e2e8f0; --surface: #f8fafc;
            --text-primary: #1e293b; --text-secondary: #64748b;
            --accent-blue: #2563eb; --accent-indigo: #4f46e5;
            --quiz-bg: #fffbeb; --quiz-border: #fcd34d; --quiz-text: #92400e;
            --quiz-q-bg: #ffffff; --quiz-q-border: #fde68a;
            --opt-bg: #ffffff; --opt-border: #e2e8f0; --opt-hover-bg: #eff6ff; --opt-hover-border: #93c5fd;
        }
        .dark {
            --card-bg: #1e293b; --card-border: #334155; --surface: #0f172a;
            --text-primary: #f1f5f9; --text-secondary: #94a3b8;
            --accent-blue: #60a5fa; --accent-indigo: #818cf8;
            --quiz-bg: #1c1917; --quiz-border: #854d0e; --quiz-text: #fbbf24;
            --quiz-q-bg: #1e293b; --quiz-q-border: #854d0e;
            --opt-bg: #1e293b; --opt-border: #475569; --opt-hover-bg: #1e3a5f; --opt-hover-border: #60a5fa;
        }
        * { font-family: 'Noto Sans TC', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }

        .flashcard-container { perspective: 1200px; }
        .flashcard-inner {
            position: relative; width: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flashcard-inner.flipped { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
        }
        .flashcard-back { transform: rotateY(180deg); }

        @keyframes slideInRight { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-60px); } to { opacity: 1; transform: translateX(0); } }
        .slide-in-right { animation: slideInRight 0.4s ease-out; }
        .slide-in-left { animation: slideInLeft 0.4s ease-out; }

        .progress-dot { transition: all 0.3s ease; }
        .progress-dot.active { transform: scale(1.4); }

        @keyframes pulseSoft { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .pulse-soft { animation: pulseSoft 2s ease-in-out infinite; }

        .rocket-fire { animation: flicker 0.1s infinite alternate; }
        @keyframes flicker { 0% { transform: scaleY(1); opacity:1; } 100% { transform: scaleY(1.15); opacity:0.85; } }

        .dark .katex { color: #f1f5f9; }

        .flashcard-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .flashcard-lifted { position: relative; z-index: 1000; }

        .force-arrow-label { font-size: 11px; font-weight: 700; white-space: nowrap; }
        @media (max-width: 640px) { .force-arrow-label { font-size: 9px; } }

        @media (max-width: 768px) {
            .flashcard-container { min-height: 380px !important; }
            .flashcard-container > div > div { min-height: 380px !important; }
        }

        .quiz-opt {
            background: var(--opt-bg); border: 2px solid var(--opt-border);
            color: var(--text-primary); transition: all 0.2s ease;
        }
        .quiz-opt:not(:disabled):hover {
            background: var(--opt-hover-bg); border-color: var(--opt-hover-border);
        }
        .quiz-opt:disabled { cursor: default; }
        .quiz-opt.correct { background: #dcfce7; border-color: #22c55e; color: #166534; }
        .quiz-opt.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
        .quiz-opt.dimmed { opacity: 0.45; }
        .dark .quiz-opt.correct { background: #14532d; border-color: #22c55e; color: #86efac; }
        .dark .quiz-opt.wrong { background: #450a0a; border-color: #ef4444; color: #fca5a5; }

        .sim-sky { background: linear-gradient(to bottom, #93c5fd, #e0f2fe); }
        .dark .sim-sky { background: linear-gradient(to bottom, #0f172a, #1e293b); }
        .sim-ground { background: #16a34a; border-top: 4px solid #15803d; }
        .dark .sim-ground { background: #1e3a2f; border-top: 4px solid #14532d; }
        .sim-pad { background: #94a3b8; border-top: 4px solid #64748b; }
        .dark .sim-pad { background: #475569; border-top: 4px solid #334155; }

        @keyframes scorePopIn {
            0% { transform: scale(0.7); opacity: 0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
        .score-pop { animation: scorePopIn 0.35s ease-out; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8" style="background:var(--surface);color:var(--text-primary);">
    <div id="root"></div>
    <script>
        var html = htm.bind(React.createElement);
        var useState = React.useState, useEffect = React.useEffect,
            useRef = React.useRef, useCallback = React.useCallback;

        /* ===== Dark mode ===== */
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (e.matches) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        });

        /* ===== KaTeX ===== */
        function LatexFormula(props) {
            var ref = useRef(null);
            useEffect(function() {
                if (window.katex && ref.current) {
                    window.katex.render(props.tex, ref.current, { displayMode: props.display !== false, throwOnError: false });
                }
            }, [props.tex, props.display]);
            return html`<span ref=${ref} className="my-1 inline-block"></span>`;
        }

        /* ===== SVG Diagrams for Flashcards ===== */
        function FBDRocketBasic() {
            return html`<svg viewBox="0 0 220 260" className="w-full max-w-[200px] mx-auto">

                    <marker id="aG" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#22c55e"/></marker>
                </defs>
                <rect x="80" y="90" width="60" height="70" rx="8" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
                <polygon points="110,55 85,90 135,90" fill="#60a5fa" stroke="#1d4ed8" stroke-width="2"/>
                <text x="110" y="132" text-anchor="middle" fill="white" font-weight="bold" font-size="13">m</text>
                <line x1="110" y1="160" x2="110" y2="230" stroke="#ef4444" stroke-width="3.5" marker-end="url(#aR)"/>
                <text x="135" y="210" fill="#ef4444" font-weight="bold" font-size="14">W = mg</text>
                <line x1="110" y1="55" x2="110" y2="10" stroke="#22c55e" stroke-width="3.5" marker-end="url(#aG)"/>
                <text x="140" y="25" fill="#22c55e" font-weight="bold" font-size="14">${"推力 F"}</text>
                <rect x="90" y="160" width="40" height="14" rx="4" fill="#f97316" opacity="0.8"/>
                <rect x="95" y="174" width="30" height="10" rx="3" fill="#fbbf24" opacity="0.7"/>
                <text x="110" y="250" text-anchor="middle" fill="#64748b" font-size="10">${"火箭自由體圖"}</text>

        }
        function FBDWeight() {
            return html`<svg viewBox="0 0 260 220" className="w-full max-w-[240px] mx-auto">
                <defs><marker id="aR2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#ef4444"/></marker></defs>

        function FBDMassVsWeight() {

        function FBDGravity() {

                    case 'weight': return m * g;
                    case 'netForce': return Math.abs(f - m * g);
                    case 'accel': return Math.abs((f - m * g) / m);
                    case 'hoverThrust': return m * g;
                    case 'massFromWeight': return m;
                    case 'thrustForAccel': return m * (qParams.targetAccel + g);
                    case 'weightOnMoon': return m * 1.6;
                    case 'freeFallSpeed': return g * qParams.t;
                    default: return 0;
                }
            };

            var checkNumerical = function() {
                var ca = getCorrectNumerical();
                var uv = parseFloat(userAns);
                if (isNaN(uv)) { setFeedback({ text:'⚠️ 請輸入有效的數字！', isCorrect:false }); return; }
                var isCorrect = Math.abs(uv - ca) <= Math.max(0.5, ca * 0.03);
                if (isCorrect) {
                    setFeedback({ text:'✅ 答對了！計算非常精準！', isCorrect:true });
                    setScore(function(p) { return { correct:p.correct+1, total:p.total+1 }; });
                } else {
                    setFeedback({ text:'❌ 算錯囉。正確答案約為 ' + ca.toFixed(1) + '，請再試試！', isCorrect:false });
                    setScore(function(p) { return { correct:p.correct, total:p.total+1 }; });
                }
            };

            var handleMCQSelect = function(idx) {
                if (feedback) return;
                setSelectedOption(idx);
                var correctIdx, explanation;
                if (qType === 'direction') {
                    correctIdx = qParams.correctDir;
                    var wV = qParams.m * 9.8;
                    var nfV = qParams.f - wV;
                    explanation = '推力=' + qParams.f + 'N，重量=' + wV.toFixed(1) + 'N，淨力=' + nfV.toFixed(1) + 'N。' + (nfV > 0 ? '淨力向上，火箭向上加速。' : nfV < 0 ? '淨力向下，火箭向下加速。' : '淨力為零，火箭保持靜止或勻速。');
                } else {
                    var cq = conceptualPool[qParams.conceptIdx];
                    correctIdx = cq.correct;
                    explanation = cq.explanation;
                }
                var isCorrect = idx === correctIdx;
                setFeedback({ text: isCorrect ? '✅ 答對了！' : '❌ 答錯了！', isCorrect: isCorrect, correctIdx: correctIdx, explanation: explanation });
                setScore(function(p) { return { correct: p.correct + (isCorrect ? 1 : 0), total: p.total + 1 }; });
            };

            var renderQuestionText = function() {
                var m = qParams.m, f = qParams.f;
                switch (qType) {
                    case 'weight': return '一架質量為 ' + m + ' kg 的火箭，在地球上 (g=9.8 m/s²) 的重量是多少 N？';
                    case 'netForce': return '一架質量為 ' + m + ' kg 的火箭，引擎推力為 ' + f + ' N。它受到的淨力大小是多少 N？';
                    case 'accel': return '一架質量為 ' + m + ' kg 的火箭，引擎推力為 ' + f + ' N。它的加速度大小是多少 m/s²？';
                    case 'hoverThrust': return '一架質量為 ' + m + ' kg 的火箭要在地球上懸停 (g=9.8 m/s²)，需要多大的推力 (N)？';
                    case 'massFromWeight': return '一架火箭在地球上的重量為 ' + (m * 9.8).toFixed(1) + ' N (g=9.8 m/s²)，請問它的質量是多少 kg？';
                    case 'thrustForAccel': return '一架質量為 ' + m + ' kg 的火箭要以 ' + qParams.targetAccel + ' m/s² 向上加速，需要多大的推力 (N)？ (g=9.8 m/s²)';
                    case 'weightOnMoon': return '一架質量為 ' + m + ' kg 的火箭在月球上 (g=1.6 m/s²)，它的重量是多少 N？';
                    case 'freeFallSpeed': return '一個物體從靜止開始自由落體 ' + qParams.t + ' 秒後，速度是多少 m/s？ (g=9.8 m/s²)';
                    case 'direction': return '一架質量為 ' + m + ' kg 的火箭，引擎推力為 ' + f + ' N，重量為 ' + (m * 9.8).toFixed(1) + ' N。火箭會如何運動？';
                    case 'conceptual': return conceptualPool[qParams.conceptIdx].question;
                    default: return '';
                }
            };

            var getMCQOptions = function() {
                if (qType === 'direction') return dirOptions;
                if (qType === 'conceptual') return conceptualPool[qParams.conceptIdx].options;
                return [];
            };

            var getOptionClassName = function(idx) {
                var base = 'quiz-opt w-full text-left p-3 md:p-4 rounded-xl font-medium text-sm md:text-base';
                if (!feedback) return base;
                if (idx === feedback.correctIdx) return base + ' correct';
                if (idx === selectedOption && !feedback.isCorrect) return base + ' wrong';
                return base + ' dimmed';
            };

            /* Control panel */
            var renderControlPanel = function() {
                return html`<div className="space-y-6 p-6 rounded-xl border-2 shadow-sm h-full flex flex-col justify-between" style=${{ background:'var(--surface)', borderColor:'var(--card-border)' }}>
                    <div>
                        <h2 className="text-xl font-bold border-b pb-2 flex items-center gap-2 mb-4" style=${{ color:'var(--text-primary)', borderColor:'var(--card-border)' }}>
                            <i data-lucide="sliders"></i> ${"控制儀器面板"}
                        </h2>

                            <p className="text-sm font-bold mb-2" style=${{ color:'var(--quiz-text)' }}>${"教學一鍵設定："}</p>
                            <div className="grid grid-cols-3 gap-2">

                                <button onClick=${presets.freeFall} className="border border-red-400 hover:bg-red-100 dark:hover:bg-red-900/30 py-2 rounded text-xs font-bold transition shadow-sm" style=${{ background:'var(--card-bg)', color:'var(--text-primary)' }}>${"自由下墜"}</button>

                        </button>
                    </div>

            /* ===== Simulation Rendering ===== */
            var renderSimulation = function() {

                var arrowLen = function(f) { var v = Math.abs(f); return v < 1 ? 0 : Math.max(minArrowH, (v / maxForce) * maxArrowH); };
                var wLen = arrowLen(weight);

                                    <rect x="10" y="20" width="36" height="30" rx="3" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
                                    <circle cx="28" cy="33" r="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>

                                    <rect x="10" y="44" width="36" height="3" rx="1" fill="#2563eb" opacity="0.3"/>

                                ${tLen > 0 && html`<div style=${{ position:'absolute', left:'50%', bottom:'50%', transform:'translateX(-50%)', display:'flex', flexDirection:'column', alignItems:'center', zIndex:1 }}>

                                    <div className="force-arrow-label" style=${{ color:'#ef4444' }}>${"重量"}</div>
                                </div>`}

                                ${nfLen > 0 && nfUp && html`<div style=${{ position:'absolute', left:'calc(100% + 4px)', bottom:'50%', display:'flex', flexDirection:'column', alignItems:'center', zIndex:1 }}>
                                    <div className="force-arrow-label" style=${{ color:'#8b5cf6', marginBottom:'1px' }}>${"淨" + Math.abs(netForce).toFixed(0) + "N"}</div>
                                    <svg width="14" height=${nfLen + 8} style=${{ display:'block' }}>
                                        <polygon points=${"7,0 1,8 13,8"} fill="#8b5cf6"/>
                                        <line x1="7" y1="8" x2="7" y2=${nfLen + 8} stroke="#8b5cf6" stroke-width="3" stroke-dasharray="4,3" stroke-linecap="round"/>
                                    </svg>
                                </div>`}

                                ${nfLen > 0 && !nfUp && html`<div style=${{ position:'absolute', left:'calc(100% + 4px)', top:'50%', display:'flex', flexDirection:'column', alignItems:'center', zIndex:1 }}>
                                    <svg width="14" height=${nfLen + 8} style=${{ display:'block' }}>
                                        <line x1="7" y1="0" x2="7" y2=${nfLen} stroke="#8b5cf6" stroke-width="3" stroke-dasharray="4,3" stroke-linecap="round"/>
                                        <polygon points=${"7," + (nfLen + 8) + " 1," + nfLen + " 13," + nfLen} fill="#8b5cf6"/>
                                    </svg>
                                    <div className="force-arrow-label" style=${{ color:'#8b5cf6', marginTop:'1px' }}>${"淨" + Math.abs(netForce).toFixed(0) + "N"}</div>
                                </div>`}

                                ${nfLen === 0 && thrust > 0 && weight > 0 && html`<div style=${{ position:'absolute', left:'calc(100% + 4px)', top:'50%', transform:'translateY(-50%)', zIndex:3 }}>

                                </div>`}
                            </div>

                            ${isPlaying && thrust > 0 && html`<div className="rocket-fire flex flex-col items-center" style=${{ marginTop:'-3px' }}>
                                <div style=${{ width: Math.min(20, 8 + thrust/25) + 'px', height: Math.min(24, 10 + thrust/18) + 'px', background:'linear-gradient(to bottom, #f97316, #fbbf24, #fef08a)', borderRadius:'0 0 50% 50%', filter:'blur(2px)' }}></div>

                            </div>`}
                        </div>

                        <div className="absolute top-3 left-3 text-xs font-bold p-2 rounded-lg shadow mono space-y-0.5" style=${{ background:'rgba(255,255,255,0.85)', backdropFilter:'blur(4px)', color:'#334155' }}>

                            </p>
                        </div>
                        <div className="flex bg-white/15 p-1 rounded-xl gap-1 backdrop-blur-sm w-full md:w-auto">
                            <button onClick=${function() { setActiveTab('concepts'); }} className=${"flex-1 md:flex-initial flex items-center justify-center gap-1.5 px-2 md:px-3 py-2 rounded-lg transition-all text-xs md:text-sm font-bold " + (activeTab === 'concepts' ? 'bg-white text-indigo-700 shadow-md' : 'text-white/80 hover:bg-white/10')}>
                                <i data-lucide="layers" className="w-4 h-4"></i> ${"重要概念"}
                            </button>
                            <button onClick=${function() { setActiveTab('lab'); }} className=${"flex-1 md:flex-initial flex items-center justify-center gap-1.5 px-2 md:px-3 py-2 rounded-lg transition-all text-xs md:text-sm font-bold " + (activeTab === 'lab' ? 'bg-white text-indigo-700 shadow-md' : 'text-white/80 hover:bg-white/10')}>
                                <i data-lucide="flask-conical" className="w-4 h-4"></i> ${"自由探索"}

                            <button onClick=${function() { setActiveTab('practice'); }} className=${"flex-1 md:flex-initial flex items-center justify-center gap-1.5 px-2 md:px-3 py-2 rounded-lg transition-all text-xs md:text-sm font-bold " + (activeTab === 'practice' ? 'bg-white text-indigo-700 shadow-md' : 'text-white/80 hover:bg-white/10')}>

                <div className="p-5 md:p-8">

                    ${activeTab === 'concepts' && html`<div className="space-y-6">
                        <div className="flex items-center justify-center gap-2 flex-wrap">
                            ${flashcardData.map(function(card, i) {
                                return html`<button key=${card.id} onClick=${function() { goToCard(i, i > currentCard ? 'right' : 'left'); }}
                                    className=${"progress-dot w-3 h-3 rounded-full transition-all " + (i === currentCard ? 'active bg-indigo-500 ring-4 ring-indigo-200' : 'bg-slate-300 hover:bg-slate-400')}

                        </div>
                        ${isFlipped && html`<div className="flashcard-overlay" onClick=${function(e) { e.stopPropagation(); setIsFlipped(false); }}></div>`}
                        <div className="flex items-center gap-3 md:gap-5"
                            onTouchStart=${handleTouchStart} onTouchMove=${handleTouchMove} onTouchEnd=${handleTouchEnd}>
                            <button onClick=${prevCard} disabled=${currentCard === 0}
                                className="flex-shrink-0 w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center transition-all shadow-md disabled:opacity-30 disabled:cursor-not-allowed"

                    </div>`}

                    ${activeTab === 'lab' && html`<div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-4">
                            ${renderControlPanel()}
                            <div className="space-y-6 p-6 rounded-xl border shadow-sm flex flex-col justify-center" style=${{ background:'var(--surface)', borderColor:'var(--card-border)' }}>
                                <h2 className="text-xl font-bold border-b pb-2 flex items-center gap-2" style=${{ color:'var(--text-primary)', borderColor:'var(--card-border)' }}>
                                    <i data-lucide="bar-chart-2"></i> ${"物理算式觀察"}
                                </h2>
                                <div className="space-y-4">
                                    <div className="p-4 rounded-lg shadow-sm border-l-4 border-red-500" style=${{ background:'var(--card-bg)' }}>
                                        <div className="text-xs mb-1 font-bold" style=${{ color:'var(--text-secondary)' }}>${"第一步：計算向下重量 (W)"}</div>
                                        <div className="flex items-center justify-center py-1">
                                            <${LatexFormula} tex=${"W = " + mass + " \\times " + gravityVal + " = {\\color{#ef4444}" + weight.toFixed(1) + "\\text{ N}}"} />
                                        </div>
                                    </div>
                                    <div className="p-4 rounded-lg shadow-sm border-l-4 border-green-500" style=${{ background:'var(--card-bg)' }}>
                                        <div className="text-xs mb-1 font-bold" style=${{ color:'var(--text-secondary)' }}>${"第二步：計算淨力 (F_淨力)"}</div>
                                        <div className="flex items-center justify-center py-1">
                                            <${LatexFormula} tex=${"F_{\\text{淨力}} = " + thrust + " - " + weight.toFixed(1) + " = {\\color{#22c55e}" + netForce.toFixed(1) + "\\text{ N}}"} />
                                        </div>
                                    </div>
                                    <div className="p-4 rounded-lg shadow-sm border-l-4 border-purple-500" style=${{ background:'var(--card-bg)' }}>
                                        <div className="text-xs mb-1 font-bold" style=${{ color:'var(--text-secondary)' }}>${"第三步：求出加速度 (a)"}</div>
                                        <div className="flex items-center justify-center py-1">
                                            <${LatexFormula} tex=${"a = \\frac{F_{\\text{淨力}}}{m} = \\frac{" + netForce.toFixed(1) + "}{" + mass + "} = {\\color{#8b5cf6}" + acceleration.toFixed(2) + "\\text{ m/s}^2}"} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        ${renderSimulation()}
                    </div>`}

                    ${activeTab === 'practice' && html`<div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-4">
                            <div className="p-6 rounded-xl border-2 shadow-sm flex flex-col" style=${{ background:'var(--quiz-bg)', borderColor:'var(--quiz-border)' }}>
                                <div className="flex items-center justify-between border-b pb-3 mb-5" style=${{ borderColor:'var(--quiz-border)' }}>
                                    <h2 className="text-xl font-bold flex items-center gap-2" style=${{ color:'var(--quiz-text)' }}>
                                        <i data-lucide="clipboard-list"></i> ${"隨機任務挑戰"}
                                    </h2>
                                    <div className="flex items-center gap-2 text-sm font-bold mono" style=${{ color:'var(--quiz-text)' }}>
                                        <i data-lucide="trophy" className="w-4 h-4"></i>
                                        <span>${score.correct + "/" + score.total}</span>
                                        ${score.total > 0 && html`<span className="opacity-70">${"(" + Math.round(score.correct/score.total*100) + "%)"}</span>`}
                                    </div>
                                </div>

                                ${function() {
                                    var cat = getCategoryInfo(qType);
                                    return html`<div className="flex items-center gap-2 mb-3">
                                        <span className="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold text-white" style=${{ background: cat.color }}>
                                            <i data-lucide=${cat.icon} className="w-3 h-3"></i> ${cat.label}
                                        </span>
                                    </div>`;
                                }()}

                                <div className="p-5 rounded-xl shadow-sm mb-5 border" style=${{ background:'var(--quiz-q-bg)', borderColor:'var(--quiz-q-border)' }}>
                                    <p className="font-bold text-blue-500 mb-3 text-sm flex items-center gap-1">
                                        <i data-lucide="help-circle" className="w-4 h-4"></i>
                                        <span className="hidden md:inline">${"提示：可在右側設定儀器來模擬！"}</span>
                                        <span className="md:hidden">${"提示：可在下方設定儀器來模擬！"}</span>
                                    </p>
                                    <div className="font-medium leading-relaxed text-base" style=${{ color:'var(--text-primary)' }}>${renderQuestionText()}</div>
                                </div>

                                ${!isMCQType(qType) && html`<div className="flex flex-col gap-4">
                                    <div className="relative w-full">
                                        <input type="number" value=${userAns} onChange=${function(e) { setUserAns(e.target.value); }}
                                            onKeyDown=${function(e) { if (e.key === 'Enter' && userAns !== '') checkNumerical(); }}
                                            placeholder=${"請輸入計算結果"} disabled=${feedback && feedback.isCorrect}
                                            className="border-2 rounded-lg p-3 pl-4 pr-14 w-full text-xl font-bold focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all"
                                            style=${{ fontSize:'18px', borderColor:'var(--card-border)', background:'var(--card-bg)', color:'var(--text-primary)' }} />
                                        <span className="absolute right-4 top-1/2 -translate-y-1/2 font-bold" style=${{ color:'var(--text-secondary)' }}>
                                            ${getAnswerUnit(qType)}
                                        </span>
                                    </div>
                                    <button onClick=${checkNumerical} disabled=${feedback && feedback.isCorrect}
                                        className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white px-8 py-3 rounded-lg font-bold transition-colors shadow-md flex items-center justify-center gap-2">
                                        <i data-lucide="check-circle" className="w-5 h-5"></i> ${"提交答案"}
                                    </button>
                                </div>`}

                                ${isMCQType(qType) && html`<div className="flex flex-col gap-2.5">
                                    ${getMCQOptions().map(function(opt, i) {
                                        return html`<button key=${i} onClick=${function() { handleMCQSelect(i); }}
                                            disabled=${feedback !== null}
                                            className=${getOptionClassName(i)}>
                                            <span className="font-bold mr-2 opacity-60">${String.fromCharCode(65 + i) + "."}</span>
                                            ${opt}
                                            ${feedback && i === feedback.correctIdx && html`<span className="ml-2">✅</span>`}
                                            ${feedback && i === selectedOption && !feedback.isCorrect && html`<span className="ml-2">❌</span>`}
                                        </button>`;
                                    })}
                                </div>`}

                                ${feedback && html`<div className=${"mt-5 p-4 rounded-xl font-bold shadow-sm border score-pop " + (feedback.isCorrect ? 'bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-300 border-green-300 dark:border-green-700' : 'bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-300 border-red-300 dark:border-red-700')}>
                                    <div className="flex items-center gap-2 mb-2">
                                        <i data-lucide=${feedback.isCorrect ? "check" : "x"} className="w-5 h-5"></i>
                                        ${feedback.text}
                                    </div>
                                    ${feedback.explanation && html`<p className="text-sm font-medium opacity-80 mb-3">${"💡 " + feedback.explanation}</p>`}
                                    <button onClick=${generateQuestion}
                                        className=${"w-full sm:w-auto px-6 py-2 rounded-lg transition-colors shadow-md flex items-center justify-center gap-2 font-bold text-white " + (feedback.isCorrect ? 'bg-green-600 hover:bg-green-700' : 'bg-blue-600 hover:bg-blue-700')}>
                                        ${feedback.isCorrect ? "下一題 " : "再試一題 "}<i data-lucide="arrow-right" className="w-4 h-4"></i>
                                    </button>
                                </div>`}
                            </div>
                            ${renderControlPanel()}
                        </div>
                        ${renderSimulation()}
                    </div>`}

                </div>
            </div>`;
        }

        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>
</body>
</html>
